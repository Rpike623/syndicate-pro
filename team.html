<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>deeltrack | Team Management </title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="js/sp-core.js?v12"></script>
  <script src="js/sp-data.js?v12"></script>
  <script src="js/sp-firebase.js?v12"></script>
  <script src="js/sp-billing.js"></script>
    <style>
        :root { --primary: #1B1A19; --accent: #F37925; --bg: #F3F3F3; --radius: 12px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #F3F3F3; color: #1B1A19; display: flex; min-height: 100vh; }
        /* sidebar CSS moved to dt-global.css */
        .main { flex: 1; margin-left: var(--dt-sidebar-width); padding: 40px; }
    @media (max-width: 768px) { .main { margin-left: 0 !important; width: 100% !important; } #sidebar, .sidebar { transform: translateX(-100%) !important; position: fixed !important; z-index: 100 !important; top: 0; bottom: 0; } #sidebar.open, .sidebar.open { transform: translateX(0) !important; } .mobile-menu-btn { display: flex !important; } }
        
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; }
        .card { background: #FFFFFF; border: 1px solid #E2DDD8; border-radius: var(--radius); padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 0.75rem; color: #6B6560; padding: 12px 20px; background: #F3F3F3; border-bottom: 1px solid #E2DDD8; }
        td { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.07); font-size: 0.9rem; vertical-align: middle; }
        
        .role-badge { padding: 4px 10px; border-radius: 99px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; }
        .role-admin { background: rgba(239,68,68,0.15); color: #f87171; }
        .role-junior { background: rgba(14,165,233,0.15); color: #38bdf8; }
        .role-limited { background: #f3f4f6; color: #6B6560; }

        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-size: 0.875rem; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #FFFFFF; border: 1px solid #E2DDD8; }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
        <div class="header">
            <div>
                <h1 style="font-size: 1.6rem; font-weight: 800;">Team Management</h1>
                <p style="color: #6B6560;">Manage internal staff access and collaborator permissions</p>
            </div>
            <button class="btn btn-primary" onclick="inviteMember()"><i class="fas fa-plus"></i> Invite Member</button>
        </div>

        <div class="card" style="padding: 0; overflow: hidden;">
            <table>
                <thead>
                    <tr>
                        <th>Member</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Added</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="teamBody">
                    <!-- Seed data -->
                    <tr>
                        <td>
                            <div style="font-weight: 600;">Robert Pike (You)</div>
                            <div style="font-size: 0.75rem; color: #6B6560;">robert@pikecapital.com</div>
                        </td>
                        <td><span class="role-badge role-admin">Owner / Admin</span></td>
                        <td><span style="color: #10b981; font-size: 0.75rem;"><i class="fas fa-circle"></i> Active Now</span></td>
                        <td>Initial Setup</td>
                        <td style="text-align: right;"></td>
                    </tr>
                    <tr>
                        <td>
                            <div style="font-weight: 600;">Sarah Miller</div>
                            <div style="font-size: 0.75rem; color: #6B6560;">s.miller@pikecapital.com</div>
                        </td>
                        <td><span class="role-badge role-junior">Junior Analyst</span></td>
                        <td><span style="color: #6B6560; font-size: 0.75rem;"><i class="fas fa-circle"></i> Offline</span></td>
                        <td>Feb 20, 2026</td>
                        <td style="text-align: right;"><button class="btn-xs"><i class="fas fa-ellipsis-v"></i></button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        SP.requireGP();
        
        function inviteMember() {
            const email = prompt("Enter team member's professional email:");
            if(!email) return;
            alert(`Invite sent to ${email}. Verification link expires in 24h.`);
            if(typeof SPAudit !== 'undefined') {
                SPAudit.log('invite', 'team_member', 'new', email, { role: 'analyst' });
            }
        }
    </script>
</body>
</html>
