<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Cash Flow Forecast </title>
  <script src="js/sp-core.js?v3"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-money-bill-wave"></i> Cash Flow Forecast</h1>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">12-Month Cash In</span><span class="stat-value text-success" id="statIn">$0</span></div>
        <div class="stat-card"><span class="stat-label">12-Month Cash Out</span><span class="stat-value text-danger" id="statOut">$0</span></div>
        <div class="stat-card"><span class="stat-label">Net Cash Flow</span><span class="stat-value" id="statNet">$0</span></div>
        <div class="stat-card"><span class="stat-label">Runway</span><span class="stat-value" id="statRunway">24 mo</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Cash Flow Chart</h2></div>
        <div class="card-body"><canvas id="cfChart" height="100"></canvas></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Monthly Breakdown</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Month</th><th>Income</th><th>Expenses</th><th>Net</th><th>Cumulative</th></tr></thead><tbody id="cfTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}CF.init();}</script>
  <script src="js/sp-cashflow.js"></script>
</body>
</html>
