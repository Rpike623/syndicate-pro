<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Unit Mix </title>
  <script src="js/sp-core.js?v3"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-th"></i> Unit Mix</h1>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Total Units</span><span class="stat-value" id="statTotal">0</span></div>
        <div class="stat-card"><span class="stat-label">Avg SF</span><span class="stat-value" id="statAvgSf">0</span></div>
        <div class="stat-card"><span class="stat-label">Avg Rent</span><span class="stat-value" id="statAvgRent">$0</span></div>
        <div class="stat-card"><span class="stat-label">$/SF</span><span class="stat-value" id="statSfRent">$0</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Unit Mix by Type</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Type</th><th>Units</th><th>SF Range</th><th>Avg SF</th><th>Avg Rent</th><th>$/SF</th><th>Share</th></tr></thead><tbody id="mixTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}UnitMix.init();}</script>
  <script src="js/sp-unit-mix.js"></script>
</body>
</html>
