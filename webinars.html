<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Webinars </title>
  <script src="js/sp-core.js?v=9246da8"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-video"></i> Investor Webinars</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="Webinars.showModal()">
          <i class="fas fa-plus"></i> Schedule Webinar
        </button>
      </div>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Total Registrations</span><span class="stat-value" id="statRegs">0</span></div>
        <div class="stat-card"><span class="stat-label">Avg. Attendance</span><span class="stat-value" id="statAttendance">0%</span></div>
        <div class="stat-card"><span class="stat-label">Upcoming</span><span class="stat-value text-primary" id="statUpcoming">0</span></div>
        <div class="stat-card"><span class="stat-label">Past Events</span><span class="stat-value" id="statPast">0</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2><i class="fas fa-calendar"></i> Upcoming Webinars</h2></div>
        <div class="card-body" id="upcomingList"></div>
      </div>
      <div class="card">
        <div class="card-header"><h2><i class="fas fa-history"></i> Past Webinars</h2></div>
        <div class="card-body" id="pastList"></div>
      </div>
    </div>
  </main>
  <div id="webinarModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header"><h2>Schedule Webinar</h2><button class="close" onclick="Webinars.closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Title</label><input type="text" id="webTitle" class="form-input"></div>
        <div class="form-row">
          <div class="form-group"><label>Date</label><input type="date" id="webDate" class="form-input"></div>
          <div class="form-group"><label>Time</label><input type="time" id="webTime" class="form-input"></div>
        </div>
        <div class="form-group"><label>Deal (optional)</label><select id="webDeal" class="form-select"><option value="">General</option></select></div>
        <div class="form-group"><label>Description</label><textarea id="webDesc" class="form-input" rows="3"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Webinars.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="Webinars.save()">Schedule</button>
      </div>
    </div>
  </div>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Webinars.init();}</script>
  <script src="js/sp-webinars.js"></script>
</body>
</html>
