<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Reservations </title>
  <script src="js/sp-core.js"></script>
  <script src="js/sp-firebase.js"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
      </button>
      <h1><i class="fas fa-hand-pointer"></i> Reservations</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="Reservations.showAddModal()">
          <i class="fas fa-plus"></i> New Reservation
        </button>
      </div>
    </div>

    <div class="content">
      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-label">Total Reserved</span>
          <span class="stat-value" id="statReserved">$0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Soft Commitments</span>
          <span class="stat-value text-warning" id="statSoft">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Confirmed</span>
          <span class="stat-value text-success" id="statConfirmed">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Conversion Rate</span>
          <span class="stat-value text-primary" id="statConversion">0%</span>
        </div>
      </div>

      <!-- Reservations Table -->
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-list"></i> Investor Reservations</h2>
          <div class="filter-group">
            <select id="statusFilter" class="form-select form-select-sm" onchange="Reservations.render()">
              <option value="">All Status</option>
              <option value="soft">Soft Commitment</option>
              <option value="interest">Expressed Interest</option>
              <option value="confirmed">Confirmed</option>
              <option value="converted">Converted</option>
            </select>
          </div>
        </div>
        <div class="card-body">
          <table class="data-table">
            <thead>
              <tr>
                <th>Investor</th>
                <th>Reserved Amount</th>
                <th>Deal Interest</th>
                <th>Timeline</th>
                <th>Status</th>
                <th>Created</th>
                <th class="text-center">Actions</th>
              </tr>
            </thead>
            <tbody id="reservationTableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Pipeline View -->
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-filter"></i> Pipeline by Stage</h2>
        </div>
        <div class="card-body">
          <div class="pipeline-stages">
            <div class="pipeline-stage">
              <div class="stage-header">
                <span>Soft</span>
                <span class="stage-total" id="stageSoftTotal">$0</span>
              </div>
              <div class="stage-bar">
                <div class="stage-fill" id="stageSoftBar" style="width:0%"></div>
              </div>
            </div>
            <div class="pipeline-stage">
              <div class="stage-header">
                <span>Interest</span>
                <span class="stage-total" id="stageInterestTotal">$0</span>
              </div>
              <div class="stage-bar">
                <div class="stage-fill" id="stageInterestBar" style="width:0%"></div>
              </div>
            </div>
            <div class="pipeline-stage">
              <div class="stage-header">
                <span>Confirmed</span>
                <span class="stage-total" id="stageConfirmedTotal">$0</span>
              </div>
              <div class="stage-bar">
                <div class="stage-fill" id="stageConfirmedBar" style="width:0%"></div>
              </div>
            </div>
            <div class="pipeline-stage">
              <div class="stage-header">
                <span>Converted</span>
                <span class="stage-total" id="stageConvertedTotal">$0</span>
              </div>
              <div class="stage-bar">
                <div class="stage-fill" id="stageConvertedBar" style="width:0%"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Add Modal -->
  <div id="reservationModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2><i class="fas fa-hand-pointer"></i> New Reservation</h2>
        <button class="close" onclick="Reservations.closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="resForm">
          <div class="form-group">
            <label>Investor</label>
            <select id="resInvestor" class="form-select" required></select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Reserved Amount</label>
              <input type="number" id="resAmount" class="form-input" placeholder="250000">
            </div>
            <div class="form-group">
              <label>Deal Type Interest</label>
              <select id="resDealType" class="form-select">
                <option value="any">Any</option>
                <option value="multifamily">Multifamily</option>
                <option value="office">Office</option>
                <option value="industrial">Industrial</option>
                <option value="retail">Retail</option>
                <option value="development">Development</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Timeline</label>
              <select id="resTimeline" class="form-select">
                <option value="immediate">Immediate</option>
                <option value="q1">Q1 2026</option>
                <option value="q2">Q2 2026</option>
                <option value="q3">Q3 2026</option>
                <option value="q4">Q4 2026</option>
                <option value="2027">2027+</option>
              </select>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="resStatus" class="form-select">
                <option value="soft">Soft Commitment</option>
                <option value="interest">Expressed Interest</option>
                <option value="confirmed">Confirmed</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Notes</label>
            <textarea id="resNotes" class="form-input" rows="2" placeholder="Investor preferences, follow-up details..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Reservations.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="Reservations.save()">
          <i class="fas fa-save"></i> Save
        </button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.SP && SP.isLoggedIn) initPage();
      else document.addEventListener('sp-ready', initPage);
    });
    function initPage() {
      if (!SP.isLoggedIn()) { window.location.href = 'login.html'; return; }
      Reservations.init();
    }
  </script>
  <script src="js/sp-reservations.js"></script>
</body>
</html>
