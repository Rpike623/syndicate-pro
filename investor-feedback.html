<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Investor Feedback </title>
  <script src="js/sp-core.js"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-smile"></i> Investor Feedback</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="Feedback.showModal()"><i class="fas fa-plus"></i> New Survey</button>
      </div>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Surveys Sent</span><span class="stat-value" id="statSent">0</span></div>
        <div class="stat-card"><span class="stat-label">Responses</span><span class="stat-value text-success" id="statResp">0</span></div>
        <div class="stat-card"><span class="stat-label">NPS Score</span><span class="stat-value" id="statNps">0</span></div>
        <div class="stat-card"><span class="stat-label">Avg Rating</span><span class="stat-value" id="statRating">0.0</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Recent Responses</h2></div>
        <div class="card-body" id="responseList"></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Sent Surveys</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Survey</th><th>Sent</th><th>Responses</th><th>NPS</th><th>Status</th></tr></thead><tbody id="surveyTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <div id="surveyModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header"><h2>Send Survey</h2><button class="close" onclick="Feedback.closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Survey Type</label><select id="sType" class="form-select"><option value="nps">NPS Score</option><option value="quarterly">Quarterly Check-in</option><option value="post-invest">Post-Investment</option></select></div>
        <div class="form-group"><label>Subject</label><input type="text" id="sSubject" class="form-input"></div>
        <div class="form-group"><label>Questions</label><textarea id="sQuestions" class="form-input" rows="4" placeholder="1. How satisfied are you with your investment?&#10;2. Would you recommend us to other investors?&#10;3. Any feedback?"></textarea></div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="Feedback.closeModal()">Cancel</button><button class="btn btn-primary" onclick="Feedback.save()">Send Survey</button></div>
    </div>
  </div>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Feedback.init();}</script>
  <script src="js/sp-feedback.js"></script>
</body>
</html>
