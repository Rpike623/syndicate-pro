<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Deal Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="js/sp-core.js?v16"></script>
  <script src="js/sp-data.js?v15"></script>
  <script src="js/sp-firebase.js?v15"></script>
  <script src="js/sp-email.js?v8"></script>
  <script src="js/sp-billing.js?v16"></script>
  <script src="js/sp-documents.js"></script>
  <script src="js/sp-esign.js?v8"></script>
  <style>
    :root {
      --primary: #1B1A19;--accent: #F37925;--accent-hover:#D96515;--accent-light: rgba(243,121,37,0.12);
      --success: #2D9A6B;--success-light: rgba(45,154,107,0.12);--warning: #E8890A;--warning-light: rgba(232,137,10,0.12);
      --danger: #D94F3D;--danger-light: rgba(217,79,61,0.12);--purple: #7B5CC4;--purple-light: rgba(123,92,196,0.15);
      --text: #1B1A19;--text-secondary: #6B6560;--text-muted: #9C9590;
      --border: #E2DDD8;--border-light: rgba(27,26,25,0.08);--bg: #F3F3F3;--bg-card: #FFFFFF;--bg-sidebar: #050811;
      --shadow-md:0 4px 6px -1px rgb(0 0 0/.1);--shadow-lg:0 10px 15px -3px rgb(0 0 0/.1);
      --radius-sm:6px;--radius:8px;--radius-md:12px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body { background: #F3F3F3;color: #1B1A19;line-height:1.5;-webkit-font-smoothing:antialiased;}
    .app{display:flex;min-height:100vh;}
    /* sidebar CSS moved to dt-global.css */
    /* .sidebar-header CSS moved to dt-global.css */
    .logo{display:flex;align-items:center;gap:12px;font-size:1.25rem;font-weight:700;text-decoration:none;color:white;}
    .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#60a5fa);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
    /* .nav CSS moved to dt-global.css */
    /* .nav-section CSS moved to dt-global.css */
    /* .nav-item CSS moved to dt-global.css */
    /* .nav-item:hover CSS moved to dt-global.css */
    /* .nav-item.active CSS moved to dt-global.css */
    .nav-item i{width:20px;text-align:center;}
    /* .sidebar-footer CSS moved to dt-global.css */
    .user-info{display:flex;align-items:center;gap:12px;}
    .user-avatar{width:36px;height:36px;background:linear-gradient(135deg,var(--success),#34d399);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.9rem;color:white;flex-shrink:0;}
    .user-details{flex:1;}.user-name{font-size:.9rem;font-weight:600;}.user-role{font-size:.75rem;color:rgba(255,255,255,.65);}
    .main{flex:1;margin-left: var(--dt-sidebar-width);min-height:100vh;}
    .top-bar{background: #FFFFFF;border-bottom: 1px solid #E2DDD8;padding:16px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;}
    .top-left{display:flex;align-items:center;gap:16px;}
    .mobile-menu-btn{display:none;background:none;border: 1px solid #E2DDD8;border-radius:var(--radius);padding:8px 10px;cursor:pointer;}
    .breadcrumb{display:flex;align-items:center;gap:8px;font-size:.875rem;color:var(--text-secondary);}
    .breadcrumb a{color:var(--text-secondary);text-decoration:none;}.breadcrumb a:hover{color:var(--accent);}
    .breadcrumb-sep{color:var(--text-muted);}
    .breadcrumb-current{color: #1B1A19;font-weight:600;}
    .top-actions{display:flex;gap:10px;align-items:center;}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;font-size:.875rem;font-weight:600;border-radius:var(--radius);border:none;cursor:pointer;transition:all .15s;text-decoration:none;font-family:'Inter',sans-serif;}
    .btn-primary{background:var(--accent);color:#1B1A19;}.btn-primary:hover{background:var(--accent-hover);}
    .btn-secondary{background: #FFFFFF;color: #1B1A19;border: 1px solid #E2DDD8;}.btn-secondary:hover{background:var(--border-light);}
    .btn-danger{background:var(--danger-light);color:var(--danger);border:1px solid var(--danger);}.btn-danger:hover{background:var(--danger);color:white;}
    .content{padding:32px;}
    /* Deal header */
    .deal-hero{background:linear-gradient(135deg,var(--primary),#1e293b);border-radius:var(--radius-md);padding:32px;color:white;margin-bottom:24px;position:relative;overflow:hidden;}
    .deal-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(59,130,246,.2),transparent 70%);border-radius:50%;}
    .deal-hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
    .deal-title-block h1{font-size:1.75rem;font-weight:700;margin-bottom:6px;}
    .deal-location{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.6);font-size:.9rem;}
    .deal-badges{display:flex;gap:8px;flex-wrap:wrap;}
    .deal-badge{padding:5px 14px;border-radius:20px;font-size:.75rem;font-weight:600;}
    .badge-type{background:rgba(59,130,246,.25);color:#93c5fd;}
    .badge-status-sourcing{background:rgba(148,163,184,.2);color: #6B6560;}
    .badge-status-loi{background:rgba(245,158,11,.2);color:#fbbf24;}
    .badge-status-dd{background:rgba(59,130,246,.2);color:#93c5fd;}
    .badge-status-operating{background:rgba(16,185,129,.2);color:#6ee7b7;}
    .badge-status-closed{background:rgba(16,185,129,.3);color:#34d399;}
    .deal-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
    .deal-metric{background:rgba(255,255,255,.07);border-radius:var(--radius);padding:16px;}
    .deal-metric .val{font-size:1.4rem;font-weight:700;font-family:'JetBrains Mono',monospace;}
    .deal-metric .lbl{font-size:.72rem;color:rgba(255,255,255,.65);margin-top:4px;text-transform:uppercase;letter-spacing:.05em;}
    /* Tabs */
    .tabs{display:flex;gap:0;border-bottom: 2px solid #E2DDD8;margin-bottom:24px;}
    .tab{padding:12px 20px;font-size:.9rem;font-weight:600;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif;}
    .tab:hover{color: #1B1A19;}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
    .tab-panel{display:none;}.tab-panel.active{display:block;}
    /* Cards */
    .card{background: #FFFFFF;border: 1px solid #E2DDD8;border-radius:var(--radius-md);margin-bottom:20px;}
    .card-header{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:center;}
    .card-title{font-size:1rem;font-weight:700;}
    .card-body{padding:20px 24px 24px;}
    /* Investors table */
    .table-scroll{overflow-x:auto;}
    .table-scroll table{min-width:600px;}
    .table-scroll th{white-space:nowrap;}
    table{width:100%;border-collapse:collapse;}
    thead{background:var(--border-light);}
    th{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary);padding:10px 14px;text-align:left;white-space:nowrap;}
    td{padding:12px 14px;border-bottom:1px solid var(--border-light);font-size:.875rem;vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:rgba(59,130,246,.02);}
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600;}
    .badge-committed{background:var(--warning-light);color:var(--warning);}
    .badge-funded{background:var(--accent-light);color:var(--accent);}
    .badge-active{background:var(--success-light);color:var(--success);}
    .badge-exited{background:var(--border-light);color:var(--text-secondary);}
    .money{font-family:'JetBrains Mono',monospace;font-weight:600;}
    .pct{font-family:'JetBrains Mono',monospace;color:#6B6560;}
    .btn-xs{padding:5px 10px;font-size:.75rem;font-weight:600;border-radius:var(--radius-sm);border: 1px solid #E2DDD8;background: #FFFFFF;color:var(--text-secondary);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px;font-family:'Inter',sans-serif;}
    .btn-xs:hover{background:var(--accent);color:#1B1A19;border-color:var(--accent);}
    .btn-xs.danger:hover{background:var(--danger);border-color:var(--danger);}
    /* Capital summary bar */
    .cap-bar{height:10px;border-radius:10px;background:var(--border-light);overflow:hidden;margin:8px 0;}
    .cap-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--accent),var(--success));transition:width .6s;}
    /* Distribution list */
    .dist-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border-light);}
    .dist-item:last-child{border-bottom:none;}
    /* Document grid */
    .doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
    .doc-card{background:var(--border-light);border: 1px solid #E2DDD8;border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:all .15s;}
    .doc-card:hover{border-color:var(--accent);background:var(--accent-light);}
    .doc-icon{font-size:1.5rem;color:var(--accent);margin-bottom:8px;}
    .doc-name{font-size:.8rem;font-weight:600;}
    .doc-sub{font-size:.7rem;color:var(--text-muted);margin-top:3px;}
    /* Edit form */
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .form-group{margin-bottom:0;}
    .form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px;}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border: 1px solid #E2DDD8;border-radius:var(--radius);font-size:.9rem;color: #1B1A19;background: #FFFFFF;outline:none;transition:all .15s;font-family:'Inter',sans-serif;}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.1);}
    /* Modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.open{display:flex;}
    .modal{background: #FFFFFF;border-radius:var(--radius-md);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
    .modal-header{padding:24px 28px 0;display:flex;justify-content:space-between;align-items:center;}
    .modal-title{font-size:1.1rem;font-weight:700;}
    .modal-close{width:32px;height:32px;border:none;background:var(--border-light);border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);}
    .modal-close:hover{background:var(--danger-light);color:var(--danger);}
    .modal-body{padding:20px 28px;}
    .modal-footer{padding:0 28px 24px;display:flex;justify-content:flex-end;gap:10px;}
    /* Investor av */
    .inv-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:white;flex-shrink:0;}
    .av-0{background:linear-gradient(135deg,#0ea5e9,#60a5fa);}
    .av-1{background:linear-gradient(135deg,#10b981,#34d399);}
    .av-2{background:linear-gradient(135deg,#8b5cf6,#a78bfa);}
    .av-3{background:linear-gradient(135deg,#f59e0b,#fbbf24);}
    .av-4{background:linear-gradient(135deg,#ef4444,#f87171);}
    .av-5{background:linear-gradient(135deg,#06b6d4,#22d3ee);}
    .inv-cell{display:flex;align-items:center;gap:10px;}
    .empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);}
    .empty-state i{font-size:2rem;opacity:.3;display:block;margin-bottom:12px;}
    /* .sidebar-overlay CSS moved to dt-global.css */
    .sidebar-overlay.visible{display:block;}
    @media(max-width:900px){.deal-metrics{grid-template-columns:repeat(2,1fr);}}.
    @media(max-width:768px){
      /* sidebar CSS moved to dt-global.css */
      /* .sidebar.open CSS moved to dt-global.css */
      .main{margin-left:0!important;}
      .mobile-menu-btn{display:flex!important;}
      .top-bar{padding:12px 16px;}
      .content{padding:16px;}
      .deal-metrics{grid-template-columns:repeat(2,1fr);}
      .form-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
<div class="app"><aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <!-- Hidden element referenced by JS for GP name -->
  <span id="gpName" style="display:none;"></span>

  <main class="main">
    <header class="top-bar">
      <div class="top-left">
        <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars" style="color:var(--text-secondary);"></i></button>
        <nav class="breadcrumb">
          <a href="javascript:void(0)" onclick="SP.goHome()">Home</a><span class="breadcrumb-sep">/</span>
          <a href="deals.html">Deals</a><span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-current" id="breadcrumbDealName">Deal Detail</span>
        </nav>
      </div>
      <div class="top-actions" id="topActions">
        <a href="deals.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
      </div>
    </header>

    <div class="content" id="mainContent">
      <!-- Injected by JS -->
    </div>
    
    <!-- AI ASSISTANT PITCH CONTAINER -->
    <div id="aiAssistant" style="position:fixed; bottom:80px; right:32px; width:400px; background: #0ea5e9; border:1px solid #0ea5e9; border-radius:12px; padding:20px; box-shadow:var(--shadow-lg); display:none; z-index:100;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <div style="font-weight:700; color:white; display:flex; align-items:center; gap:8px; font-size:0.9rem;">
                <i class="fas fa-robot" style="color:#0ea5e9;"></i> AI Pitch Generator
            </div>
            <button class="btn-xs" onclick="document.getElementById('aiAssistant').style.display='none'">✕</button>
        </div>
        <pre id="pitchScript" style="background:rgba(0,0,0,0.3); padding:12px; border-radius:8px; color:#93c5fd; font-family:'JetBrains Mono'; font-size:0.75rem; white-space:pre-wrap; max-height:300px; overflow-y:auto;"></pre>
        <button class="btn btn-primary" style="width:100%; margin-top:12px; font-size:0.8rem;" onclick="copyPitch()"><i class="fas fa-copy"></i> Copy Script</button>
    </div>
  </main>
</div>

<!-- Add Investor to Deal Modal -->
<div class="modal-overlay" id="addInvModal" onclick="handleAddInvOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title"><i class="fas fa-user-plus" style="color:var(--accent);margin-right:6px;"></i>Add Investor to Deal</h2>
      <button class="modal-close" onclick="closeAddInvModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group" style="margin-bottom:16px;">
        <label>Select Investor *</label>
        <select id="aiInvestorSel" onchange="aiSelectChanged()">
          <option value="">— Choose investor —</option>
          <option value="__new__">+ Create New Investor</option>
        </select>
      </div>
      <!-- Inline new investor form -->
      <div id="aiNewInvForm" style="display:none;background:#F8F6F4;border:1px solid #E2DDD8;border-radius:8px;padding:16px;margin-bottom:16px;">
        <div style="font-size:.78rem;font-weight:700;color:#6B6560;text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px;">New Investor</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div class="form-group"><label>First Name *</label><input type="text" id="aiNewFirst" placeholder="Sarah"></div>
          <div class="form-group"><label>Last Name *</label><input type="text" id="aiNewLast" placeholder="Chen"></div>
        </div>
        <div class="form-group" style="margin-top:8px;"><label>Email *</label><input type="email" id="aiNewEmail" placeholder="sarah@example.com"></div>
        <div class="form-group" style="margin-top:8px;"><label>Phone</label><input type="tel" id="aiNewPhone" placeholder="(555) 123-4567"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label>Committed ($) *</label>
          <input type="number" id="aiCommitted" placeholder="250000" oninput="aiCalcOwnership()">
        </div>
        <div class="form-group">
          <label>Ownership %</label>
          <input type="text" id="aiOwnership" readonly style="background:var(--border-light);">
        </div>
      </div>
      <div class="form-group" style="margin-top:12px;">
        <label>Status</label>
        <select id="aiStatus">
          <option value="committed">Committed</option>
          <option value="funded">Funded</option>
          <option value="active">Active</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAddInvModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveAddInv()"><i class="fas fa-link"></i> Link Investor</button>
    </div>
  </div>
</div>

<script>
SP.requireGP();
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('visible');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('visible');}

const session = SP.getSession();
if(session?.name) { const _gpEl = document.getElementById('gpName'); if(_gpEl) _gpEl.textContent = session.name; }

const urlParams = new URLSearchParams(window.location.search);
const dealId = urlParams.get('id');

let deal = null;

// Immediate check: no deal ID at all → redirect with feedback
if (!dealId) {
  document.getElementById('mainContent').innerHTML = `<div style="text-align:center;padding:80px 20px;color:var(--text-muted,#6B6560);font-family:'Inter',sans-serif;">
    <i class="fas fa-exclamation-triangle" style="font-size:2rem;color:#F37925;display:block;margin-bottom:16px;"></i>
    <h3 style="color:var(--text,#1B1A19);margin-bottom:8px;">No Deal Selected</h3>
    <p>No deal ID was provided in the URL.</p>
    <a href="deals.html" class="btn btn-primary" style="margin-top:16px;display:inline-block;padding:10px 20px;border-radius:8px;background:var(--accent);color:white;text-decoration:none;font-weight:600;">← Back to Deals</a>
  </div>`;
}

// Wait for Firestore data before rendering
SP.onDataReady(render);
window.addEventListener("spdata-ready", render);

// Timeout: if data never loads, show error after 8s
setTimeout(() => {
  if (!deal && dealId) {
    const mc = document.getElementById('mainContent');
    if (mc && !mc.querySelector('.empty-state') && !mc.querySelector('.deal-header')) {
      mc.innerHTML = `<div class="empty-state" style="text-align:center;padding:80px 20px;">
        <i class="fas fa-exclamation-triangle" style="font-size:2rem;color:#ef4444;display:block;margin-bottom:16px;"></i>
        <h3>Deal Not Found</h3>
        <p>Could not load deal "<strong>${dealId}</strong>". It may have been deleted or the link is invalid.</p>
        <a href="deals.html" class="btn btn-primary" style="margin-top:16px;display:inline-block;padding:10px 20px;border-radius:8px;background:var(--accent);color:white;text-decoration:none;font-weight:600;">← Back to Deals</a>
      </div>`;
    }
  }
}, 8000);

function fmt$(n){if(!n)return'$0';if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(0)+'K';return'$'+Number(n).toLocaleString();}
function fmtFull$(n){return'$'+Number(n||0).toLocaleString();}

const STATUS_BADGE = {sourcing:'badge-status-sourcing',loi:'badge-status-loi',dd:'badge-status-dd',operating:'badge-status-operating',closed:'badge-status-closed'};
const STATUS_LABEL = {sourcing:'Sourcing',loi:'LOI',dd:'Due Diligence',operating:'Operating',closed:'Closed'};
const TYPE_LABEL = {multifamily:'Multifamily',industrial:'Industrial',retail:'Retail',office:'Office',other:'Other'};

function render() {
  deal = SP.getDealById(dealId);
  if(!deal) {
    document.getElementById('mainContent').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Deal not found</h3><p><a href="pipeline.html">Back to pipeline</a></p></div>`;
    return;
  }
  document.getElementById('breadcrumbDealName').textContent = deal.name;
  document.getElementById('topActions').innerHTML = `
    <a href="deals.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> All Deals</a>
    <button class="btn btn-danger" onclick="confirmDelete()" style="padding:9px 12px;" title="Delete deal"><i class="fas fa-trash"></i></button>`;

  const linked = deal.investors || [];
  const totalCommitted = linked.reduce((s,i)=>s+(i.committed||0),0);
  const raise = deal.raise || 0;
  const pctRaised = raise > 0 ? Math.min(100,(totalCommitted/raise*100)).toFixed(1) : 0;
  const dists = SP.getDistributions().filter(d=>d.dealId===deal.id);
  const totalDist = dists.reduce((s,d)=>s+(d.totalAmount||0),0);

function generateOANow() {
  const settings = SP.load('settings', {});
  const gpName = settings.firmName || deal.companyName || deal.name + ' GP, LLC';
  const gpRep = settings.gpFullName || SP.getSession()?.name || 'Managing Member';
  const state = deal.state || settings.defState || settings.firmState || 'DE';
  const minInv = deal.minInvestment || settings.defMin || 50000;

  // Build linked investors list for Schedule A
  const linkedInvestors = (deal.investors || []).map(entry => {
    const inv = SP.getInvestorById(entry.investorId) || {};
    return { ...inv, _committed: entry.committed || 0, _ownership: entry.ownership || 0 };
  });

  let oa;
  if (typeof SPDocs !== 'undefined') {
    oa = SPDocs.generateOA(deal, gpName, gpRep, settings.firmAddress || '', state, minInv, linkedInvestors);
  } else {
    oa = '<p>sp-documents.js not loaded.</p>';
  }

  const allDeals = SP.getDeals();
  const idx = allDeals.findIndex(d => d.id === dealId);
  if (idx >= 0) {
    allDeals[idx].generatedOA = oa;
    allDeals[idx].oaGeneratedAt = new Date().toISOString();
    if (typeof SPData !== "undefined" && SPData.isReady()) SPData.saveDeal(allDeals[idx]); else SP.saveDeals(allDeals);
  }
  SP.logActivity('fa-file-contract', 'green', `Operating Agreement generated for <strong>${deal.name}</strong>`);
  if (typeof window._spNotif !== 'undefined' && window._spNotif && window._spNotif.addNotification) {
    window._spNotif.addNotification('doc', 'fa-file-contract', 'green', 'OA Ready', `Operating Agreement generated for ${deal.name}`, `deal-detail.html?id=${dealId}`);
  }
  render();
  // Switch to docs tab
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const docTabBtn = Array.from(document.querySelectorAll('.tab')).find(t => t.textContent.includes('Documents'));
  if (docTabBtn) docTabBtn.classList.add('active');
  document.getElementById('tab-documents')?.classList.add('active');
}

async function requestESignature(investorId) {
  if (typeof SPEsign === 'undefined') { alert('E-signature module not loaded. Ensure sp-esign.js is included.'); return; }
  const inv = SP.getInvestorById(investorId);
  if (!inv) { alert('Investor not found.'); return; }
  if (!inv.email) { alert(`${inv.firstName} ${inv.lastName} has no email address. Add their email first.`); return; }
  
  if (!confirm(`Send subscription agreement to ${inv.firstName} ${inv.lastName} (${inv.email}) for electronic signature?\n\nThis will:\n• Generate a custom sub doc with their details\n• Email them a signing link\n• Track status here automatically`)) return;
  
  const originalBtn = event.currentTarget;
  const originalHtml = originalBtn.innerHTML;
  originalBtn.disabled = true;
  originalBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending…';

  try {
    const result = await SPEsign.sendForSignature(dealId, investorId);
    if (result.success) {
      showToast(`Signing request sent to ${inv.email}!`, 'success');
      // Update the sub status on the deal investor entry
      updateSubStatus(investorId, 'sent');
      // Copy signing URL to clipboard for manual sharing
      if (result.signingUrl) {
        try { await navigator.clipboard.writeText(result.signingUrl); } catch(e) {}
      }
    } else {
      showToast('E-signature failed: ' + result.error, 'error');
    }
  } catch (e) {
    console.error('E-sign error:', e);
    showToast('Error sending e-sign request. Check console for details.', 'error');
  } finally {
    originalBtn.disabled = false;
    originalBtn.innerHTML = originalHtml;
  }
}

function saveEdit() {
  const nameVal = document.getElementById('eName').value.trim();
  if (!nameVal) { alert('Deal name is required.'); document.getElementById('eName').focus(); return; }
  const deals = SP.getDeals();
  const idx = deals.findIndex(d=>d.id===dealId);
  if(idx<0) return;
  deals[idx] = {...deals[idx],
    name: nameVal,
    type: document.getElementById('eType').value,
    status: document.getElementById('eStatus').value,
    location: document.getElementById('eLocation').value.trim(),
    raise: parseFloat(document.getElementById('eRaise').value)||0,
    irr: parseFloat(document.getElementById('eIRR').value)||0,
    equity: parseFloat(document.getElementById('eEM').value)||0,
    units: parseInt(document.getElementById('eUnits').value)||0,
    notes: document.getElementById('eNotes').value.trim(),
    updatedAt: new Date().toISOString(),
  };
  // Always save locally first, then sync to Firestore if available
  SP.saveDeals(deals);
  if (typeof SPData !== 'undefined' && SPData.isReady()) {
    SPData.saveDeal(deals[idx]);
  }
  SP.logActivity('fa-edit','amber',`<strong>${deals[idx].name}</strong> deal details updated`);
  showToast('Deal saved!', 'success');
  render();
  // Re-activate edit tab after re-render
  setTimeout(() => {
    const editTab = Array.from(document.querySelectorAll('.tab')).find(t => t.textContent.includes('Edit'));
    if (editTab) { editTab.click(); }
  }, 50);
}

function importInvestorToCRM(invId) {
  const name = prompt('Add this investor to CRM. Enter their full name:');
  if (!name) return;
  const email = prompt('Email address:');
  if (!email) return;
  const parts = name.trim().split(' ');
  const inv = {
    id: invId, firstName: parts[0]||'', lastName: parts.slice(1).join(' ')||'',
    email, phone:'', address:'', accredMethod:'', accredStatus:'pending',
    totalInvested:0, deals:1, status:'active', notes:`Imported from deal: ${deal.name}`
  };
  const investors = SP.getInvestors();
  if (!investors.find(i=>i.id===invId)) { investors.unshift(inv); SP.saveInvestors(investors); }
  SP.logActivity('fa-user-plus','green',`<strong>${name}</strong> added to CRM from deal`);
  render();
}

async function sendForSignature(invId) {
  const inv = SP.getInvestorById(invId);
  if (!inv) { alert('Investor not found.'); return; }
  
  // Check if already sent
  if (typeof SPEsign !== 'undefined') {
    const existing = SPEsign.getRequestForInvestor(dealId, invId);
    if (existing) {
      if (!confirm(`A signing request was already sent to ${inv.email} on ${new Date(existing.sentAt).toLocaleDateString()}.\n\nSend another one?`)) return;
    }
  }
  
  const deal = SP.getDealById(dealId);
  const settings = SP.load('settings', {});
  if (!confirm(`Send Subscription Agreement to ${inv.firstName} ${inv.lastName} (${inv.email}) for ${deal.name}?`)) return;
  
  const result = await SPEsign.createSubscriptionAgreement(deal, inv, {
    name: settings.firmName || 'GP',
    email: settings.gpEmail || ''
  });
  
  if (result.success) {
    alert(`✅ Signing request sent to ${result.sentTo}\n\nThey'll receive an email with a link to sign the subscription agreement.`);
    render(); // refresh to show signature status
  } else {
    alert(`❌ Failed to send: ${result.error}`);
  }
}

function removeInvestor(invId) {
  if(!confirm('Remove this investor from the deal?')) return;
  SP.removeInvestorFromDeal(dealId, invId);
  recalcOwnership();
  render();
}

function confirmDelete() {
  if(!confirm(`Delete "${deal.name}"? This cannot be undone.`)) return;
  const deals = SP.getDeals().filter(d=>d.id!==dealId);
  SP.saveDeals(deals);
  window.location.href = 'pipeline.html';
}

// Add investor modal
// ── Generate invite link for this deal ─────────────────────────────────────
async function generateInviteLink() {
  const deal = SP.getDealById(dealId);
  if (!deal) return;

  const db = firebase.firestore();
  const orgId = SP.getSession()?.orgId || 'deeltrack_demo';

  // Generate a unique token
  const token = 'inv_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);

  // Store invite in org's deal_invites collection
  await db.collection('orgs').doc(orgId).collection('deal_invites').doc(token).set({
    dealId: deal.id,
    dealName: deal.name,
    token,
    orgId,
    status: 'active',
    minInvest: deal.minInvest || 25000,
    maxInvest: deal.maxInvest || deal.raise || 5000000,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    createdBy: SP.getSession()?.email || '',
  });

  // Also store global lookup for invest.html to find the invite
  await db.collection('_invites').doc(token).set({
    orgId,
    dealId: deal.id,
  }).catch(() => {
    // Global collection may not exist or may be blocked by rules — that's ok
    // invest.html falls back to checking deeltrack_demo directly
  });

  const url = `${window.location.origin}/invest.html?t=${token}`;

  // Copy to clipboard
  try { await navigator.clipboard.writeText(url); } catch(e) {}

  // Build investor checkboxes for email sending
  const investors = SP.getInvestors();
  const invCheckboxes = investors.map(inv =>
    `<label style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #E2DDD8;border-radius:6px;font-size:.82rem;cursor:pointer;margin-bottom:4px;">
      <input type="checkbox" value="${inv.id}" class="inv-send-check">
      <span><strong>${inv.firstName} ${inv.lastName}</strong> — ${inv.email}</span>
    </label>`
  ).join('');

  // Show modal with copy link + send to investors
  const overlay = document.createElement('div');
  overlay.id = 'inviteLinkModal';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;overflow-y:auto;padding:20px;';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:12px;padding:28px;max-width:560px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);">
      <h3 style="margin-bottom:4px;"><i class="fas fa-link" style="color:#F37925;margin-right:8px;"></i>Deal Invite — ${deal.name}</h3>
      <p style="font-size:.82rem;color:#6B6560;margin-bottom:16px;">Share this link or email it directly to investors.</p>

      <div style="display:flex;gap:8px;margin-bottom:20px;">
        <input type="text" value="${url}" readonly id="inviteLinkInput" style="flex:1;padding:10px 12px;border:1px solid #E2DDD8;border-radius:8px;font-size:.78rem;font-family:'JetBrains Mono',monospace;background:#F3F3F3;color:#1B1A19;">
        <button onclick="navigator.clipboard.writeText('${url}');this.innerHTML='<i class=\\'fas fa-check\\'></i> Copied!';this.style.background='#2D9A6B';this.style.color='white';" style="padding:10px 16px;border:1px solid #E2DDD8;border-radius:8px;background:white;cursor:pointer;font-weight:600;font-size:.82rem;white-space:nowrap;">
          <i class="fas fa-copy"></i> Copy
        </button>
      </div>

      <div style="border-top:1px solid #E2DDD8;padding-top:16px;margin-bottom:12px;">
        <h4 style="font-size:.9rem;margin-bottom:8px;"><i class="fas fa-envelope" style="color:#F37925;margin-right:6px;"></i>Email Invite to Investors</h4>
        <p style="font-size:.78rem;color:#6B6560;margin-bottom:12px;">Select investors to email the deal invite with terms and a link to commit.</p>
        <div style="max-height:200px;overflow-y:auto;margin-bottom:12px;" id="invSendList">
          ${invCheckboxes}
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <button onclick="_selectAllInv()" style="padding:6px 12px;border:1px solid #E2DDD8;border-radius:6px;background:white;cursor:pointer;font-size:.75rem;font-weight:600;">Select All</button>
          <button onclick="_sendInviteEmails('${url}','${token}')" id="sendInvBtn" style="padding:8px 16px;border:none;border-radius:8px;background:#F37925;color:white;cursor:pointer;font-weight:600;font-size:.82rem;">
            <i class="fas fa-paper-plane"></i> Send Invite Emails
          </button>
          <span id="sendInvStatus" style="font-size:.78rem;color:#6B6560;"></span>
        </div>
      </div>

      <div style="text-align:right;border-top:1px solid #E2DDD8;padding-top:16px;">
        <button onclick="document.getElementById('inviteLinkModal').remove();" style="padding:8px 18px;border:1px solid #E2DDD8;border-radius:8px;background:white;cursor:pointer;font-weight:600;font-size:.82rem;">Close</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

function _selectAllInv() {
  document.querySelectorAll('.inv-send-check').forEach(cb => cb.checked = true);
}

async function _sendInviteEmails(url, token) {
  const btn = document.getElementById('sendInvBtn');
  const status = document.getElementById('sendInvStatus');
  const checked = Array.from(document.querySelectorAll('.inv-send-check:checked'));
  if (!checked.length) { status.textContent = 'Select at least one investor'; return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
  status.textContent = '';

  const allInvestors = SP.getInvestors();
  const selected = checked.map(cb => allInvestors.find(i => i.id === cb.value)).filter(Boolean);
  const deal = SP.getDealById(dealId);

  // Get OM summary if available
  const omData = SP.load('om_builder', {});
  const omSummary = omData.omExecSummary || omData.omDescription || '';

  try {
    if (typeof SPEmail !== 'undefined' && SPEmail.sendDealInvite) {
      const results = await SPEmail.sendDealInvite(deal, url, selected, omSummary);
      const sent = results.filter(r => r.status === 'sent').length;
      const suppressed = results.filter(r => r.status === 'suppressed').length;
      if (sent > 0) {
        status.innerHTML = `<span style="color:#2D9A6B;">✓ Sent to ${sent} investor${sent!==1?'s':''}</span>`;
      } else if (suppressed > 0) {
        status.innerHTML = `<span style="color:#E8890A;">⚠ Demo mode — ${suppressed} email${suppressed!==1?'s':''} suppressed</span>`;
      }
    } else {
      status.textContent = 'Email system not loaded';
    }
  } catch(e) {
    status.innerHTML = `<span style="color:#D94F3D;">Error: ${e.message}</span>`;
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Invite Emails';
}

function openAddInvModal() {
  const investors = SP.getInvestors();
  const linked = (SP.getDealById(dealId)?.investors||[]).map(i=>i.investorId);
  const sel = document.getElementById('aiInvestorSel');
  sel.innerHTML = '<option value="">— Choose investor —</option>' +
    investors.map(inv=>`<option value="${inv.id}" ${linked.includes(inv.id)?'disabled':''} data-name="${inv.firstName} ${inv.lastName}">${inv.firstName} ${inv.lastName}${linked.includes(inv.id)?' (already linked)':''}</option>`).join('');
  document.getElementById('aiCommitted').value='';
  document.getElementById('aiOwnership').value='';
  document.getElementById('addInvModal').classList.add('open');
}
function closeAddInvModal(){document.getElementById('addInvModal').classList.remove('open');}
function handleAddInvOverlay(e){if(e.target===document.getElementById('addInvModal'))closeAddInvModal();}

function aiSelectChanged() {
  const val = document.getElementById('aiInvestorSel').value;
  document.getElementById('aiNewInvForm').style.display = val === '__new__' ? '' : 'none';
}
function aiCalcOwnership() {
  const d = SP.getDealById(dealId);
  const currentCommitted = (d?.investors||[]).reduce((s,i) => s + (i.committed||0), 0);
  const newCommitted = parseFloat(document.getElementById('aiCommitted').value)||0;
  const totalAfter = currentCommitted + newCommitted;
  document.getElementById('aiOwnership').value = totalAfter > 0 && newCommitted > 0
    ? (newCommitted / totalAfter * 100).toFixed(2) + '%'
    : '';
}

function saveAddInv() {
  let invId = document.getElementById('aiInvestorSel').value;
  const committed = parseFloat(document.getElementById('aiCommitted').value)||0;
  const status = document.getElementById('aiStatus').value;

  // Create new investor if selected
  if (invId === '__new__') {
    const first = document.getElementById('aiNewFirst').value.trim();
    const last = document.getElementById('aiNewLast').value.trim();
    const email = document.getElementById('aiNewEmail').value.trim();
    const phone = document.getElementById('aiNewPhone').value.trim();
    if (!first || !last) { alert('Enter first and last name.'); return; }
    if (!email) { alert('Enter an email address.'); return; }

    // Check for duplicate email
    const existing = SP.getInvestors().find(i => i.email && i.email.toLowerCase() === email.toLowerCase());
    if (existing) { alert(`An investor with email ${email} already exists (${existing.firstName} ${existing.lastName}). Select them from the dropdown instead.`); return; }

    // Create the investor in the CRM
    const newInv = {
      id: 'i' + Date.now(),
      firstName: first,
      lastName: last,
      email,
      phone,
      accreditation: 'pending',
      status: 'active',
      addedAt: new Date().toISOString(),
    };
    const investors = SP.getInvestors();
    investors.push(newInv);
    SP.save('investors', investors);
    invId = newInv.id;
  }

  if(!invId){alert('Select an investor.');return;}
  if(!committed){alert('Enter committed amount.');return;}

  // Add investor to deal (ownership will be recalculated below)
  SP.addInvestorToDeal(dealId,{investorId:invId,committed,ownership:0,status,linkedAt:new Date().toISOString()});

  // Recalculate ALL investors' ownership based on total committed (not target raise)
  recalcOwnership();

  const inv = SP.getInvestorById(invId);
  SP.logActivity('fa-link','blue',`<strong>${inv?.firstName} ${inv?.lastName}</strong> linked to <strong>${deal?.name}</strong>`);
  closeAddInvModal();
  render();
}

function recalcOwnership() {
  const allDeals = SP.getDeals();
  const d = allDeals.find(x => x.id === dealId);
  if (!d || !d.investors || !d.investors.length) return;
  const totalCommitted = d.investors.reduce((s, i) => s + (i.committed || 0), 0);
  if (totalCommitted <= 0) return;
  d.investors.forEach(i => {
    i.ownership = parseFloat(((i.committed || 0) / totalCommitted * 100).toFixed(4));
  });
  SP.save('deals', allDeals);
}

function markFormDFiled(dealId) {
  const allDeals = SP.getDeals();
  const d = allDeals.find(x=>x.id===dealId);
  if(!d) return;
  d.formDFiled = new Date().toISOString();
  SP.saveDeals(allDeals);
  SP.logActivity('fa-landmark','green',`Form D marked as filed for <strong>${d.name}</strong>`);
  render();
}

async function generateAI() {
  const aiBox = document.getElementById('aiAssistant');
  aiBox.style.display = 'block';
  aiBox.scrollIntoView({ behavior: 'smooth' });
  const script = await SPAI.generatePitchSystem(dealId);
  document.getElementById('pitchScript').textContent = script;
}

function copyPitch() {
  const text = document.getElementById('pitchScript').textContent;
  navigator.clipboard.writeText(text);
  showToast('Pitch copied to clipboard!', 'success');
}

function duplicateDeal(id) {
  const allDeals = SP.getDeals();
  const d = allDeals.find(x=>x.id===id);
  if(!d) return;
  const copy = {...d, id:'d'+Date.now(), name:d.name + ' (Copy)', investors:[], documents:[], generatedOA:null, oaGeneratedAt:null, added:new Date().toISOString().split('T')[0]};
  allDeals.unshift(copy);
  if (typeof SPData !== "undefined" && SPData.isReady()) SPData.saveDeal(copy); else SP.saveDeals(allDeals);
  SP.logActivity('fa-copy','blue',`<strong>${copy.name}</strong> duplicated from ${d.name}`);
  window.location.href = `deal-detail.html?id=${copy.id}`;
}

function shareTeaserLink(dId) {
  const orgId = SP.getOrgId ? SP.getOrgId() : (SP.getSession()?.orgId || 'demo');
  const timestamp = Date.now().toString(36);
  const random = Math.random().toString(36).substring(2, 8);
  const token = btoa(`${orgId}|${dId}|${timestamp}|${random}`).replace(/=/g,'').substring(0, 32);
  const base = window.location.href.replace(/deal-detail\.html.*/, '');
  const url = `${base}deal-teaser.html?t=${token}`;
  navigator.clipboard.writeText(url).then(() => {
    // Show toast
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:8px;font-size:.875rem;font-weight:600;background:#10b981;color:white;box-shadow:0 8px 24px rgba(0,0,0,.15);display:flex;align-items:center;gap:8px;';
    t.innerHTML = '<i class="fas fa-check-circle"></i> Teaser link copied to clipboard!';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }).catch(() => { prompt('Copy this teaser link:', url); });
}

// ── Shared toast helper ─────────────────────────────────────────────────────
function showToast(msg, type) {
  const bg = type === 'error' ? '#ef4444' : '#10b981';
  const icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:8px;font-size:.875rem;font-weight:600;background:${bg};color:white;box-shadow:0 8px 24px rgba(0,0,0,.15);display:flex;align-items:center;gap:8px;font-family:'Inter',sans-serif;transition:opacity .3s;`;
  t.innerHTML = `<i class="fas ${icon}"></i>${msg}`;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(() => t.remove(), 300); }, 2500);
}

if(!dealId) {
  window.location.href='deals.html';
} else {
  // Wait for Firestore data before first render
  function _initialRender() {
    if (SP.getDealById(dealId)) { render(); }
    else {
      // Show a loading placeholder while data loads
      document.getElementById('mainContent').innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text-muted);">
        <i class="fas fa-spinner fa-spin" style="font-size:2rem;margin-bottom:12px;display:block;"></i>
        <p>Loading deal data…</p>
      </div>`;
    }
  }
  SP.onDataReady(_initialRender);
}
</script>
