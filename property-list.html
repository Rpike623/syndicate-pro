<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Property List </title>
  <script src="js/sp-core.js?v3"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-list"></i> Property List</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="PropList.showModal()"><i class="fas fa-plus"></i> Add Property</button>
      </div>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Properties</span><span class="stat-value" id="statCount">0</span></div>
        <div class="stat-card"><span class="stat-label">Total Units</span><span class="stat-value" id="statUnits">0</span></div>
        <div class="stat-card"><span class="stat-label">Total SF</span><span class="stat-value" id="statSf">0</span></div>
        <div class="stat-card"><span class="stat-label">Avg Occupancy</span><span class="stat-value" id="statOcc">0%</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>All Properties</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Property</th><th>Type</th><th>Units</th><th>SF</th><th>Occupancy</th><th>NOI</th><th>Value</th></tr></thead><tbody id="propTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <div id="propModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header"><h2>Add Property</h2><button class="close" onclick="PropList.closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Property Name</label><input type="text" id="pName" class="form-input"></div>
        <div class="form-row">
          <div class="form-group"><label>Type</label><select id="pType" class="form-select"><option>Multifamily</option><option>Office</option><option>Industrial</option><option>Retail</option></select></div>
          <div class="form-group"><label>Units</label><input type="number" id="pUnits" class="form-input"></div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="PropList.closeModal()">Cancel</button><button class="btn btn-primary" onclick="PropList.save()">Save</button></div>
    </div>
  </div>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}PropList.init();}</script>
  <script src="js/sp-property-list.js"></script>
</body>
</html>
