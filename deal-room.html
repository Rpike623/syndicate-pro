<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deal Room | Deeltrack</title>
  <script src="js/sp-core.js"></script>
  <script src="js/sp-firebase.js"></script>
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
      </button>
      <h1><i class="fas fa-folder-open"></i> Deal Room</h1>
      <div class="header-actions">
        <select id="dealSelect" class="form-select" onchange="DealRoom.loadDeal()" style="width:auto;min-width:200px;">
          <option value="">Select a deal...</option>
        </select>
      </div>
    </div>

    <div class="content" id="dealContent" style="display:none;">
      <!-- Deal Info -->
      <div class="deal-room-header">
        <div class="deal-info">
          <h2 id="dealName">Deal Name</h2>
          <p id="dealAddress">Address</p>
          <div class="deal-meta">
            <span><i class="fas fa-users"></i> <span id="dealInvestors">0</span> Investors</span>
            <span><i class="fas fa-dollar-sign"></i> <span id="dealEquity">$0</span> Equity</span>
            <span><i class="fas fa-building"></i> <span id="dealType">—</span></span>
          </div>
        </div>
        <div class="deal-actions">
          <button class="btn btn-secondary" onclick="DealRoom.shareRoom()">
            <i class="fas fa-share-alt"></i> Share
          </button>
          <button class="btn btn-primary" onclick="DealRoom.uploadDoc()">
            <i class="fas fa-upload"></i> Upload
          </button>
        </div>
      </div>

      <!-- Tabs -->
      <div class="dr-tabs">
        <button class="dr-tab active" data-tab="documents" onclick="DealRoom.switchTab('documents')">
          <i class="fas fa-file"></i> Documents
        </button>
        <button class="dr-tab" data-tab="investors" onclick="DealRoom.switchTab('investors')">
          <i class="fas fa-users"></i> Investors
        </button>
        <button class="dr-tab" data-tab="activity" onclick="DealRoom.switchTab('activity')">
          <i class="fas fa-history"></i> Activity
        </button>
      </div>

      <!-- Documents Tab -->
      <div class="dr-tab-content" id="tab-documents">
        <div class="doc-categories">
          <div class="doc-category">
            <div class="cat-header">
              <h3><i class="fas fa-gavel"></i> Legal</h3>
              <span class="doc-count" id="countLegal">0</span>
            </div>
            <div class="doc-list" id="docsLegal"></div>
          </div>
          <div class="doc-category">
            <div class="cat-header">
              <h3><i class="fas fa-chart-line"></i> Financial</h3>
              <span class="doc-count" id="countFinancial">0</span>
            </div>
            <div class="doc-list" id="docsFinancial"></div>
          </div>
          <div class="doc-category">
            <div class="cat-header">
              <h3><i class="fas fa-image"></i> Property</h3>
              <span class="doc-count" id="countProperty">0</span>
            </div>
            <div class="doc-list" id="docsProperty"></div>
          </div>
          <div class="doc-category">
            <div class="cat-header">
              <h3><i class="fas fa-envelope"></i> Correspondence</h3>
              <span class="doc-count" id="countCorrespondence">0</span>
            </div>
            <div class="doc-list" id="docsCorrespondence"></div>
          </div>
        </div>
      </div>

      <!-- Investors Tab -->
      <div class="dr-tab-content" id="tab-investors" style="display:none;">
        <div class="card">
          <div class="card-header">
            <h2>Investors in this deal</h2>
          </div>
          <div class="card-body">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Investor</th>
                  <th>Investment</th>
                  <th>Ownership</th>
                  <th>Status</th>
                  <th class="text-center">Documents</th>
                </tr>
              </thead>
              <tbody id="investorTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Activity Tab -->
      <div class="dr-tab-content" id="tab-activity" style="display:none;">
        <div class="activity-feed" id="activityFeed"></div>
      </div>
    </div>

    <!-- Empty State -->
    <div class="content" id="emptyState">
      <div class="empty-state">
        <i class="fas fa-folder-open"></i>
        <h3>Select a Deal</h3>
        <p>Choose a deal from the dropdown to view its deal room</p>
      </div>
    </div>
  </main>

  <!-- Upload Modal -->
  <div id="uploadModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2><i class="fas fa-upload"></i> Upload Document</h2>
        <button class="close" onclick="DealRoom.closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Document Name</label>
          <input type="text" id="docName" class="form-input" placeholder="e.g., Purchase Agreement">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="docCategory" class="form-select">
            <option value="legal">Legal</option>
            <option value="financial">Financial</option>
            <option value="property">Property</option>
            <option value="correspondence">Correspondence</option>
          </select>
        </div>
        <div class="form-group">
          <label>File</label>
          <input type="file" id="docFile" class="form-input" accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.png">
        </div>
        <div class="form-group">
          <label>Access Level</label>
          <select id="docAccess" class="form-select">
            <option value="all">All Investors</option>
            <option value="gp">GP Only</option>
            <option value="select">Select Investors</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="DealRoom.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="DealRoom.saveDoc()">
          <i class="fas fa-upload"></i> Upload
        </button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.SP && SP.isLoggedIn) {
        initPage();
      } else {
        document.addEventListener('sp-ready', initPage);
      }
    });

    function initPage() {
      if (!SP.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }
      DealRoom.init();
    }
  </script>
  <script src="js/sp-deal-room.js"></script>
</body>
</html>
