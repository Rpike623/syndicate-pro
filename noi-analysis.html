<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOI Analysis | Deeltrack</title>
  <script src="js/sp-core.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-chart-pie"></i> NOI Analysis</h1>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Total NOI</span><span class="stat-value" id="statNoi">$0</span></div>
        <div class="stat-card"><span class="stat-label">YoY Change</span><span class="stat-value text-success" id="statYoy">+8.2%</span></div>
        <div class="stat-card"><span class="stat-label">Avg Cap Rate</span><span class="stat-value" id="statCap">6.1%</span></div>
        <div class="stat-card"><span class="stat-label">Value</span><span class="stat-value" id="statValue">$0</span></div>
      </div>
      <div class="grid-2">
        <div class="card">
          <div class="card-header"><h2>NOI by Property</h2></div>
          <div class="card-body"><canvas id="noiChart" height="200"></canvas></div>
        </div>
        <div class="card">
          <div class="card-header"><h2>NOI Trend</h2></div>
          <div class="card-body"><canvas id="trendChart" height="200"></canvas></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Details</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Property</th><th>Gross Income</th><th>Expenses</th><th>NOI</th><th>Cap Rate</th><th>Value</th></tr></thead><tbody id="noiTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}NOI.init();}</script>
  <script src="js/sp-noi.js"></script>
</body>
</html>
