<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Accreditation Compliance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/dt-global.css">
  <script src="js/sp-core.js?v13"></script>
  <script src="js/sp-data.js?v13"></script>
  <script src="js/sp-firebase.js?v13"></script>
  <link rel="stylesheet" href="contrast-fix.css">
  <style>
    .top-bar { background: #FFFFFF; border-bottom: 1px solid #E2DDD8; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
    .top-left { display: flex; align-items: center; gap: 16px; }
    .mobile-menu-btn { display: none; background: none; border: 1px solid #E2DDD8; border-radius: 8px; padding: 8px 10px; cursor: pointer; }
    .page-title-bar h1 { font-size: 1.25rem; font-weight: 700; }
    .page-title-bar p { font-size: 0.8rem; color: #6B6560; }
    .content { padding: 32px; }
    .alert-banner { background: linear-gradient(135deg, #fef3c7, #fde68a); border: 1px solid #f59e0b; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .alert-banner i { font-size: 1.5rem; color: #d97706; }
    .compliance-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
    .compliance-card { background: #FFFFFF; border-radius: 12px; padding: 24px; border: 1px solid #E2DDD8; text-align: center; }
    .compliance-value { font-size: 2.5rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .compliance-value.verified { color: #2D9A6B; }
    .compliance-value.pending { color: #E8890A; }
    .compliance-value.expired { color: #D94F3D; }
    .compliance-label { color: #6B6560; font-size: 0.875rem; margin-top: 8px; }
    .filters { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .filters select, .filters input { padding: 10px 16px; border: 1px solid #E2DDD8; border-radius: 8px; font-family: inherit; font-size: 0.875rem; }
    .investor-table { background: #FFFFFF; border-radius: 12px; border: 1px solid #E2DDD8; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #F7F4F0; padding: 14px 16px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: #6B6560; font-weight: 600; letter-spacing: 0.04em; }
    td { padding: 14px 16px; border-bottom: 1px solid #E2DDD8; font-size: 0.875rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #F7F4F0; }
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; display: inline-block; }
    .status-verified { background: rgba(45,154,107,0.12); color: #1A7A50; }
    .status-pending { background: rgba(232,137,10,0.12); color: #B06D08; }
    .status-expired { background: rgba(217,79,61,0.12); color: #A13B2C; }
    .empty-state { text-align: center; padding: 48px 24px; color: #6B6560; }
    .empty-state i { font-size: 2rem; color: #E2DDD8; margin-bottom: 12px; }
    @media (max-width: 768px) {
      .main { margin-left: 0 !important; width: 100% !important; }
      .sidebar, #sidebar { transform: translateX(-100%) !important; position: fixed !important; z-index: 100 !important; }
      .sidebar.open, #sidebar.open { transform: translateX(0) !important; }
      .mobile-menu-btn { display: flex !important; }
      .top-bar { padding: 12px 16px; }
      .content { padding: 16px; }
      .compliance-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main" id="main">
    <header class="top-bar">
      <div class="top-left">
        <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars" style="color:#6B6560;"></i></button>
        <div class="page-title-bar">
          <h1>Accreditation Compliance</h1>
          <p>Track investor qualification status for Reg D offerings</p>
        </div>
      </div>
    </header>

    <div class="content">
      <div class="alert-banner" id="alertBanner" style="display:none;">
        <i class="fas fa-exclamation-triangle"></i>
        <div>
          <strong>506(c) Offering Active</strong>
          <p style="font-size:0.875rem;color:#92400e;" id="alertText"></p>
        </div>
      </div>

      <div class="compliance-grid">
        <div class="compliance-card">
          <div class="compliance-value verified" id="verifiedCount">—</div>
          <div class="compliance-label">Verified Accredited</div>
        </div>
        <div class="compliance-card">
          <div class="compliance-value pending" id="pendingCount">—</div>
          <div class="compliance-label">Pending Verification</div>
        </div>
        <div class="compliance-card">
          <div class="compliance-value" style="color:#F37925;" id="expiringCount">—</div>
          <div class="compliance-label">Expiring (30 days)</div>
        </div>
        <div class="compliance-card">
          <div class="compliance-value expired" id="expiredCount">—</div>
          <div class="compliance-label">Expired</div>
        </div>
      </div>

      <div class="filters">
        <select id="statusFilter" onchange="render()">
          <option value="">All Statuses</option>
          <option value="verified">Verified</option>
          <option value="pending">Pending</option>
          <option value="expired">Expired</option>
        </select>
        <select id="methodFilter" onchange="render()">
          <option value="">All Methods</option>
          <option value="cpa">CPA Letter</option>
          <option value="attorney">Attorney Letter</option>
          <option value="entity">Entity Verification</option>
          <option value="self">Self-Certification</option>
        </select>
        <input type="text" placeholder="Search investors..." id="searchInput" oninput="render()">
      </div>

      <div class="investor-table" id="investorTable">
        <div class="empty-state">
          <i class="fas fa-shield-alt"></i>
          <p>Loading investor data...</p>
        </div>
      </div>
    </div>
  </main>

  <script>
    let investors = [];

    function load() {
      investors = (SP.getInvestors() || []).filter(i => !/^QA\b|^XSS/i.test((i.firstName||'')+' '+(i.lastName||'')) && !/Test$/i.test((i.lastName||'')));
      render();
    }

    function getAccredStatus(inv) {
      if (!inv.accredStatus || inv.accredStatus === 'none') return 'pending';
      if (inv.accredStatus === 'verified' || inv.accredStatus === 'active') {
        // Check expiry
        if (inv.accredExpiry) {
          const exp = new Date(inv.accredExpiry);
          const now = new Date();
          if (exp < now) return 'expired';
          const daysLeft = (exp - now) / (1000 * 60 * 60 * 24);
          if (daysLeft <= 30) return 'expiring';
        }
        return 'verified';
      }
      return inv.accredStatus;
    }

    function render() {
      const statusFilter = document.getElementById('statusFilter').value;
      const methodFilter = document.getElementById('methodFilter').value;
      const search = document.getElementById('searchInput').value.toLowerCase();

      let filtered = investors.map(inv => ({ ...inv, _status: getAccredStatus(inv) }));

      if (statusFilter) {
        filtered = filtered.filter(i => i._status === statusFilter);
      }
      if (methodFilter) {
        filtered = filtered.filter(i => (i.accredMethod || '').toLowerCase() === methodFilter);
      }
      if (search) {
        filtered = filtered.filter(i =>
          (i.firstName + ' ' + i.lastName).toLowerCase().includes(search) ||
          (i.email || '').toLowerCase().includes(search)
        );
      }

      // Update KPIs
      const all = investors.map(inv => getAccredStatus(inv));
      document.getElementById('verifiedCount').textContent = all.filter(s => s === 'verified').length;
      document.getElementById('pendingCount').textContent = all.filter(s => s === 'pending').length;
      document.getElementById('expiringCount').textContent = all.filter(s => s === 'expiring').length;
      document.getElementById('expiredCount').textContent = all.filter(s => s === 'expired').length;

      // Alert banner
      const pending = all.filter(s => s === 'pending' || s === 'expired').length;
      const banner = document.getElementById('alertBanner');
      if (pending > 0) {
        banner.style.display = 'flex';
        document.getElementById('alertText').textContent =
          `All investors must be verified as accredited before receiving offering materials. ${pending} investor(s) need attention.`;
      } else {
        banner.style.display = 'none';
      }

      // Table
      const table = document.getElementById('investorTable');
      if (filtered.length === 0) {
        table.innerHTML = '<div class="empty-state"><i class="fas fa-shield-alt"></i><p>No investors match your filters.</p></div>';
        return;
      }

      const METHOD_LABELS = {cpa:'CPA Letter',attorney:'Attorney Letter',entity:'Entity Verification',self:'Self-Certification',broker:'Broker-Dealer'};
      function fmtDateUTC(d) { if (!d) return '—'; try { const dt = new Date(d); return dt.toLocaleDateString('en-US',{timeZone:'UTC'}); } catch(e) { return d; } }
      let html = '<table><thead><tr><th>Investor</th><th>Method</th><th>Status</th><th>Verified Date</th><th>Expiry</th><th>Actions</th></tr></thead><tbody>';
      filtered.forEach(inv => {
        const name = (inv.firstName || '') + ' ' + (inv.lastName || '');
        const method = METHOD_LABELS[(inv.accredMethod||'').toLowerCase()] || inv.accredMethod || '—';
        const status = inv._status;
        const badgeClass = status === 'verified' ? 'status-verified' : status === 'expired' ? 'status-expired' : 'status-pending';
        const label = status.charAt(0).toUpperCase() + status.slice(1);
        const date = fmtDateUTC(inv.accredDate);
        const expiry = fmtDateUTC(inv.accredExpiry);
        html += `<tr>
          <td><strong>${name}</strong><br><span style="color:#6B6560;font-size:0.8rem;">${inv.email || ''}</span></td>
          <td>${method}</td>
          <td><span class="status-badge ${badgeClass}">${label}</span></td>
          <td>${date}</td>
          <td>${expiry}</td>
          <td><button onclick="openAccredModal('${inv.id}')" style="background:var(--accent);color:white;border:none;border-radius:6px;padding:6px 12px;font-size:.75rem;font-weight:600;cursor:pointer;font-family:inherit;">Verify / Edit</button></td>
        </tr>`;
      });
      html += '</tbody></table>';
      table.innerHTML = html;
    }

    // ── Verify / Edit Modal ──────────────────────────────────
    let _editInvId = null;
    function openAccredModal(id) {
      _editInvId = id;
      const inv = investors.find(i => i.id === id);
      if (!inv) return;
      document.getElementById('accredModalName').textContent = (inv.firstName||'')+' '+(inv.lastName||'');
      document.getElementById('accredModalMethod').value = inv.accredMethod || '';
      document.getElementById('accredModalStatus').value = inv.accredStatus || 'pending';
      document.getElementById('accredModalDate').value = inv.accredDate || new Date().toISOString().slice(0,10);
      document.getElementById('accredModalExpiry').value = inv.accredExpiry || '';
      document.getElementById('accredModal').style.display = 'flex';
    }
    function closeAccredModal() { document.getElementById('accredModal').style.display = 'none'; _editInvId = null; }
    function saveAccred() {
      if (!_editInvId) return;
      const inv = investors.find(i => i.id === _editInvId);
      if (!inv) return;
      inv.accredMethod = document.getElementById('accredModalMethod').value;
      inv.accredStatus = document.getElementById('accredModalStatus').value;
      inv.accredDate = document.getElementById('accredModalDate').value;
      inv.accredExpiry = document.getElementById('accredModalExpiry').value;
      SP.save('investors', investors);
      closeAccredModal();
      render();
      // Show saved toast
      const t = document.createElement('div');
      t.style.cssText='position:fixed;bottom:24px;right:24px;background:#2D9A6B;color:white;padding:12px 20px;border-radius:8px;font-weight:600;font-size:.85rem;z-index:9999;';
      t.textContent='✓ Accreditation updated';
      document.body.appendChild(t);
      setTimeout(()=>t.remove(),3000);
    }

    // Wait for data
    window.addEventListener('spdata-ready', load);
    if (typeof SP !== 'undefined' && SP.getInvestors) {
      try { const inv = SP.getInvestors(); if (inv && inv.length) load(); } catch(e) {}
    }
  </script>

  <!-- Accreditation Edit Modal -->
  <div id="accredModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;align-items:center;justify-content:center;">
    <div style="background:white;border-radius:12px;padding:28px;max-width:440px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h3 style="font-size:1rem;font-weight:700;" id="accredModalName">Investor</h3>
        <button onclick="closeAccredModal()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;color:#6B6560;">&times;</button>
      </div>
      <div style="margin-bottom:14px;">
        <label style="display:block;font-size:.78rem;font-weight:600;color:#6B6560;margin-bottom:6px;">Verification Method</label>
        <select id="accredModalMethod" style="width:100%;padding:10px;border:1px solid #E2DDD8;border-radius:8px;font-family:inherit;font-size:.875rem;">
          <option value="">— Select —</option>
          <option value="cpa">CPA Letter</option>
          <option value="attorney">Attorney Letter</option>
          <option value="entity">Entity Verification</option>
          <option value="self">Self-Certification</option>
          <option value="broker">Broker-Dealer</option>
        </select>
      </div>
      <div style="margin-bottom:14px;">
        <label style="display:block;font-size:.78rem;font-weight:600;color:#6B6560;margin-bottom:6px;">Status</label>
        <select id="accredModalStatus" style="width:100%;padding:10px;border:1px solid #E2DDD8;border-radius:8px;font-family:inherit;font-size:.875rem;">
          <option value="pending">Pending</option>
          <option value="verified">Verified</option>
          <option value="expired">Expired</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
      <div style="margin-bottom:14px;">
        <label style="display:block;font-size:.78rem;font-weight:600;color:#6B6560;margin-bottom:6px;">Verified Date</label>
        <input type="date" id="accredModalDate" style="width:100%;padding:10px;border:1px solid #E2DDD8;border-radius:8px;font-family:inherit;font-size:.875rem;">
      </div>
      <div style="margin-bottom:20px;">
        <label style="display:block;font-size:.78rem;font-weight:600;color:#6B6560;margin-bottom:6px;">Expiry Date</label>
        <input type="date" id="accredModalExpiry" style="width:100%;padding:10px;border:1px solid #E2DDD8;border-radius:8px;font-family:inherit;font-size:.875rem;">
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button onclick="closeAccredModal()" style="padding:10px 18px;border:1px solid #E2DDD8;border-radius:8px;background:white;font-weight:600;cursor:pointer;font-family:inherit;">Cancel</button>
        <button onclick="saveAccred()" style="padding:10px 18px;background:#2D9A6B;color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit;">Save Verification</button>
      </div>
    </div>
  </div>
</body>
</html>
