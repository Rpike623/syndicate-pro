<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Investor Statements</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="js/sp-core.js?v=9246da8"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {--primary: #1B1A19;--accent: #F37925;--accent-hover:#D96515;--accent-light: rgba(243,121,37,0.12);
      --success: #2D9A6B;--success-light: rgba(45,154,107,0.12);--warning: #E8890A;--warning-light: rgba(232,137,10,0.12);
      --danger: #D94F3D;--text: #1B1A19;--text-secondary: #6B6560;--border: #E2DDD8;--bg: #F3F3F3;--radius:8px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#0B1120;color:#F8FAFC;line-height:1.5;}
    .app{display:flex;min-height:100vh;}
    .main{flex:1;margin-left:260px;min-height:100vh;}
    /* sidebar CSS moved to dt-global.css */
    .top-bar{background: #111827;border-bottom:1px solid #1E293B;padding:16px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;}
    .content{padding:32px;max-width:1200px;}
    .card{background: #111827;border:1px solid #1E293B;border-radius:var(--radius);padding:24px;margin-bottom:24px;}
    .statement-preview{background: #111827;border:1px solid #1E293B;padding:40px;max-width:800px;margin:0 auto;box-shadow:0 10px 30px rgba(0,0,0,0.05);font-family:'Inter',serif;}
    .header-logo{font-size:1.5rem;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
    .form-group{margin-bottom:16px;}
    label{display:block;font-size:.8rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px;}
    select,input{width:100%;padding:10px;border:1px solid #1E293B;border-radius:var(--radius);font-size:.9rem;}
    .btn{padding:10px 20px;border-radius:var(--radius);font-weight:600;cursor:pointer;border:none;}
    .btn-primary{background:var(--accent);color:white;}
    .btn-secondary{background: #111827;border:1px solid #1E293B;}
    .table{width:100%;border-collapse:collapse;margin:20px 0;}
    .table th{text-align:left;font-size:.75rem;text-transform:uppercase;color:var(--text-secondary);padding:10px;border-bottom:2px solid #1E293B;}
    .table td{padding:12px 10px;border-bottom:1px solid var(--border-light);font-size:.9rem;}
  </style>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside> <!-- sidebar injected by sp-core -->
  <main class="main">
    <header class="top-bar">
      <div class="page-title"><h1>Investor Statements</h1></div>
      <div class="actions">
        <button class="btn btn-secondary" onclick="batchGenerate()"><i class="fas fa-layer-group"></i> Batch Download</button>
        <button class="btn btn-secondary" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
        <button class="btn btn-primary" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> Download PDF</button>
      </div>
    </header>
    <div class="content">
      <div class="card">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;">
          <div class="form-group"><label>Investor</label><select id="investorSel" onchange="updatePreview()"><option value="">Select Investor</option></select></div>
          <div class="form-group"><label>Deal</label><select id="dealSel" onchange="updatePreview()"><option value="">Select Deal</option></select></div>
          <div class="form-group"><label>Period</label><select id="periodSel" onchange="updatePreview()"><option value="Q1 2026">Q1 2026</option><option value="Q4 2025">Q4 2025</option><option value="Annual 2025">Annual 2025</option></select></div>
        </div>
      </div>
      
      <div id="statementBody" class="statement-preview">
        <!-- Rendered by JS -->
      </div>

      <!-- Batch Generation Stats (Hidden by default) -->
      <div id="batchProgress" class="card" style="display:none; margin-top:24px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <div style="font-weight:600; font-size:0.9rem;">Batch generating PDFs...</div>
          <div id="batchCount" style="font-family:monospace; font-size:0.8rem;">0/0</div>
        </div>
        <div style="height:8px; background:var(--border-light); border-radius:4px; overflow:hidden;">
          <div id="batchBar" style="height:100%; width:0%; background:var(--accent); transition:width 0.3s;"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
SP.requireGP();
function init() {
  const invs = SP.getInvestors();
  const deals = SP.getDeals();
  const iSel = document.getElementById('investorSel');
  const dSel = document.getElementById('dealSel');
  invs.forEach(i=>iSel.add(new Option(`${i.firstName} ${i.lastName}`,i.id)));
  deals.forEach(d=>dSel.add(new Option(d.name,d.id)));
  updatePreview();
}

function updatePreview() {
  const invId = document.getElementById('investorSel').value;
  const dealId = document.getElementById('dealSel').value;
  const period = document.getElementById('periodSel').value;
  const el = document.getElementById('statementBody');
  if(!invId || !dealId) { el.innerHTML = '<div style="text-align:center;padding:100px;color:var(--text-muted);">Select investor and deal to generate statement</div>'; return; }
  
  const inv = SP.getInvestorById(invId);
  const deal = SP.getDealById(dealId);
  const entry = deal.investors?.find(i=>i.investorId===invId) || {committed:0,ownership:0};
  const dists = SP.getDistributions().filter(d=>d.dealId===dealId);
  const myDists = dists.map(d=>({date:d.date,amount:(d.totalAmount*(entry.ownership/100))}));
  const totalReceived = myDists.reduce((s,d)=>s+d.amount,0);
  
  const settings = SP.load('settings',{});
  const firm = settings.firmName || 'deeltrack Partner';

  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;margin-bottom:40px;">
      <div><div class="header-logo">◆ ${firm}</div><div style="font-size:.85rem;color:var(--text-secondary);">${settings.firmAddress||''}</div></div>
      <div style="text-align:right;"><h2 style="font-size:1.5rem;text-transform:uppercase;letter-spacing:.1em;">Investor Statement</h2><div style="font-weight:600;margin-top:4px;">${period}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-bottom:40px;font-size:.9rem;">
      <div><div style="color:var(--text-secondary);text-transform:uppercase;font-size:.7rem;margin-bottom:8px;font-weight:700;">Investor</div><strong>${inv.firstName} ${inv.lastName}</strong><br>${inv.email}</div>
      <div><div style="color:var(--text-secondary);text-transform:uppercase;font-size:.7rem;margin-bottom:8px;font-weight:700;">Property / Deal</div><strong>${deal.name}</strong><br>${deal.location}</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;background:#0B1120;padding:20px;border-radius:var(--radius);margin-bottom:40px;">
      <div><div style="font-size:.7rem;color:var(--text-secondary);margin-bottom:4px;">Capital Commitment</div><div style="font-size:1.2rem;font-weight:700;">$${entry.committed.toLocaleString()}</div></div>
      <div><div style="font-size:.7rem;color:var(--text-secondary);margin-bottom:4px;">Ownership %</div><div style="font-size:1.2rem;font-weight:700;">${entry.ownership.toFixed(2)}%</div></div>
      <div><div style="font-size:.7rem;color:var(--text-secondary);margin-bottom:4px;">Distributions to Date</div><div style="font-size:1.2rem;font-weight:700;color:var(--success);">$${totalReceived.toLocaleString()}</div></div>
    </div>
    <h3 style="font-size:.9rem;margin-bottom:10px;border-bottom:1px solid #1E293B;padding-bottom:10px;">Activity Details</h3>
    <table class="table">
      <thead><tr><th>Date</th><th>Description</th><th style="text-align:right;">Amount</th></tr></thead>
      <tbody>
        <tr><td>${deal.added}</td><td>Initial Investment</td><td style="text-align:right;">($${entry.committed.toLocaleString()})</td></tr>
        ${myDists.map(d=>`<tr><td>${d.date}</td><td>Distribution</td><td style="text-align:right;color:var(--success);">+$${d.amount.toLocaleString()}</td></tr>`).join('')}
      </tbody>
    </table>
    <div style="margin-top:60px;font-size:.7rem;color:var(--text-muted);text-align:center;">This statement is for informational purposes only. Please refer to your K-1 for tax reporting.</div>`;
}

function exportPDF() {
  const {jsPDF}=window.jspdf; 
  const doc=new jsPDF(); 
  const invName = document.getElementById('investorSel').options[document.getElementById('investorSel').selectedIndex].text.replace(/\s+/g,'_');
  const dealName = document.getElementById('dealSel').options[document.getElementById('dealSel').selectedIndex].text.replace(/\s+/g,'_');
  doc.html(document.getElementById('statementBody'),{callback:d=>d.save(`Statement_${invName}_${dealName}.pdf`),x:10,y:10,width:190,windowWidth:800});
}

async function batchGenerate() {
  const dealId = document.getElementById('dealSel').value;
  const period = document.getElementById('periodSel').value;
  if(!dealId) { alert('Please select a deal first.'); return; }
  
  const deal = SP.getDealById(dealId);
  const eligibleInvs = (deal.investors || []).map(i => i.investorId);
  
  if(!eligibleInvs.length) { alert('No investors found for this deal.'); return; }
  if(!confirm(`Generate and download statements for all ${eligibleInvs.length} investors in ${deal.name}?`)) return;

  const prog = document.getElementById('batchProgress');
  const bar = document.getElementById('batchBar');
  const count = document.getElementById('batchCount');
  prog.style.display = 'block';
  
  for(let i=0; i < eligibleInvs.length; i++) {
    const invId = eligibleInvs[i];
    document.getElementById('investorSel').value = invId;
    updatePreview();
    
    // Tiny delay to ensure DOM update
    await new Promise(r => setTimeout(r, 100));
    
    await new Promise((resolve) => {
      const {jsPDF} = window.jspdf;
      const doc = new jsPDF();
      const inv = SP.getInvestorById(invId);
      const invName = `${inv.firstName}_${inv.lastName}`;
      const dealName = deal.name.replace(/\s+/g,'_');
      
      doc.html(document.getElementById('statementBody'), {
        callback: (d) => {
          d.save(`Statement_${invName}_${dealName}.pdf`);
          resolve();
        },
        x:10, y:10, width:190, windowWidth:800
      });
    });
    
    const pct = Math.round(((i+1) / eligibleInvs.length) * 100);
    bar.style.width = pct + '%';
    count.textContent = `${i+1}/${eligibleInvs.length}`;
  }
  
  setTimeout(() => { prog.style.display = 'none'; bar.style.width = '0%'; }, 2000);
}
init();
</script>
</body>
</html>
