<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | ROI Sensitivity </title>
  <script src="js/sp-core.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-wave-square"></i> ROI Sensitivity</h1>
    </div>
    <div class="content">
      <div class="grid-2">
        <div class="card">
          <div class="card-header"><h2>Base Case</h2></div>
          <div class="card-body">
            <div class="form-group"><label>Purchase Price</label><input type="number" id="sPrice" class="form-input" value="15000000" oninput="Sensitivity.calc()"></div>
            <div class="form-group"><label>Exit Cap Rate</label><input type="number" id="sCap" class="form-input" value="5.5" step="0.1" oninput="Sensitivity.calc()"></div>
            <div class="form-group"><label>NOI Growth %</label><input type="number" id="sGrowth" class="form-input" value="3" oninput="Sensitivity.calc()"></div>
            <div class="form-group"><label>Holding Period</label><input type="number" id="sYears" class="form-input" value="5" oninput="Sensitivity.calc()"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h2>Results</h2></div>
          <div class="card-body">
            <div class="result-row"><span>Exit Value</span><strong id="sExit">$0</strong></div>
            <div class="result-row"><span>Total Profit</span><strong id="sProfit">$0</strong></div>
            <div class="result-row"><span>IRR</span><strong id="sIrr">0%</strong></div>
            <div class="result-row"><span>Equity Multiple</span><strong id="sMult">0x</strong></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Cap Rate Sensitivity Matrix</h2></div>
        <div class="card-body">
          <table class="data-table" id="sMatrix"></table>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Sensitivity.init();}</script>
  <script src="js/sp-sensitivity.js"></script>
</body>
</html>
