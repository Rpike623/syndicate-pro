<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Data Import </title>
  <script src="js/sp-core.js?v3"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-file-import"></i> Data Import</h1>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header"><h2>Import Data</h2></div>
        <div class="card-body">
          <div class="form-group">
            <label>Select File (CSV/Excel)</label>
            <input type="file" class="form-input">
          </div>
          <button class="btn btn-primary">Upload</button>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
