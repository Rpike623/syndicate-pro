<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Comparator | Deeltrack</title>
  <script src="js/sp-core.js"></script>
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-scale-balanced"></i> Property Comparator</h1>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header"><h2>Compare Properties</h2></div>
        <div class="card-body">
          <table class="data-table comp-table"><thead><tr><th>Metric</th><th>Property A</th><th>Property B</th><th>Diff</th></tr></thead><tbody id="compTable"></tbody></table>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Winner Summary</h2></div>
        <div class="card-body" id="winner"></div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Comparator.init();}</script>
  <script src="js/sp-comparator.js"></script>
</body>
</html>
