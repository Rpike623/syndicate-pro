<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Turnover Report </title>
  <script src="js/sp-core.js?v2"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-users-slash"></i> Turnover Report</h1>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Turnovers YTD</span><span class="stat-value" id="statTurn">0</span></div>
        <div class="stat-card"><span class="stat-label">Turnover Rate</span><span class="stat-value" id="statRate">0%</span></div>
        <div class="stat-card"><span class="stat-label">Avg Days Vacant</span><span class="stat-value" id="statDays">0</span></div>
        <div class="stat-card"><span class="stat-label">Turnover Cost</span><span class="stat-value" id="statCost">$0</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Turnover History</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Unit</th><th>Out Date</th><th>In Date</th><th>Days</th><th>Cost</th><th>Reason</th></tr></thead><tbody id="turnTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Turnover.init();}</script>
  <script src="js/sp-turnover.js"></script>
</body>
</html>
