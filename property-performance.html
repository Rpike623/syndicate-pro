<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Property Performance </title>
  <script src="js/sp-core.js"></script>
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-chart-line"></i> Property Performance</h1>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header"><h2>Performance by Property</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Property</th><th>Occupancy</th><th>Revenue</th><th>Expenses</th><th>NOI</th><th>Cash Flow</th><th>DSCR</th></tr></thead><tbody id="perfTable"></tbody></table>
        </div>
      </div>
      <div class="grid-2">
        <div class="card">
          <div class="card-header"><h2>Vacancy Loss</h2></div>
          <div class="card-body" id="vacancyList"></div>
        </div>
        <div class="card">
          <div class="card-header"><h2>Top Expenses</h2></div>
          <div class="card-body" id="expenseList"></div>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}PropertyPerf.init();}</script>
  <script src="js/sp-property-perf.js"></script>
</body>
</html>
