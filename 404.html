<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#F3F3F3; color:#1B1A19; min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:24px; }
    .container { max-width:480px; }
    .code { font-size:8rem; font-weight:800; letter-spacing:-0.04em; color:#E2DDD8; line-height:1; margin-bottom:8px; }
    .code span { color:#F37925; }
    .code span { color:#F37925; }
    h1 { font-size:1.5rem; font-weight:700; margin-bottom:12px; }
    p { font-size:1rem; color:#6B6560; margin-bottom:32px; line-height:1.6; }
    .buttons { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    a { display:inline-flex; align-items:center; gap:8px; padding:12px 24px; border-radius:8px; font-size:0.9rem; font-weight:600; text-decoration:none; transition:all 0.2s; }
    .btn-primary { background:#F37925; color:white; }
    .btn-primary:hover { background:#D96515; transform:translateY(-1px); box-shadow:0 4px 12px rgba(243,121,37,0.3); }
    .btn-secondary { background:#FFFFFF; color:#1B1A19; border:1px solid #E2DDD8; }
    .btn-secondary:hover { background:#F8F6F4; border-color:#6B6560; }
    .logo { margin-bottom:40px; }
    .logo img { height:32px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><img src="/assets/logo-full-light.svg" alt="deeltrack"></div>
    <div class="code">4<span>0</span>4</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <div class="buttons">
      <a href="/dashboard.html" class="btn-primary">Go to Dashboard</a>
      <a href="/" class="btn-secondary">Back to Home</a>
    </div>
  </div>
</body>
</html>
