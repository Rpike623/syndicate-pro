<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Investor ROI </title>
  <script src="js/sp-core.js?v8"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-percent"></i> Investor ROI</h1>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Total Invested</span><span class="stat-value" id="statInvested">$0</span></div>
        <div class="stat-card"><span class="stat-label">Total Distributions</span><span class="stat-value text-success" id="statDist">$0</span></div>
        <div class="stat-card"><span class="stat-label">Current Value</span><span class="stat-value" id="statValue">$0</span></div>
        <div class="stat-card"><span class="stat-label">IRR</span><span class="stat-value text-success" id="statIrr">0%</span></div>
      </div>
      <div class="grid-2">
        <div class="card">
          <div class="card-header"><h2>ROI by Investment</h2></div>
          <div class="card-body"><canvas id="roiChart" height="160"></canvas></div>
        </div>
        <div class="card">
          <div class="card-header"><h2>Performance</h2></div>
          <div class="card-body"><canvas id="perfChart" height="160"></canvas></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Investor Returns</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Investor</th><th>Invested</th><th>Distributions</th><th>Value</th><th>Gain</th><th>IRR</th></tr></thead><tbody id="roiTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}InvestorROI.init();}</script>
  <script src="js/sp-investor-roi.js"></script>
</body>
</html>
