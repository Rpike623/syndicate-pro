<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=sourcing-crm.html">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Pipeline...</title>
  <script>window.location.href='sourcing-crm.html';</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #1B1A19;
      --primary-light: #3D3A37;
      --secondary: #334155;
      --accent: #F37925;
      --accent-hover: #D96515;
      --accent-light: rgba(243,121,37,0.12);
      --success: #2D9A6B;
      --success-light: rgba(45,154,107,0.12);
      --warning: #E8890A;
      --warning-light: rgba(232,137,10,0.12);
      --danger: #D94F3D;
      --danger-light: rgba(217,79,61,0.12);
      --text: #1B1A19;
      --text-secondary: #6B6560;
      --text-muted: #9C9590;
      --border: #E2DDD8;
      --border-light: rgba(27,26,25,0.08);
      --bg: #F3F3F3;
      --bg-card: #FFFFFF;
      --bg-sidebar: #050811;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      --radius-sm: 6px;
      --radius: 8px;
      --radius-md: 12px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F3F3F3;
      color: #1B1A19;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    
    .app { display: flex; min-height: 100vh; }
    
    /* sidebar CSS moved to dt-global.css */
    
    /* .sidebar-header CSS moved to dt-global.css */
    
    .logo { display: flex; align-items: center; gap: 12px; font-size: 1.25rem; font-weight: 700; }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), #60a5fa); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    
    .nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    /* .nav-section CSS moved to dt-global.css */
    /* .nav-item CSS moved to dt-global.css */
    /* .nav-item:hover CSS moved to dt-global.css */
    /* .nav-item.active CSS moved to dt-global.css */
    .nav-item i { width: 20px; text-align: center; }
    
    /* .sidebar-footer CSS moved to dt-global.css */
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, var(--success), #34d399); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.9rem; }
    .user-details { flex: 1; }
    .user-name { font-size: 0.9rem; font-weight: 600; }
    .user-role { font-size: 0.75rem; color: rgba(255,255,255,0.65); }
    
    .main { flex: 1; margin-left: 260px; min-height: 100vh; }
    @media (max-width: 768px) { .main { margin-left: 0 !important; width: 100% !important; } .sidebar, #sidebar { transform: translateX(-100%) !important; position: fixed !important; z-index: 100 !important; } .sidebar.open, #sidebar.open { transform: translateX(0) !important; } }
    
    .top-bar { background: #FFFFFF; border-bottom: 1px solid #E2DDD8; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 0.875rem; color: var(--text-secondary); }
    .breadcrumb a { color: var(--text-secondary); text-decoration: none; }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb-separator { color: var(--text-muted); }
    .breadcrumb-current { color: #F8FAFC; font-weight: 500; }
    .top-actions { display: flex; gap: 12px; align-items: center; }
    .btn-icon { width: 40px; height: 40px; border: 1px solid #1E293B; background: #111827; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
    
    .content { padding: 32px; max-width: 1600px; }
    .page-header { margin-bottom: 32px; }
    .page-title { font-size: 1.875rem; font-weight: 700; color: #F8FAFC; margin-bottom: 8px; }
    .page-description { color: var(--text-secondary); font-size: 1rem; }
    
    /* Pipeline Board */
    .pipeline-board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      overflow-x: auto;
      padding-bottom: 20px;
    }
    
    @media (max-width: 1400px) {
      .pipeline-board { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 900px) {
      .pipeline-board { grid-template-columns: repeat(2, 1fr); }
    }
    
    .pipeline-column {
      background: var(--border-light);
      border-radius: var(--radius-md);
      padding: 16px;
      min-height: 500px;
    }
    
    .column-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #1E293B;
    }
    
    .column-title {
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .column-count {
      background: #111827;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
    }
    
    .pipeline-card {
      background: #111827;
      border: 1px solid #1E293B;
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }
    
    .pipeline-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .pipeline-card:hover .card-title::after {
      content: ' →';
      color: var(--accent);
      font-size: 0.85em;
    }
    
    .pipeline-card.dragging {
      opacity: 0.5;
      transform: rotate(2deg);
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    
    .card-title {
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.3;
    }
    
    .card-menu {
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
    }
    
    .card-menu:hover { color: #F8FAFC; }
    
    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .card-location {
      font-size: 0.8rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .card-metrics {
      display: flex;
      gap: 12px;
      font-size: 0.8rem;
    }
    
    .card-metric {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--text-secondary);
    }
    
    .card-metric.value { color: var(--success); font-weight: 600; }
    
    .card-tags {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    
    .tag {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }
    
    .tag-multifamily { background: var(--accent-light); color: var(--accent); }
    .tag-retail { background: var(--warning-light); color: var(--warning); }
    .tag-industrial { background: var(--success-light); color: var(--success); }
    .tag-office { background: rgba(99,102,241,0.15); color: #a78bfa; }
    
    .card-due {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .card-due.urgent { color: var(--danger); font-weight: 500; }
    
    .priority-indicator {
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      border-radius: var(--radius) 0 0 var(--radius);
    }
    
    .priority-high { background: var(--danger); }
    .priority-medium { background: var(--warning); }
    .priority-low { background: var(--success); }
    
    .add-card {
      background: transparent;
      border: 2px dashed #1E293B;
      border-radius: var(--radius);
      padding: 12px;
      text-align: center;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      font-size: 0.9rem;
      font-weight: 500;
    }
    
    .add-card:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }
    
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    
    @media (max-width: 1024px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }
    
    .stat-item {
      background: #111827;
      border: 1px solid #1E293B;
      border-radius: var(--radius-md);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .stat-icon-box {
      width: 48px;
      height: 48px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
    }
    
    .stat-icon-box.blue { background: var(--accent-light); color: var(--accent); }
    .stat-icon-box.green { background: var(--success-light); color: var(--success); }
    .stat-icon-box.amber { background: var(--warning-light); color: var(--warning); }
    .stat-icon-box.red { background: var(--danger-light); color: var(--danger); }
    
    .stat-info h3 {
      font-size: 1.5rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }
    
    .stat-info p {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    
    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .modal-overlay.active { display: flex; }
    
    .modal {
      background: #111827;
      border-radius: var(--radius-md);
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }
    
    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid #1E293B;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-title { font-size: 1.25rem; font-weight: 700; }
    .close-btn { background: none; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; }
    
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid #1E293B; background: var(--border-light); display: flex; justify-content: flex-end; gap: 12px; }
    
    .form-group { margin-bottom: 20px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    
    label { display: block; font-size: 0.875rem; font-weight: 500; color: #F8FAFC; margin-bottom: 8px; }
    
    input, select, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #1E293B;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-family: inherit;
      background: #111827;
      color: #F8FAFC;
      transition: all 0.15s;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    
    textarea { resize: vertical; min-height: 80px; }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }
    
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: #FFFFFF; color: #3D3A37; border: 1px solid #1E293B; }
    .btn-secondary:hover { background: var(--border-light); }
    
    @media (max-width: 768px) {
      /* sidebar CSS moved to dt-global.css */
      .main { margin-left: 0; }
      .form-row { grid-template-columns: 1fr; }
    }

    /* ── Task Strip & Panel ───────────────────────────────────────────── */
    .card-task-footer {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 7px 12px;
      font-size: 0.72rem;
      color: #9C9590;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: background .15s;
    }
    .card-task-footer:hover { background: rgba(243,121,37,0.07); color: #F37925; }
    .task-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .task-dot.done { background: #2D9A6B; }
    .task-dot.overdue { background: #EF4444; }
    .task-dot.pending { background: #E8890A; }

    /* Task panel modal */
    .task-panel-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 500;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 20px;
    }
    .task-panel-overlay.open { display: flex; }
    .task-panel {
      background: #FFFFFF;
      border: 1px solid #E2DDD8;
      border-radius: 12px;
      width: 360px;
      max-width: 95vw;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 8px 40px rgba(27,26,25,.18);
    }
    .task-panel-header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid #E2DDD8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .task-panel-title { font-weight: 700; font-size: .95rem; color: #1B1A19; }
    .task-panel-body { padding: 16px 20px; }
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #F0EDEA;
    }
    .task-item:last-child { border-bottom: none; }
    .task-cb { width: 18px; height: 18px; margin-top: 1px; cursor: pointer; flex-shrink: 0; accent-color: #2D9A6B; }
    .task-label { flex: 1; font-size: .875rem; color: #1B1A19; line-height: 1.4; }
    .task-label.done-label { text-decoration: line-through; color: #9C9590; }
    .task-due-badge {
      font-size: .7rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .task-due-badge.overdue { background: #FEE2E2; color: #DC2626; }
    .task-due-badge.today { background: #FEF3C7; color: #D97706; }
    .task-due-badge.upcoming { background: #F0EDEA; color: #6B6560; }
    .task-add-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #E2DDD8;
      flex-wrap: wrap;
    }
    .task-add-row input[type="text"] {
      flex: 1;
      min-width: 0;
      padding: 8px 12px;
      border: 1px solid #D4CFC9;
      border-radius: 6px;
      font-size: .82rem;
      background: #FFFFFF;
      color: #1B1A19;
      font-family: inherit;
    }
    .task-add-row input[type="date"] {
      padding: 8px 10px;
      border: 1px solid #D4CFC9;
      border-radius: 6px;
      font-size: .78rem;
      background: #FFFFFF;
      color: #1B1A19;
      font-family: inherit;
    }
    .task-add-btn {
      padding: 8px 14px;
      background: #F37925;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .82rem;
      font-weight: 600;
      font-family: inherit;
      white-space: nowrap;
    }
    .task-delete-btn {
      background: none;
      border: none;
      color: #D4CFC9;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: .8rem;
      flex-shrink: 0;
    }
    .task-delete-btn:hover { color: #EF4444; background: #FEE2E2; }
  </style>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div class="app"><aside class="sidebar" id="sidebar"></aside>
    
    <main class="main">
      <header class="top-bar">
        <div class="breadcrumb"><a href="index.html">Home</a><span class="breadcrumb-separator">/</span><span class="breadcrumb-current">Deal Pipeline</span></div>
        <div class="top-actions">
          <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Add Deal</button>
          <button class="btn-icon" title="Filter"><i class="fas fa-filter"></i></button>
          <button class="btn-icon" title="Settings"><i class="fas fa-cog"></i></button>
        </div>
      </header>
      
      <div class="content">
        <div class="page-header">
          <h1 class="page-title">Deal Pipeline</h1>
          <p class="page-description">Track deals from sourcing to closing</p>
        </div>
        
        <div class="stats-bar">
          <div class="stat-item">
            <div class="stat-icon-box blue"><i class="fas fa-eye"></i></div>
            <div class="stat-info"><h3 id="statSourcing">0</h3><p>Under Review</p></div>
          </div>
          <div class="stat-item">
            <div class="stat-icon-box amber"><i class="fas fa-file-signature"></i></div>
            <div class="stat-info"><h3 id="statLOI">0</h3><p>LOI Submitted</p></div>
          </div>
          <div class="stat-item">
            <div class="stat-icon-box green"><i class="fas fa-search"></i></div>
            <div class="stat-info"><h3 id="statDD">0</h3><p>In Due Diligence</p></div>
          </div>
          <div class="stat-item">
            <div class="stat-icon-box red"><i class="fas fa-check-circle"></i></div>
            <div class="stat-info"><h3 id="statClosed">0</h3><p>Closed</p></div>
          </div>
        </div>
        
        <div class="pipeline-board" id="pipelineBoard">
          <!-- Sourcing Column -->
          <div class="pipeline-column" data-stage="sourcing">
            <div class="column-header">
              <div class="column-title"><i class="fas fa-eye" style="color: var(--accent);"></i> Sourcing</div>
              <span class="column-count" id="countSourcing">0</span>
            </div>
            <div class="cards-container" id="sourcingCards">
              <!-- Cards will be rendered here -->
            </div>
            <div class="add-card" onclick="openModal('sourcing')">
              <i class="fas fa-plus"></i> Add Deal
            </div>
          </div>
          
          <!-- LOI Column -->
          <div class="pipeline-column" data-stage="loi">
            <div class="column-header">
              <div class="column-title"><i class="fas fa-file-signature" style="color: var(--warning);"></i> LOI</div>
              <span class="column-count" id="countLOI">0</span>
            </div>
            <div class="cards-container" id="loiCards"></div>
            <div class="add-card" onclick="openModal('loi')">
              <i class="fas fa-plus"></i> Add Deal
            </div>
          </div>
          
          <!-- Due Diligence Column -->
          <div class="pipeline-column" data-stage="dd">
            <div class="column-header">
              <div class="column-title"><i class="fas fa-search" style="color: var(--success);"></i> Due Diligence</div>
              <span class="column-count" id="countDD">0</span>
            </div>
            <div class="cards-container" id="ddCards"></div>
            <div class="add-card" onclick="openModal('dd')">
              <i class="fas fa-plus"></i> Add Deal
            </div>
          </div>
          
          <!-- Financing Column -->
          <div class="pipeline-column" data-stage="financing">
            <div class="column-header">
              <div class="column-title"><i class="fas fa-university" style="color: #6366f1;"></i> Financing</div>
              <span class="column-count" id="countFinancing">0</span>
            </div>
            <div class="cards-container" id="financingCards"></div>
            <div class="add-card" onclick="openModal('financing')">
              <i class="fas fa-plus"></i> Add Deal
            </div>
          </div>
          
          <!-- Closed Column -->
          <div class="pipeline-column" data-stage="closed">
            <div class="column-header">
              <div class="column-title"><i class="fas fa-check-circle" style="color: var(--danger);"></i> Closed</div>
              <span class="column-count" id="countClosed">0</span>
            </div>
            <div class="cards-container" id="closedCards"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <!-- Add Deal Modal -->
  <div class="modal-overlay" id="dealModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Add Deal to Pipeline</h2>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Deal Name</label>
          <input type="text" id="dealName" placeholder="e.g., Main Street Apartments">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Property Address</label>
            <input type="text" id="dealAddress" placeholder="City, State">
          </div>
          <div class="form-group">
            <label>Property Type</label>
            <select id="dealType">
              <option value="multifamily">Multifamily</option>
              <option value="retail">Retail</option>
              <option value="industrial">Industrial</option>
              <option value="office">Office</option>
              <option value="mixed-use">Mixed-Use</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Purchase Price</label>
            <input type="number" id="dealPrice" placeholder="5000000">
          </div>
          <div class="form-group">
            <label>Target Equity</label>
            <input type="number" id="dealEquity" placeholder="1500000">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Stage</label>
            <select id="dealStage">
              <option value="sourcing">Sourcing</option>
              <option value="loi">LOI</option>
              <option value="dd">Due Diligence</option>
              <option value="financing">Financing</option>
              <option value="closed">Closed</option>
            </select>
          </div>
          <div class="form-group">
            <label>Priority</label>
            <select id="dealPriority">
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Next Action Due</label>
          <input type="date" id="dealDue">
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="dealNotes" placeholder="Key details about this deal..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveDeal()">Add to Pipeline</button>
      </div>
    </div>
  </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="js/sp-core.js"></script>
  <script src="js/sp-data.js"></script>
  <script src="js/sp-firebase.js"></script>
  <script src="js/sp-billing.js"></script>
  <script>
    SP.requireGP();

    let deals = [];

    function fmt$(num) {
      if (!num) return '$0';
      if (num >= 1e6) return '$' + (num/1e6).toFixed(1) + 'M';
      if (num >= 1e3) return '$' + (num/1e3).toFixed(0) + 'K';
      return '$' + num;
    }

    function dueDays(dateStr) {
      if (!dateStr) return '';
      const diff = Math.ceil((new Date(dateStr) - new Date()) / 86400000);
      if (diff < 0) return 'Overdue';
      if (diff === 0) return 'Today';
      if (diff === 1) return 'Tomorrow';
      return diff + ' days';
    }

    // Stage mapping: pipeline stages → sp-core status values
    const STAGE_TO_STATUS = { sourcing:'sourcing', loi:'loi', dd:'dd', financing:'operating', closed:'closed' };
    const STATUS_TO_STAGE = { sourcing:'sourcing', loi:'loi', dd:'dd', operating:'financing', closed:'closed', archived:'archived' };
        async function loadDeals() {
      deals = SP.getDeals().filter(d => d.status !== 'archived');
    }

    function renderPipeline() {
      const stages = ['sourcing','loi','dd','financing','closed'];
      const stageStatus = { sourcing:'sourcing', loi:'loi', dd:'dd', financing:'operating', closed:'closed' };

      stages.forEach(stage => {
        const statusVal = stageStatus[stage];
        const container = document.getElementById(stage + 'Cards');
        if (!container) return;
        const stageDeals = deals.filter(d => d.status === statusVal);
        const countEl = document.getElementById('count' + stage.charAt(0).toUpperCase() + stage.slice(1));
        if (countEl) countEl.textContent = stageDeals.length;

        if (!stageDeals.length) {
          container.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--text-muted);"><i class="fas fa-inbox" style="font-size:2rem;margin-bottom:12px;display:block;opacity:0.4;"></i>No deals</div>`;
        } else {
          container.innerHTML = stageDeals.map(deal => {
            const dueStr = dueDays(deal.due);
            const isUrgent = dueStr === 'Overdue';
            const investorCount = (deal.investors||[]).length;
            return `
              <div class="pipeline-card" draggable="true" data-id="${deal.id}" data-navigate="deal-detail.html?id=${deal.id}"
                ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="drop(event)"
                onclick="pipelineCardClick(event,this)">
                <div class="priority-indicator priority-${deal.priority||'medium'}"></div>
                <div class="card-header">
                  <div class="card-title">${deal.name}</div>
                  <div class="card-menu no-navigate" onclick="event.stopPropagation();showCardMenu(event,'${deal.id}')">
                    <i class="fas fa-ellipsis-v"></i>
                  </div>
                </div>
                <div class="card-meta">
                  <div class="card-location"><i class="fas fa-map-marker-alt"></i> ${deal.location||'No location'}</div>
                  <div class="card-metrics">
                    <span class="card-metric value">${fmt$(deal.raise||0)}</span>
                    <span class="card-metric"><i class="fas fa-chart-line"></i> ${deal.irr||0}% IRR</span>
                  </div>
                  <div class="card-tags">
                    <span class="tag tag-${deal.type||'other'}">${deal.type||'other'}</span>
                    ${investorCount ? `<span class="tag" style="background:rgba(99,102,241,0.15);color:#a78bfa;">${investorCount} investor${investorCount>1?'s':''}</span>` : ''}
                  </div>
                  ${deal.due ? `<div class="card-due ${isUrgent?'urgent':''}"><i class="fas fa-clock"></i> ${dueStr}</div>` : ''}
                  ${renderTaskStrip(deal)}
                </div>
                <div class="card-task-footer no-navigate" onclick="event.stopPropagation();openTaskPanel('${deal.id}')">
                  <i class="fas fa-tasks"></i> Tasks ${getTaskSummary(deal)}
                </div>
              </div>`;
          }).join('');
        }
      });

      // Stats bar
      document.getElementById('statSourcing').textContent = deals.filter(d=>d.status==='sourcing').length;
      document.getElementById('statLOI').textContent = deals.filter(d=>d.status==='loi').length;
      document.getElementById('statDD').textContent = deals.filter(d=>d.status==='dd').length;
      document.getElementById('statClosed').textContent = deals.filter(d=>d.status==='closed').length;
    }

    // ── Drag & drop stage movement ──────────────────────────────────────────────
    let dragId = null;
    // Safe card click — only navigate if user didn't click a no-navigate child
    function pipelineCardClick(e, card) {
      // Ignore if click target (or ancestor up to card) has .no-navigate
      let el = e.target;
      while (el && el !== card) {
        if (el.classList && el.classList.contains('no-navigate')) return;
        el = el.parentElement;
      }
      const url = card.dataset.navigate;
      if (url) window.location.href = url;
    }

    function dragStart(e) { dragId = e.currentTarget.dataset.id; e.dataTransfer.effectAllowed = 'move'; }
    function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
    function drop(e) {
      e.preventDefault();
      const col = e.currentTarget.closest('.pipeline-column');
      if (!col || !dragId) return;
      const newStage = col.dataset.stage;
      const statusMap = { sourcing:'sourcing', loi:'loi', dd:'dd', financing:'operating', closed:'closed' };
      const deal = deals.find(d => d.id === dragId);
      if (deal && statusMap[newStage]) {
        deal.status = statusMap[newStage];
        SP.saveDeals(deals);
        SP.logActivity('fa-arrows-alt','blue',`<strong>${deal.name}</strong> moved to ${newStage.toUpperCase()}`);
        renderPipeline();
      }
      dragId = null;
    }

    // Wire drop zones to columns
    function wireDropZones() {
      document.querySelectorAll('.pipeline-column').forEach(col => {
        col.addEventListener('dragover', dragOver);
        col.addEventListener('drop', drop);
      });
    }

    // ── Card context menu ───────────────────────────────────────────────────────
    function showCardMenu(e, id) {
      e.stopPropagation();
      const existing = document.getElementById('cardMenuPopup');
      if (existing) existing.remove();
      const menu = document.createElement('div');
      menu.id = 'cardMenuPopup';
      menu.style.cssText = 'position:fixed;background:var(--surface,#1f2333);border:1px solid var(--border,rgba(255,255,255,0.07);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:1000;min-width:160px;font-family:Inter,sans-serif;font-size:0.875rem;overflow:hidden;';
      menu.innerHTML = `
        <a href="deal-detail.html?id=${id}" style="display:flex;align-items:center;gap:10px;padding:10px 16px;text-decoration:none;color:#1B1A19;border-bottom: 1px solid rgba(255,255,255,0.07);"><i class="fas fa-eye" style="color:#0ea5e9;width:16px;"></i> View Detail</a>
        <a href="new-deal.html?id=${id}" style="display:flex;align-items:center;gap:10px;padding:10px 16px;text-decoration:none;color:#1B1A19;border-bottom: 1px solid rgba(255,255,255,0.07);"><i class="fas fa-calculator" style="color:#10b981;width:16px;"></i> Model Deal</a>
        <button onclick="archiveDeal('${id}')" style="display:flex;align-items:center;gap:10px;padding:10px 16px;width:100%;background:none;border:none;cursor:pointer;color:var(--text-secondary,#b0bdd0);font-family:inherit;font-size:inherit;border-bottom: 1px solid rgba(255,255,255,0.07);"><i class="fas fa-archive" style="width:16px;"></i> Archive</button>
        <button onclick="deleteDeal('${id}')" style="display:flex;align-items:center;gap:10px;padding:10px 16px;width:100%;background:none;border:none;cursor:pointer;color:#ef4444;font-family:inherit;font-size:inherit;"><i class="fas fa-trash" style="width:16px;"></i> Delete</button>`;
      document.body.appendChild(menu);
      const rect = e.target.getBoundingClientRect();
      menu.style.top = rect.bottom + 4 + 'px';
      menu.style.left = Math.min(rect.left, window.innerWidth - 180) + 'px';
      setTimeout(() => document.addEventListener('click', () => menu.remove(), { once: true }), 10);
    }

    // ── Modal ───────────────────────────────────────────────────────────────────
    function openModal(stage) {
      document.getElementById('dealModal').classList.add('active');
      if (stage) document.getElementById('dealStage').value = stage;
      document.getElementById('dealDue').valueAsDate = new Date(Date.now() + 7*86400000);
    }
    function closeModal() {
      document.getElementById('dealModal').classList.remove('active');
      document.querySelectorAll('#dealModal input,#dealModal select,#dealModal textarea').forEach(el => el.value = '');
    }

    function saveDeal() {
      const name = document.getElementById('dealName').value.trim();
      if (!name) { alert('Please enter a deal name'); return; }
      const stage = document.getElementById('dealStage').value;
      const statusMap = { sourcing:'sourcing', loi:'loi', dd:'dd', financing:'operating', closed:'closed' };
      const deal = {
        id: 'd' + Date.now(),
        name,
        location: document.getElementById('dealAddress').value.trim(),
        type: document.getElementById('dealType').value,
        raise: parseFloat(document.getElementById('dealPrice').value)||0,
        irr: 0,
        equity: 0,
        status: statusMap[stage] || 'sourcing',
        priority: document.getElementById('dealPriority').value,
        due: document.getElementById('dealDue').value,
        notes: document.getElementById('dealNotes').value.trim(),
        added: new Date().toISOString().split('T')[0],
        investors: [],
        documents: [],
      };
      deals.push(deal);
      SP.saveDeals(deals);
      SP.logActivity('fa-building','blue',`<strong>${name}</strong> added to pipeline`);
      closeModal();
      renderPipeline();
    }

    function archiveDeal(id) {
      const allDeals = SP.getDeals();
      const d = allDeals.find(x=>x.id===id);
      if(d) { d.status = 'archived'; SP.saveDeals(allDeals); SP.logActivity('fa-archive','amber',`<strong>${d.name}</strong> archived`); loadDeals(); renderPipeline(); }
    }

    function deleteDeal(id) {
      const deal = deals.find(d=>d.id===id);
      if (!deal || !confirm(`Delete "${deal.name}"? This cannot be undone.`)) return;
      if (typeof SPData !== 'undefined' && SPData.isReady() && SPData.deleteDeal) SPData.deleteDeal(id);
      deals = deals.filter(d => d.id !== id);
      SP.saveDeals(deals);
      renderPipeline();
    }

    loadDeals();
    renderPipeline();
    wireDropZones();
  </script>

  <!-- Task Panel Modal -->
  <div class="task-panel-overlay" id="taskPanelOverlay" onclick="if(event.target===this)closeTaskPanel()">
    <div class="task-panel">
      <div class="task-panel-header">
        <div>
          <div class="task-panel-title"><i class="fas fa-tasks" style="color:#F37925;margin-right:6px;"></i><span id="taskPanelDealName">Tasks</span></div>
          <div style="font-size:.75rem;color:#9C9590;margin-top:2px;" id="taskPanelMeta"></div>
        </div>
        <button onclick="closeTaskPanel()" style="background:#F0EDEA;border:none;width:30px;height:30px;border-radius:6px;cursor:pointer;color:#6B6560;font-size:.9rem;">x</button>
      </div>
      <div class="task-panel-body">
        <div id="taskList"></div>
        <div class="task-add-row">
          <input type="text" id="newTaskText" placeholder="Add a task..." onkeydown="if(event.key==='Enter')addTask()">
          <input type="date" id="newTaskDue" title="Due date (optional)">
          <button class="task-add-btn" onclick="addTask()"><i class="fas fa-plus"></i> Add</button>
        </div>
      </div>
    </div>
  </div>

  <script>
  var _taskDealId = null;
  function getTasksForDeal(id) { try { return JSON.parse(localStorage.getItem('dt_tasks_'+id)||'[]'); } catch(e) { return []; } }
  function saveTasksForDeal(id, t) { localStorage.setItem('dt_tasks_'+id, JSON.stringify(t)); }
  function openTaskPanel(dealId) {
    _taskDealId = dealId;
    var deal = deals.find(function(d){return d.id===dealId;});
    document.getElementById('taskPanelDealName').textContent = deal ? deal.name : 'Tasks';
    var tasks = getTasksForDeal(dealId);
    var done = tasks.filter(function(t){return t.done;}).length;
    document.getElementById('taskPanelMeta').textContent = done+' of '+tasks.length+' completed';
    renderTaskList(tasks);
    document.getElementById('taskPanelOverlay').classList.add('open');
    setTimeout(function(){ document.getElementById('newTaskText').focus(); }, 100);
  }
  function closeTaskPanel() {
    document.getElementById('taskPanelOverlay').classList.remove('open');
    _taskDealId = null;
    renderPipeline();
  }
  function renderTaskList(tasks) {
    var container = document.getElementById('taskList');
    if (!tasks.length) {
      container.innerHTML = '<div style="text-align:center;padding:24px;color:#9C9590;font-size:.85rem;"><i class="fas fa-check-circle" style="font-size:2rem;margin-bottom:8px;display:block;opacity:.3;"></i>No tasks yet.</div>';
      return;
    }
    container.innerHTML = tasks.map(function(t,i){
      var dueBadge = t.due ? getDueBadge(t.due) : '';
      return '<div class="task-item"><input class="task-cb" type="checkbox"'+(t.done?' checked':'')+' onchange="toggleTask('+i+')"><span class="task-label'+(t.done?' done-label':'')+'">'+esc(t.text)+'</span>'+dueBadge+'<button class="task-delete-btn" onclick="deleteTask('+i+')" title="Delete"><i class="fas fa-times"></i></button></div>';
    }).join('');
  }
  function getDueBadge(d) {
    var now=new Date(); now.setHours(0,0,0,0);
    var due=new Date(d+'T00:00:00');
    var diff=Math.round((due-now)/86400000);
    if(diff<0) return '<span class="task-due-badge overdue">Overdue</span>';
    if(diff===0) return '<span class="task-due-badge today">Due today</span>';
    if(diff<=3) return '<span class="task-due-badge today">In '+diff+'d</span>';
    return '<span class="task-due-badge upcoming">'+due.toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</span>';
  }
  function toggleTask(idx) {
    var tasks=getTasksForDeal(_taskDealId);
    tasks[idx].done=!tasks[idx].done;
    saveTasksForDeal(_taskDealId,tasks);
    renderTaskList(tasks);
    document.getElementById('taskPanelMeta').textContent=tasks.filter(function(t){return t.done;}).length+' of '+tasks.length+' completed';
  }
  function deleteTask(idx) {
    var tasks=getTasksForDeal(_taskDealId);
    tasks.splice(idx,1);
    saveTasksForDeal(_taskDealId,tasks);
    renderTaskList(tasks);
  }
  function addTask() {
    var text=document.getElementById('newTaskText').value.trim();
    if(!text) return;
    var due=document.getElementById('newTaskDue').value;
    var tasks=getTasksForDeal(_taskDealId);
    tasks.push({id:Date.now(),text:text,due:due||null,done:false,createdAt:new Date().toISOString()});
    saveTasksForDeal(_taskDealId,tasks);
    renderTaskList(tasks);
    document.getElementById('newTaskText').value='';
    document.getElementById('newTaskDue').value='';
    document.getElementById('taskPanelMeta').textContent=tasks.filter(function(t){return t.done;}).length+' of '+tasks.length+' completed';
    document.getElementById('newTaskText').focus();
  }
  function renderTaskStrip(deal) {
    var tasks=getTasksForDeal(deal.id);
    if(!tasks.length) return '';
    var now=new Date(); now.setHours(0,0,0,0);
    var dots=tasks.slice(0,5).map(function(t){
      var cls=t.done?'done':(t.due&&new Date(t.due+'T00:00:00')<now?'overdue':'pending');
      return '<span class="task-dot '+cls+'" title="'+esc(t.text)+'"></span>';
    }).join('');
    return '<div style="display:flex;align-items:center;gap:4px;margin-top:6px;">'+dots+(tasks.length>5?'<span style="font-size:.65rem;color:#9C9590;">+'+(tasks.length-5)+'</span>':'')+'</div>';
  }
  function getTaskSummary(deal) {
    var tasks=getTasksForDeal(deal.id);
    if(!tasks.length) return '<span style="opacity:.5;">- none</span>';
    var done=tasks.filter(function(t){return t.done;}).length;
    var now=new Date(); now.setHours(0,0,0,0);
    var overdue=tasks.filter(function(t){return !t.done&&t.due&&new Date(t.due+'T00:00:00')<now;}).length;
    return '<span style="color:'+(overdue?'#EF4444':'#2D9A6B')+'">'+done+'/'+tasks.length+(overdue?' - '+overdue+' overdue':'')+'</span>';
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeTaskPanel(); });
  </script>
</body>
</html>
