<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Move-Out </title>
  <script src="js/sp-core.js?v8"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-sign-out-alt"></i> Move-Out</h1>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">This Month</span><span class="stat-value">3</span></div>
        <div class="stat-card"><span class="stat-label">Avg Days Vacant</span><span class="stat-value">18</span></div>
        <div class="stat-card"><span class="stat-label">Turn Cost</span><span class="stat-value">$2,400</span></div>
        <div class="stat-card"><span class="stat-label">Re-Leased</span><span class="stat-value text-success">2</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Move-Out History</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Unit</th><th>Tenant</th><th>Move-Out</th><th>Reason</th><th>Turn Cost</th><th>Status</th></tr></thead><tbody>
            <tr><td>105</td><td>Jane Doe</td><td>2026-03-01</td><td>Relocating</td><td>$2,200</td><td><span class="badge badge-success">Re-Leased</span></td></tr>
            <tr><td>108</td><td>Bob Wilson</td><td>2026-03-05</td><td>Buying Home</td><td>$1,800</td><td><span class="badge badge-warning">In Progress</span></td></tr>
            <tr><td>112</td><td>Alice Brown</td><td>2026-03-10</td><td>Upgrade</td><td>$0</td><td><span class="badge badge-info">Scheduled</span></td></tr>
          </tbody></table>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}}</script>
</body>
</html>
