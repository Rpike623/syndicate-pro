<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Compliance Calendar </title>
  <script src="js/sp-core.js?v9"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-calendar-check"></i> Compliance Calendar</h1>
    </div>
    <div class="content">

        <div class="card-header"><h2>Upcoming Deadlines</h2></div>

          <table class="data-table"><thead><tr><th>Task</th><th>Due</th><th>Status</th></tr></thead><tbody><tr><td>Quarterly Tax Estimate</td><td>2026-03-15</td><td><span class="badge badge-warning">Due Soon</span></td></tr><tr><td>Insurance Renewal</td><td>2026-04-01</td><td><span class="badge badge-info">Upcoming</span></td></tr></tbody></table>
        </div>
      </div>
    </div>
