<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Budget vs Actual </title>
  <script src="js/sp-core.js?v9"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-balance-scale"></i> Budget vs Actual</h1>
    </div>
    <div class="content">
      <div class="card" style="margin-bottom:24px;">
        <div class="card-header"><h2><i class="fas fa-building"></i> Select Property</h2></div>
        <div class="card-body">
          <select id="dealSelect" class="form-select" onchange="Budget.loadDeal()" style="max-width:400px;">
            <option value="">Select a deal...</option>
            <option value="deal_1">Sunset Apartments</option>
            <option value="deal_2">Downtown Office</option>
            <option value="deal_3">Industrial Portfolio</option>
          </select>
        </div>
      </div>
      <div id="budgetContent" style="display:none;">
        <div class="stats-row">
          <div class="stat-card"><span class="stat-label">Budgeted NOI</span><span class="stat-value" id="statBudgetNOI">$0</span></div>
          <div class="stat-card"><span class="stat-label">Actual NOI</span><span class="stat-value" id="statActualNOI">$0</span></div>
          <div class="stat-card"><span class="stat-label">Variance</span><span class="stat-value" id="statVariance">$0</span></div>
          <div class="stat-card"><span class="stat-label">% to Budget</span><span class="stat-value" id="statPct">0%</span></div>
        </div>
        <div class="card">
          <div class="card-header"><h2>Monthly Breakdown</h2></div>
          <div class="card-body">
            <table class="data-table">
              <thead><tr><th>Category</th><th>Jan</th><th>Feb</th><th>Mar</th><th>Q1 Total</th><th>Budget</th><th>Actual</th><th>Variance</th></tr></thead>
              <tbody id="budgetTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Budget.init();}</script>
  <script src="js/sp-budget.js"></script>
</body>
</html>
