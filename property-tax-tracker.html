<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Property Tax Tracker </title>
  <script src="js/sp-core.js?v3"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-landmark"></i> Property Tax Tracker</h1>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header"><h2>Tax Assessments</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Year</th><th>Assessment</th><th>Tax Amount</th><th>Paid Date</th><th>Status</th></tr></thead><tbody id="taxTable"></tbody></table>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Projected 2027</span><span class="stat-value text-danger" id="statTaxProj">$0</span></div>
        <div class="stat-card"><span class="stat-label">Effective Rate</span><span class="stat-value" id="statTaxRate">0%</span></div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Tax.init();}</script>
  <script src="js/sp-tax-tracker.js"></script>
</body>
</html>
