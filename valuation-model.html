<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Valuation Model </title>
  <script src="js/sp-core.js"></script>
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-tags"></i> Valuation Model</h1>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header"><h2>Inputs</h2></div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group"><label>NOI (Year 1)</label><input type="number" id="vNoi" class="form-input" value="1000000" oninput="Valuation.calc()"></div>
            <div class="form-group"><label>Cap Rate</label><input type="number" id="vCap" class="form-input" value="5.5" step="0.1" oninput="Valuation.calc()"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Exit Cap Rate</label><input type="number" id="vExitCap" class="form-input" value="6.0" step="0.1" oninput="Valuation.calc()"></div>
            <div class="form-group"><label>NOI Growth</label><input type="number" id="vGrowth" class="form-input" value="3" oninput="Valuation.calc()"></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Valuation Methods</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Method</th><th>Value</th><th>$/SF</th><th>Notes</th></tr></thead><tbody id="vTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Valuation.init();}</script>
  <script src="js/sp-valuation.js"></script>
</body>
</html>
