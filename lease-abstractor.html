<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lease Abstractor | Deeltrack</title>
  <script src="js/sp-core.js"></script>
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-file-contract"></i> Lease Abstractor</h1>
      <div class="header-actions">
        <button class="btn btn-secondary" onclick="LeaseAbs.loadSample()">Load Sample</button>
        <button class="btn btn-primary" onclick="LeaseAbs.showModal()"><i class="fas fa-plus"></i> Add Lease</button>
      </div>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Total Leases</span><span class="stat-value" id="statTotal">0</span></div>
        <div class="stat-card"><span class="stat-label">Commercial</span><span class="stat-value" id="statCom">0</span></div>
        <div class="stat-card"><span class="stat-label">Avg Term</span><span class="stat-value" id="statTerm">0 mo</span></div>
        <div class="stat-card"><span class="stat-label">Expiring 6mo</span><span class="stat-value text-warning" id="statExpiring">0</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Lease Abstracts</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Tenant</th><th>Property</th><th>Term</th><th>Base Rent</th><th>PSF</th><th>Renewal</th><th>Expiration</th></tr></thead><tbody id="absTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <div id="absModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header"><h2>Add Lease</h2><button class="close" onclick="LeaseAbs.closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Tenant</label><input type="text" id="aTenant" class="form-input"></div>
        <div class="form-row">
          <div class="form-group"><label>Property</label><select id="aProperty" class="form-select"><option>Sunset Apartments</option><option>Downtown Office</option><option>Industrial Portfolio</option><option>Coastal Retail</option></select></div>
          <div class="form-group"><label>Term (months)</label><input type="number" id="aTerm" class="form-input" value="12"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Base Rent</label><input type="number" id="aRent" class="form-input"></div>
          <div class="form-group"><label>PSF</label><input type="number" id="aPsf" class="form-input"></div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="LeaseAbs.closeModal()">Cancel</button><button class="btn btn-primary" onclick="LeaseAbs.save()">Save</button></div>
    </div>
  </div>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}LeaseAbs.init();}</script>
  <script src="js/sp-lease-abstract.js"></script>
</body>
</html>
