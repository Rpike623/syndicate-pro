<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investable Market Comps - deeltrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/sp-core.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --bg: #f8fafc; --radius: 16px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); display: flex; }
        .sidebar { width: 260px; background: #0f172a; color: white; position: fixed; height: 100vh; }
        .main { flex: 1; margin-left: 260px; padding: 40px; }
        
        .comp-card { background: white; border: 1px solid #e2e8f0; border-radius: var(--radius); padding: 24px; display: flex; align-items: center; gap: 20px; transition: all 0.2s; margin-bottom: 16px; }
        .comp-card:hover { transform: scale(1.01); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .comp-img { width: 120px; height: 80px; background: #f1f5f9; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #cbd5e1; }
        .comp-info { flex: 1; }
        .comp-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 4px; }
        .comp-metrics { display: flex; gap: 16px; font-size: 0.85rem; color: #64748b; }
        .comp-val { color: var(--accent); font-weight: 700; }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
        <h1 style="font-family: 'Space Grotesk'; font-size: 2rem; margin-bottom: 12px;">Market Comp Library</h1>
        <p style="color: #64748b; margin-bottom: 32px;">Validate your underwriting entries against recently traded assets.</p>

        <div id="compsList">
            <!-- Seed Comps -->
            <div class="comp-card">
                <div class="comp-img"><i class="fas fa-building"></i></div>
                <div class="comp-info">
                    <div class="comp-name">The Standard at Fort Worth</div>
                    <div class="comp-metrics">
                        <span>Sale: <strong class="comp-val">$32.4M</strong></span>
                        <span>Price/Unit: <strong class="comp-val">$215K</strong></span>
                        <span>Cap Rate: <strong class="comp-val">5.2%</strong></span>
                    </div>
                </div>
                <button class="btn-xs">View Photos</button>
            </div>
            
            <div class="comp-card">
                <div class="comp-img"><i class="fas fa-building"></i></div>
                <div class="comp-info">
                    <div class="comp-name">Willow Creek Garden Apts</div>
                    <div class="comp-metrics">
                        <span>Sale: <strong class="comp-val">$18.1M</strong></span>
                        <span>Price/Unit: <strong class="comp-val">$142K</strong></span>
                        <span>Cap Rate: <strong class="comp-val">6.1%</strong></span>
                    </div>
                </div>
                <button class="btn-xs">View Photos</button>
            </div>
        </div>
    </main>
<script>SP.requireGP();</script>
</body>
</html>
