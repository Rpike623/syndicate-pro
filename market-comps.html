<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Market Comps </title>
  <script src="js/sp-core.js?v6"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-building"></i> Market Comps</h1>
      <div class="header-actions">
        <button class="btn btn-secondary" onclick="Comps.sampleData()">Load Sample</button>
        <button class="btn btn-primary" onclick="Comps.showModal()">Add Comp</button>
      </div>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Total Comps</span><span class="stat-value" id="statTotal">0</span></div>
        <div class="stat-card"><span class="stat-label">Avg Price/SF</span><span class="stat-value" id="statPrice">$0</span></div>
        <div class="stat-card"><span class="stat-label">Avg Cap Rate</span><span class="stat-value" id="statCap">0%</span></div>
        <div class="stat-card"><span class="stat-label">Avg NOI</span><span class="stat-value" id="statNoi">$0</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Comparable Properties</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Property</th><th>Location</th><th>Type</th><th>Price</th><th>SqFt</th><th>Price/SF</th><th>Cap Rate</th><th>NOI</th><th>Status</th></tr></thead><tbody id="compTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <div id="compModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header"><h2>Add Comp</h2><button class="close" onclick="Comps.closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Property Name</label><input type="text" id="cName" class="form-input"></div>
        <div class="form-row">
          <div class="form-group"><label>Location</label><input type="text" id="cLocation" class="form-input"></div>
          <div class="form-group"><label>Type</label><select id="cType" class="form-select"><option value="Multifamily">Multifamily</option><option value="Office">Office</option><option value="Industrial">Industrial</option><option value="Retail">Retail</option></select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Sale Price</label><input type="number" id="cPrice" class="form-input"></div>
          <div class="form-group"><label>Square Feet</label><input type="number" id="cSf" class="form-input"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Cap Rate</label><input type="number" id="cCap" class="form-input" step="0.1"></div>
          <div class="form-group"><label>NOI</label><input type="number" id="cNoi" class="form-input"></div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="Comps.closeModal()">Cancel</button><button class="btn btn-primary" onclick="Comps.save()">Save</button></div>
    </div>
  </div>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Comps.init();}</script>
  <script src="js/sp-comps.js"></script>
</body>
</html>
