<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Loan Maturity Watch </title>
  <script src="js/sp-core.js"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-hourglass-end"></i> Loan Maturity Watch</h1>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header"><h2>Upcoming Maturities</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Property</th><th>Lender</th><th>Balance</th><th>Rate</th><th>Date</th><th>Days Left</th></tr></thead><tbody id="matTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Mat.init();}</script>
  <script src="js/sp-mat.js"></script>
</body>
</html>
