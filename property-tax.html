<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Property Tax </title>
  <script src="js/sp-core.js?v3"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-file-invoice-dollar"></i> Property Tax</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="Tax.showModal()"><i class="fas fa-plus"></i> Add Assessment</button>
      </div>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Annual Tax</span><span class="stat-value" id="statAnnual">$0</span></div>
        <div class="stat-card"><span class="stat-label">YTD Paid</span><span class="stat-value text-success" id="statPaid">$0</span></div>
        <div class="stat-card"><span class="stat-label">Due This Year</span><span class="stat-value text-warning" id="statDue">$0</span></div>
        <div class="stat-card"><span class="stat-label">Avg Rate</span><span class="stat-value" id="statRate">0%</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Tax Assessments</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Property</th><th>Assessed Value</th><th>Tax Rate</th><th>Annual Tax</th><th>Status</th><th>Due Date</th></tr></thead><tbody id="taxTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <div id="taxModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header"><h2>Add Assessment</h2><button class="close" onclick="Tax.closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Property</label><select id="tProperty" class="form-select"><option>Sunset Apartments</option><option>Downtown Office</option><option>Industrial Portfolio</option><option>Coastal Retail</option></select></div>
        <div class="form-row">
          <div class="form-group"><label>Assessed Value</label><input type="number" id="tValue" class="form-input"></div>
          <div class="form-group"><label>Tax Rate %</label><input type="number" id="tRate" class="form-input" step="0.01"></div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="Tax.closeModal()">Cancel</button><button class="btn btn-primary" onclick="Tax.save()">Save</button></div>
    </div>
  </div>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Tax.init();}</script>
  <script src="js/sp-property-tax.js"></script>
</body>
</html>
