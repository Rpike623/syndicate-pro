<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Property Inspections </title>
  <script src="js/sp-core.js?v2"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-clipboard-check"></i> Property Inspections</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="Inspections.showModal()"><i class="fas fa-plus"></i> Schedule</button>
      </div>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Scheduled</span><span class="stat-value text-info" id="statScheduled">0</span></div>
        <div class="stat-card"><span class="stat-label">Completed</span><span class="stat-value text-success" id="statCompleted">0</span></div>
        <div class="stat-card"><span class="stat-label">Findings</span><span class="stat-value text-warning" id="statFindings">0</span></div>
        <div class="stat-card"><span class="stat-label">Overdue</span><span class="stat-value text-danger" id="statOverdue">0</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Inspection Schedule</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Property</th><th>Type</th><th>Scheduled</th><th>Inspector</th><th>Status</th><th>Findings</th></tr></thead><tbody id="inspectionTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <div id="inspModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header"><h2>Schedule Inspection</h2><button class="close" onclick="Inspections.closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Property</label><select id="iProperty" class="form-select"><option>Sunset Apartments</option><option>Downtown Office</option><option>Industrial Portfolio</option><option>Coastal Retail</option></select></div>
        <div class="form-row">
          <div class="form-group"><label>Type</label><select id="iType" class="form-select"><option>Annual</option><option>Quarterly</option><option>Move-out</option><option>Safety</option></select></div>
          <div class="form-group"><label>Date</label><input type="date" id="iDate" class="form-input"></div>
        </div>
        <div class="form-group"><label>Inspector</label><input type="text" id="iInspector" class="form-input" placeholder="Company or name"></div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="Inspections.closeModal()">Cancel</button><button class="btn btn-primary" onclick="Inspections.save()">Schedule</button></div>
    </div>
  </div>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Inspections.init();}</script>
  <script src="js/sp-inspections.js"></script>
</body>
</html>
