<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Debt Tracker </title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="js/sp-theme.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="js/sp-core.js?v3"></script>
  <script src="js/sp-data.js?v2"></script>
  <script src="js/sp-firebase.js?v3"></script>
  <script src="js/sp-billing.js"></script>
  <style>
    :root {
      --accent: #F37925; --accent-hover: #D96515; --success: #2D9A6B; --warning: #E8890A;
      --danger: #D94F3D; --purple: #7B5CC4; --bg: #F3F3F3; --bg-card: #FFFFFF;
      --bg-sidebar: #050811; --text: #1B1A19; --text-secondary: #6B6560;
      --border: #E2DDD8; --border-light: rgba(27,26,25,0.08); --radius: 8px; --radius-md: 12px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.05); --shadow: 0 1px 3px rgba(0,0,0,.1);
      --shadow-md: 0 4px 6px rgba(0,0,0,.07);
    }
    [data-theme="dark"] {
      --bg: #F3F3F3; --bg-card: #FFFFFF; --bg-sidebar: #050811; --text: #1B1A19;
      --text-secondary: #6B6560; --border: #E2DDD8; --border-light: rgba(27,26,25,0.04);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: #F3F3F3; color: #1B1A19; display:flex; min-height:100vh; }

    /* ── Sidebar ── */
    /* sidebar CSS moved to dt-global.css */
    /* .sidebar-header CSS moved to dt-global.css */
    .logo { display:flex; align-items:center; gap:12px; font-size:1.25rem; font-weight:700; text-decoration:none; color:white; }
    .logo-icon { width:36px; height:36px; background:linear-gradient(135deg,var(--accent),#60a5fa); border-radius:var(--radius); display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
    /* .nav CSS moved to dt-global.css */
    /* .nav-section CSS moved to dt-global.css */
    /* .nav-item CSS moved to dt-global.css */
    /* .nav-item:hover CSS moved to dt-global.css */
    /* .nav-item.active CSS moved to dt-global.css */
    .nav-item i { width:20px; text-align:center; }
    /* .sidebar-footer CSS moved to dt-global.css */
    .user-info { display:flex; align-items:center; gap:12px; }
    .user-avatar { width:36px; height:36px; background:linear-gradient(135deg,var(--success),#34d399); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:.9rem; color:white; flex-shrink:0; }
    .user-name { font-size:.875rem; font-weight:600; color:white; }
    .user-role { font-size:.75rem; color:rgba(255,255,255,.5); }

    /* ── Main ── */
    .main { margin-left: var(--dt-sidebar-width); flex:1; display:flex; flex-direction:column; min-height:100vh; }
    .topbar { background: #FFFFFF; border-bottom: 1px solid #E2DDD8; padding:0 32px; height:64px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
    .topbar-left { display:flex; align-items:center; gap:16px; }
    .page-title { font-size:1.1rem; font-weight:700; color: #1B1A19; }
    .topbar-actions { display:flex; align-items:center; gap:10px; }
    .content { padding:32px; flex:1; }

    /* ── Buttons ── */
    .btn { display:inline-flex; align-items:center; gap:8px; padding:9px 18px; border-radius:var(--radius); font-size:.875rem; font-weight:600; cursor:pointer; border:none; transition:all .15s; text-decoration:none; font-family:inherit; }
    .btn-primary { background:var(--accent); color:white; }
    .btn-primary:hover { background:var(--accent-hover); }
    .btn-secondary { background: #F3F3F3; color: #1B1A19; border: 1px solid #E2DDD8; }
    .btn-secondary:hover { background:var(--border-light); }
    .btn-danger { background:var(--danger); color:white; }
    .btn-danger:hover { background:#dc2626; }
    .btn-sm { padding:6px 12px; font-size:.8rem; }
    .btn-ghost { background:none; color:var(--text-secondary); }
    .btn-ghost:hover { background:var(--border-light); color: #1B1A19; }

    /* ── Summary cards ── */
    .summary-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:28px; }
    .stat-card { background: #FFFFFF; border: 1px solid #E2DDD8; border-radius:var(--radius-md); padding:20px; }
    .stat-label { font-size:.75rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em; color:var(--text-secondary); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
    .stat-value { font-size:1.6rem; font-weight:700; color: #1B1A19; line-height:1; }
    .stat-sub { font-size:.78rem; color:var(--text-secondary); margin-top:6px; }
    .stat-card.warning { border-left:3px solid var(--warning); }
    .stat-card.danger  { border-left:3px solid var(--danger); }
    .stat-card.success { border-left:3px solid var(--success); }
    .stat-card.accent  { border-left:3px solid var(--accent); }

    /* ── Section header ── */
    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .section-title { font-size:1rem; font-weight:700; color: #1B1A19; }

    /* ── Filters ── */
    .filters { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .filter-btn { padding:6px 14px; border-radius:20px; border: 1px solid #E2DDD8; background: #FFFFFF; color:var(--text-secondary); font-size:.8rem; font-weight:500; cursor:pointer; transition:all .15s; }
    .filter-btn.active, .filter-btn:hover { background:var(--accent); color:white; border-color:var(--accent); }
    .search-wrap { position:relative; margin-left:auto; }
    .search-wrap input { padding:7px 12px 7px 34px; border: 1px solid #E2DDD8; border-radius:var(--radius); font-size:.85rem; background: #FFFFFF; color: #1B1A19; width:220px; font-family:inherit; }
    .search-wrap input:focus { outline:none; border-color:var(--accent); }
    .search-wrap i { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text-secondary); font-size:.85rem; }

    /* ── Loan cards ── */
    .loans-grid { display:flex; flex-direction:column; gap:14px; }
    .loan-card { background: #FFFFFF; border: 1px solid #E2DDD8; border-radius:var(--radius-md); overflow:hidden; transition:box-shadow .15s; }
    .loan-card:hover { box-shadow:var(--shadow-md); }
    .loan-card-header { display:flex; align-items:center; gap:16px; padding:18px 20px; cursor:pointer; }
    .loan-status-bar { width:4px; height:56px; border-radius:2px; flex-shrink:0; }
    .loan-icon { width:44px; height:44px; border-radius:var(--radius); display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
    .loan-main { flex:1; min-width:0; }
    .loan-name { font-size:.95rem; font-weight:700; color: #1B1A19; }
    .loan-deal { font-size:.8rem; color:var(--text-secondary); margin-top:2px; }
    .loan-meta { display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
    .loan-meta-item { text-align:center; }
    .loan-meta-label { font-size:.7rem; color:var(--text-secondary); font-weight:600; text-transform:uppercase; }
    .loan-meta-value { font-size:.95rem; font-weight:700; color: #1B1A19; }
    .loan-actions { display:flex; gap:6px; align-items:center; }
    .loan-badge { padding:3px 10px; border-radius:20px; font-size:.72rem; font-weight:600; }
    .badge-active   { background: rgba(14,165,233,0.15); color: #38bdf8; }
    .badge-maturing { background: rgba(245,158,11,0.12); color: #fbbf24; }
    .badge-critical { background: rgba(239,68,68,0.15); color: #f87171; }
    .badge-io       { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .badge-fixed    { background: rgba(16,185,129,0.15); color: #34d399; }
    .badge-floating { background: #FFFFFF7ed; color:#c2410c; }
    .badge-paidoff  { background: #F3F3F3; color: #6B6560; }

    /* ── Loan detail expand ── */
    .loan-detail { display:none; border-top:1px solid var(--border); padding:20px; background:var(--border-light); }
    .loan-detail.open { display:block; }
    .loan-detail-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
    .loan-detail-section { background: #FFFFFF; border: 1px solid #E2DDD8; border-radius:var(--radius); padding:16px; }
    .loan-detail-section h4 { font-size:.8rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--text-secondary); margin-bottom:12px; display:flex; align-items:center; gap:6px; }
    .detail-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid var(--border-light); font-size:.85rem; }
    .detail-row:last-child { border-bottom:none; }
    .detail-label { color:var(--text-secondary); }
    .detail-value { font-weight:600; color: #1B1A19; }
    .amort-bar-wrap { margin-top:12px; }
    .amort-bar-label { display:flex; justify-content:space-between; font-size:.75rem; color:var(--text-secondary); margin-bottom:4px; }
    .amort-bar { height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
    .amort-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--accent),#60a5fa); transition:width .4s; }
    .notes-area { width:100%; border: 1px solid #E2DDD8; border-radius:var(--radius); padding:10px 12px; font-size:.85rem; font-family:'Inter',sans-serif; background: #FFFFFF; color: #1B1A19; resize:vertical; min-height:70px; }
    .notes-area:focus { outline:none; border-color:var(--accent); }

    /* ── Timeline ── */
    .timeline-section { background: #FFFFFF; border: 1px solid #E2DDD8; border-radius:var(--radius-md); padding:20px; margin-bottom:28px; }
    .timeline-title { font-size:.9rem; font-weight:700; color: #1B1A19; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .timeline-list { display:flex; flex-direction:column; gap:0; }
    .timeline-item { display:flex; gap:16px; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--border-light); }
    .timeline-item:last-child { border-bottom:none; }
    .timeline-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:5px; }
    .timeline-content { flex:1; }
    .timeline-loan { font-size:.875rem; font-weight:600; color: #1B1A19; }
    .timeline-event { font-size:.8rem; color:var(--text-secondary); }
    .timeline-date { font-size:.8rem; font-weight:600; color:var(--text-secondary); white-space:nowrap; }
    .timeline-days { font-size:.75rem; font-weight:700; padding:2px 8px; border-radius:10px; }

    /* ── Modal ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background: #FFFFFF; border-radius:var(--radius-md); width:680px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.3); }
    .modal-header { padding:24px; border-bottom: 1px solid #E2DDD8; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background: #FFFFFF; z-index:1; }
    .modal-title { font-size:1.1rem; font-weight:700; color: #1B1A19; }
    .modal-body { padding:24px; display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; background: #FFFFFF; position:sticky; bottom:0; }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-group.full { grid-column:1/-1; }
    label { font-size:.8rem; font-weight:600; color:var(--text-secondary); }
    input, select, textarea { padding:9px 12px; border: 1px solid #E2DDD8; border-radius:var(--radius); font-size:.875rem; font-family:'Inter',sans-serif; background: #FFFFFF; color: #1B1A19; }
    input:focus, select:focus, textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,.1); }

    /* ── Empty state ── */
    .empty-state { text-align:center; padding:60px 20px; color:var(--text-secondary); }
    .empty-icon { font-size:3rem; margin-bottom:12px; opacity:.3; }
    .empty-title { font-size:1rem; font-weight:600; color: #1B1A19; margin-bottom:6px; }
    .empty-sub { font-size:.875rem; }

    /* ── Responsive ── */
    @media (max-width:1100px) { .summary-grid { grid-template-columns:repeat(2,1fr); } .loan-detail-grid { grid-template-columns:1fr 1fr; } }
    @media (max-width:768px) { /* sidebar CSS moved to dt-global.css */ .main { margin-left:0; } .summary-grid { grid-template-columns:1fr 1fr; } .loan-meta { display:none; } .loan-detail-grid { grid-template-columns:1fr; } .modal-body { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar"></aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <i class="fas fa-landmark" style="color:var(--accent);font-size:1.1rem;"></i>
        <span class="page-title">Debt &amp; Loan Tracker</span>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-secondary btn-sm" onclick="exportCSV()"><i class="fas fa-download"></i> Export CSV</button>
        <button class="btn btn-primary btn-sm" onclick="openModal()"><i class="fas fa-plus"></i> Add Loan</button>
      </div>
    </div>

    <div class="content">

      <!-- Summary -->
      <div class="summary-grid" id="summaryGrid">
        <div class="stat-card accent">
          <div class="stat-label"><i class="fas fa-landmark"></i> Total Debt</div>
          <div class="stat-value" id="statTotalDebt">$0</div>
          <div class="stat-sub" id="statLoanCount">0 loans</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-label"><i class="fas fa-clock"></i> Maturing ≤ 12 Mo</div>
          <div class="stat-value" id="statMaturingSoon">$0</div>
          <div class="stat-sub" id="statMaturingCount">0 loans</div>
        </div>
        <div class="stat-card danger">
          <div class="stat-label"><i class="fas fa-exclamation-triangle"></i> Maturing ≤ 90 Days</div>
          <div class="stat-value" id="statCritical">$0</div>
          <div class="stat-sub" id="statCriticalCount">0 loans</div>
        </div>
        <div class="stat-card success">
          <div class="stat-label"><i class="fas fa-percentage"></i> Wtd Avg Rate</div>
          <div class="stat-value" id="statAvgRate">—</div>
          <div class="stat-sub" id="statIoCount">—</div>
        </div>
      </div>

      <!-- Maturity Timeline -->
      <div class="timeline-section" id="timelineSection" style="display:none;">
        <div class="timeline-title"><i class="fas fa-calendar-alt" style="color:var(--accent)"></i> Upcoming Maturity &amp; Event Timeline</div>
        <div class="timeline-list" id="timelineList"></div>
      </div>

      <!-- Filters + search -->
      <div class="section-header">
        <div class="filters" id="filterBar">
          <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
          <button class="filter-btn" data-filter="active" onclick="setFilter('active',this)">Active</button>
          <button class="filter-btn" data-filter="io" onclick="setFilter('io',this)">Interest-Only</button>
          <button class="filter-btn" data-filter="fixed" onclick="setFilter('fixed',this)">Fixed Rate</button>
          <button class="filter-btn" data-filter="floating" onclick="setFilter('floating',this)">Floating</button>
          <button class="filter-btn" data-filter="critical" onclick="setFilter('critical',this)">⚠ Maturing Soon</button>
        </div>
        <div class="search-wrap">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search loans…" oninput="renderLoans()">
        </div>
      </div>

      <div class="loans-grid" id="loansGrid">
        <div class="empty-state">
          <div class="empty-icon"><i class="fas fa-landmark"></i></div>
          <div class="empty-title">No loans yet</div>
          <div class="empty-sub">Track your portfolio's debt stack — click "Add Loan" to get started.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Add Loan</span>
        <button class="btn btn-ghost btn-sm" onclick="closeModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">

        <div class="form-group full">
          <label>Loan Name / Description</label>
          <input type="text" id="fName" placeholder="e.g. Oakwood MF Senior Loan">
        </div>
        <div class="form-group">
          <label>Deal / Property</label>
          <input type="text" id="fDeal" placeholder="e.g. Oakwood Apartments">
        </div>
        <div class="form-group">
          <label>Lender</label>
          <input type="text" id="fLender" placeholder="e.g. Arbor, Walker & Dunlop">
        </div>
        <div class="form-group">
          <label>Loan Amount ($)</label>
          <input type="number" id="fAmount" placeholder="0" min="0" step="1000">
        </div>
        <div class="form-group">
          <label>Loan Type</label>
          <select id="fLoanType">
            <option value="senior">Senior Debt</option>
            <option value="bridge">Bridge Loan</option>
            <option value="mezzanine">Mezzanine</option>
            <option value="preferred">Preferred Equity</option>
            <option value="construction">Construction</option>
            <option value="agency">Agency (Fannie/Freddie)</option>
            <option value="cmbs">CMBS</option>
            <option value="hud">HUD/FHA</option>
          </select>
        </div>
        <div class="form-group">
          <label>Rate Type</label>
          <select id="fRateType">
            <option value="fixed">Fixed</option>
            <option value="floating">Floating (SOFR +)</option>
            <option value="hybrid">Hybrid</option>
          </select>
        </div>
        <div class="form-group">
          <label>Interest Rate (%)</label>
          <input type="number" id="fRate" placeholder="e.g. 5.75" min="0" max="30" step="0.01">
        </div>
        <div class="form-group">
          <label>Spread (bps, if floating)</label>
          <input type="number" id="fSpread" placeholder="e.g. 275" min="0">
        </div>
        <div class="form-group">
          <label>Index (if floating)</label>
          <select id="fIndex">
            <option value="">— N/A —</option>
            <option value="SOFR">SOFR</option>
            <option value="Prime">Prime Rate</option>
            <option value="LIBOR">LIBOR (legacy)</option>
            <option value="T30">30-Day T-Bill</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amortization</label>
          <select id="fAmort">
            <option value="io">Interest Only</option>
            <option value="30yr">30-Year Amortizing</option>
            <option value="25yr">25-Year Amortizing</option>
            <option value="20yr">20-Year Amortizing</option>
            <option value="15yr">15-Year Amortizing</option>
            <option value="balloon">Balloon / Partial IO</option>
          </select>
        </div>
        <div class="form-group">
          <label>IO Period End Date</label>
          <input type="date" id="fIOEnd">
        </div>
        <div class="form-group">
          <label>Origination Date</label>
          <input type="date" id="fOrigDate">
        </div>
        <div class="form-group">
          <label>Maturity Date</label>
          <input type="date" id="fMaturity">
        </div>
        <div class="form-group">
          <label>Extension Options</label>
          <select id="fExtensions">
            <option value="none">None</option>
            <option value="1x1yr">1 × 1-Year</option>
            <option value="2x1yr">2 × 1-Year</option>
            <option value="3x1yr">3 × 1-Year</option>
            <option value="1x6mo">1 × 6-Month</option>
            <option value="2x6mo">2 × 6-Month</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="form-group">
          <label>Prepayment Penalty</label>
          <select id="fPrepay">
            <option value="none">None</option>
            <option value="stepdown">Step-Down</option>
            <option value="defeasance">Defeasance</option>
            <option value="yieldmaint">Yield Maintenance</option>
            <option value="lockout">Lockout Period</option>
          </select>
        </div>
        <div class="form-group">
          <label>Recourse</label>
          <select id="fRecourse">
            <option value="nonrecourse">Non-Recourse</option>
            <option value="fullrecourse">Full Recourse</option>
            <option value="limited">Limited Recourse</option>
            <option value="carveout">Carve-out Guaranty Only</option>
          </select>
        </div>
        <div class="form-group">
          <label>LTV at Close (%)</label>
          <input type="number" id="fLTV" placeholder="e.g. 65" min="0" max="100" step="0.1">
        </div>
        <div class="form-group">
          <label>Current Balance ($)</label>
          <input type="number" id="fBalance" placeholder="Leave blank to use loan amount" min="0">
        </div>
        <div class="form-group">
          <label>DSCR</label>
          <input type="number" id="fDSCR" placeholder="e.g. 1.25" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label>Lender Contact Name</label>
          <input type="text" id="fContactName" placeholder="e.g. John Smith">
        </div>
        <div class="form-group">
          <label>Lender Contact Email</label>
          <input type="email" id="fContactEmail" placeholder="john@lender.com">
        </div>
        <div class="form-group">
          <label>Lender Contact Phone</label>
          <input type="tel" id="fContactPhone" placeholder="555-555-5555">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="fStatus">
            <option value="active">Active</option>
            <option value="paidoff">Paid Off</option>
            <option value="refinancing">In Refi</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Notes</label>
          <textarea id="fNotes" rows="3" placeholder="Extension conditions, special covenants, escrow notes…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveLoan()"><i class="fas fa-save"></i> Save Loan</button>
      </div>
    </div>
  </div>

  <script>
    // ── Auth guard ───────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof SP !== 'undefined') {
        const sess = SP.getSession();
        if (!sess?.loggedIn) { window.location.href = 'login.html'; return; }
        const initials = (sess.name || sess.email || 'G').charAt(0).toUpperCase();
        document.getElementById('userAvatar').textContent = initials;
        document.getElementById('userName').textContent = sess.name || sess.email || 'GP';
        document.getElementById('userRole').textContent = sess.role === 'investor' ? 'Investor' : 'General Partner';
      }
      loadLoans();
    });

    // ── Data store ───────────────────────────────────────────────────────────
    const STORE_KEY = 'dt_loans_v1';
    let allLoans = [];
    let activeFilter = 'all';
    let editingId = null;

    function loadLoans() {
      try {
        allLoans = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
      } catch(e) { allLoans = []; }
      // Demo seed if empty
      if (allLoans.length === 0) seedDemo();
      updateSummary();
      renderTimeline();
      renderLoans();
    }

    function seedDemo() {
      const today = new Date();
      const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r.toISOString().split('T')[0]; };
      allLoans = [
        {
          id: 'loan_001', name: 'Oakwood MF Senior Loan', deal: 'Oakwood Apartments',
          lender: 'Walker & Dunlop', amount: 8500000, balance: 8500000,
          loanType: 'agency', rateType: 'fixed', rate: 4.75, spread: 0, index: '',
          amort: 'io', ioEnd: addDays(today, 210), origDate: '2023-01-15',
          maturity: addDays(today, 760), extensions: '2x1yr', prepay: 'stepdown',
          recourse: 'nonrecourse', ltv: 68, dscr: 1.32,
          contactName: 'Sarah Chen', contactEmail: 'schen@walkerdunlop.com', contactPhone: '214-555-0112',
          status: 'active', notes: 'Agency loan; step-down prepay 3-2-1. IO through month 24.'
        },
        {
          id: 'loan_002', name: 'River District Bridge', deal: 'River District MF',
          lender: 'Arbor Realty', amount: 12000000, balance: 11850000,
          loanType: 'bridge', rateType: 'floating', rate: 8.40, spread: 290, index: 'SOFR',
          amort: 'io', ioEnd: addDays(today, 80), origDate: '2024-06-01',
          maturity: addDays(today, 80), extensions: '1x1yr', prepay: 'none',
          recourse: 'limited', ltv: 72, dscr: 1.10,
          contactName: 'Mike Torres', contactEmail: 'mtorres@arbor.com', contactPhone: '212-555-0188',
          status: 'active', notes: 'Floating at SOFR+290. Maturity in ~80 days — exercise extension by maturity. Need business plan cert.'
        },
        {
          id: 'loan_003', name: 'Westside Retail Refi', deal: 'Westside Strip Center',
          lender: 'PNC Bank', amount: 3200000, balance: 3050000,
          loanType: 'cmbs', rateType: 'fixed', rate: 6.25, spread: 0, index: '',
          amort: '25yr', ioEnd: '', origDate: '2021-09-01',
          maturity: addDays(today, 340), extensions: 'none', prepay: 'defeasance',
          recourse: 'nonrecourse', ltv: 60, dscr: 1.45,
          contactName: 'Lisa Park', contactEmail: 'lpark@pnc.com', contactPhone: '312-555-0099',
          status: 'active', notes: 'CMBS, defeasance required. Start refi process 6 months out.'
        },
        {
          id: 'loan_004', name: 'Sunbelt Industrial Construction', deal: 'Sunbelt Logistics Park',
          lender: 'Comerica Bank', amount: 18000000, balance: 9400000,
          loanType: 'construction', rateType: 'floating', rate: 9.10, spread: 350, index: 'Prime',
          amort: 'io', ioEnd: addDays(today, 420), origDate: '2024-11-01',
          maturity: addDays(today, 420), extensions: '1x6mo', prepay: 'none',
          recourse: 'fullrecourse', ltv: 65, dscr: 0,
          contactName: 'Tom Bradley', contactEmail: 'tbradley@comerica.com', contactPhone: '469-555-0234',
          status: 'active', notes: 'Construction loan, draws at 70% complete. Mini-perm option at maturity.'
        }
      ];
      saveLoans();
    }

    function saveLoans() {
      localStorage.setItem(STORE_KEY, JSON.stringify(allLoans));
    }

    // ── Summary ──────────────────────────────────────────────────────────────
    function updateSummary() {
      const active = allLoans.filter(l => l.status === 'active');
      const total  = active.reduce((s,l) => s + (l.balance || l.amount || 0), 0);
      const today  = new Date();

      const maturing12 = active.filter(l => {
        if (!l.maturity) return false;
        const d = daysUntil(l.maturity);
        return d >= 0 && d <= 365;
      });
      const critical = active.filter(l => {
        if (!l.maturity) return false;
        return daysUntil(l.maturity) <= 90;
      });

      const totalMat12  = maturing12.reduce((s,l) => s + (l.balance||l.amount||0), 0);
      const totalCrit   = critical.reduce((s,l) => s + (l.balance||l.amount||0), 0);

      // Weighted average rate
      let wavgNum = 0, wavgDen = 0;
      active.forEach(l => {
        const bal = l.balance || l.amount || 0;
        wavgNum += (l.rate || 0) * bal;
        wavgDen += bal;
      });
      const wavg = wavgDen > 0 ? (wavgNum / wavgDen).toFixed(2) : null;

      const ioCount = active.filter(l => l.amort === 'io').length;

      document.getElementById('statTotalDebt').textContent    = '$' + fmt(total);
      document.getElementById('statLoanCount').textContent    = active.length + ' active loan' + (active.length!==1?'s':'');
      document.getElementById('statMaturingSoon').textContent = '$' + fmt(totalMat12);
      document.getElementById('statMaturingCount').textContent= maturing12.length + ' loan' + (maturing12.length!==1?'s':'') + ' in next 12 mo';
      document.getElementById('statCritical').textContent     = '$' + fmt(totalCrit);
      document.getElementById('statCriticalCount').textContent= critical.length + ' loan' + (critical.length!==1?'s':'') + ' critical';
      document.getElementById('statAvgRate').textContent      = wavg ? wavg + '%' : '—';
      document.getElementById('statIoCount').textContent      = ioCount + ' interest-only loan' + (ioCount!==1?'s':'');
    }

    // ── Timeline ─────────────────────────────────────────────────────────────
    function renderTimeline() {
      const events = [];
      const today  = new Date();

      allLoans.filter(l => l.status === 'active').forEach(l => {
        if (l.maturity) {
          const d = daysUntil(l.maturity);
          if (d >= -30 && d <= 730) {
            events.push({ loan: l.name, deal: l.deal, type: 'Maturity', date: l.maturity, days: d,
              color: d <= 90 ? 'var(--danger)' : d <= 180 ? 'var(--warning)' : 'var(--accent)' });
          }
        }
        if (l.ioEnd) {
          const d = daysUntil(l.ioEnd);
          if (d >= -30 && d <= 365) {
            events.push({ loan: l.name, deal: l.deal, type: 'IO Period Ends', date: l.ioEnd, days: d,
              color: 'var(--purple)' });
          }
        }
      });

      events.sort((a,b) => a.days - b.days);

      const section = document.getElementById('timelineSection');
      const list    = document.getElementById('timelineList');

      if (events.length === 0) { section.style.display = 'none'; return; }
      section.style.display = 'block';

      list.innerHTML = events.map(e => {
        const dLabel = e.days < 0 ? `${Math.abs(e.days)}d overdue` :
                       e.days === 0 ? 'TODAY' : `in ${e.days}d`;
        const dClass = e.days <= 0 ? 'background:#fee2e2;color:#dc2626;' :
                       e.days <= 90 ? 'background:#fef3c7;color:#d97706;' :
                       'background:#dbeafe;color:#1d4ed8;';
        return `<div class="timeline-item">
          <div class="timeline-dot" style="background:${e.color}"></div>
          <div class="timeline-content">
            <div class="timeline-loan">${esc(e.loan)}</div>
            <div class="timeline-event">${e.type}${e.deal ? ' · ' + esc(e.deal) : ''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="timeline-date">${fmtDate(e.date)}</div>
            <span class="timeline-days" style="${dClass}">${dLabel}</span>
          </div>
        </div>`;
      }).join('');
    }

    // ── Render loan cards ────────────────────────────────────────────────────
    function setFilter(f, btn) {
      activeFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      renderLoans();
    }

    function renderLoans() {
      const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
      let loans = allLoans.filter(l => {
        if (q && !((l.name+l.deal+l.lender+l.loanType).toLowerCase().includes(q))) return false;
        switch (activeFilter) {
          case 'active':   return l.status === 'active';
          case 'io':       return l.amort === 'io' && l.status === 'active';
          case 'fixed':    return l.rateType === 'fixed' && l.status === 'active';
          case 'floating': return l.rateType === 'floating' && l.status === 'active';
          case 'critical': return l.status === 'active' && l.maturity && daysUntil(l.maturity) <= 180;
          default: return true;
        }
      });

      const grid = document.getElementById('loansGrid');
      if (loans.length === 0) {
        grid.innerHTML = `<div class="empty-state">
          <div class="empty-icon"><i class="fas fa-landmark"></i></div>
          <div class="empty-title">No loans match this filter</div>
          <div class="empty-sub">Try a different filter or add a new loan.</div>
        </div>`;
        return;
      }

      grid.innerHTML = loans.map(l => loanCardHTML(l)).join('');
    }

    function loanCardHTML(l) {
      const days   = l.maturity ? daysUntil(l.maturity) : null;
      const bal    = l.balance || l.amount || 0;
      const pct    = l.amount > 0 ? Math.max(0, Math.min(100, (bal / l.amount) * 100)) : 0;

      let statusColor = '#0ea5e9';
      let statusBadge = `<span class="loan-badge badge-active">Active</span>`;

      if (l.status === 'paidoff') {
        statusColor = '#94a3b8';
        statusBadge = `<span class="loan-badge badge-paidoff">Paid Off</span>`;
      } else if (l.status === 'refinancing') {
        statusColor = '#8b5cf6';
        statusBadge = `<span class="loan-badge badge-io">In Refi</span>`;
      } else if (days !== null && days <= 90) {
        statusColor = '#ef4444';
        statusBadge = `<span class="loan-badge badge-critical">⚠ ${days}d to Maturity</span>`;
      } else if (days !== null && days <= 365) {
        statusColor = '#f59e0b';
        statusBadge = `<span class="loan-badge badge-maturing">Maturing ${fmtDate(l.maturity)}</span>`;
      }

      const rateTypeBadge = l.rateType === 'fixed'
        ? `<span class="loan-badge badge-fixed">Fixed</span>`
        : l.rateType === 'floating'
        ? `<span class="loan-badge badge-floating">Floating</span>`
        : `<span class="loan-badge badge-io">Hybrid</span>`;

      const ioNote = l.amort === 'io' && l.ioEnd && daysUntil(l.ioEnd) >= 0
        ? `<span class="loan-badge badge-io">IO → ${fmtDate(l.ioEnd)}</span>` : '';

      const loanTypeLabels = { senior:'Senior',bridge:'Bridge',mezzanine:'Mezz',preferred:'Pref Eq',
        construction:'Construction',agency:'Agency',cmbs:'CMBS',hud:'HUD/FHA' };

      return `<div class="loan-card" id="card_${l.id}">
        <div class="loan-card-header" onclick="toggleDetail('${l.id}')">
          <div class="loan-status-bar" style="background:${statusColor}"></div>
          <div class="loan-icon" style="background:${statusColor}22;color:${statusColor}">
            <i class="fas fa-landmark"></i>
          </div>
          <div class="loan-main">
            <div class="loan-name">${esc(l.name)}</div>
            <div class="loan-deal">${esc(l.lender||'—')} · ${esc(l.deal||'—')} · ${loanTypeLabels[l.loanType]||l.loanType}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;">
              ${statusBadge} ${rateTypeBadge} ${ioNote}
            </div>
          </div>
          <div class="loan-meta">
            <div class="loan-meta-item">
              <div class="loan-meta-label">Balance</div>
              <div class="loan-meta-value">$${fmt(bal)}</div>
            </div>
            <div class="loan-meta-item">
              <div class="loan-meta-label">Rate</div>
              <div class="loan-meta-value">${l.rate || '—'}%</div>
            </div>
            <div class="loan-meta-item">
              <div class="loan-meta-label">Maturity</div>
              <div class="loan-meta-value">${l.maturity ? fmtDate(l.maturity) : '—'}</div>
            </div>
            <div class="loan-meta-item">
              <div class="loan-meta-label">LTV</div>
              <div class="loan-meta-value">${l.ltv ? l.ltv + '%' : '—'}</div>
            </div>
          </div>
          <div class="loan-actions">
            <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();editLoan('${l.id}')"><i class="fas fa-edit"></i></button>
            <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteLoan('${l.id}')"><i class="fas fa-trash" style="color:var(--danger)"></i></button>
          </div>
        </div>

        <div class="loan-detail" id="detail_${l.id}">
          <div class="loan-detail-grid">

            <!-- Loan Terms -->
            <div class="loan-detail-section">
              <h4><i class="fas fa-file-contract"></i> Loan Terms</h4>
              <div class="detail-row"><span class="detail-label">Loan Amount</span><span class="detail-value">$${fmt(l.amount)}</span></div>
              <div class="detail-row"><span class="detail-label">Current Balance</span><span class="detail-value">$${fmt(bal)}</span></div>
              <div class="detail-row"><span class="detail-label">Rate Type</span><span class="detail-value">${capitalize(l.rateType)}</span></div>
              <div class="detail-row"><span class="detail-label">Interest Rate</span><span class="detail-value">${l.rate}%${l.rateType==='floating'&&l.index?' ('+l.index+' + '+l.spread+'bps)':''}</span></div>
              <div class="detail-row"><span class="detail-label">Amortization</span><span class="detail-value">${amortLabel(l.amort)}</span></div>
              <div class="detail-row"><span class="detail-label">IO Period End</span><span class="detail-value">${l.ioEnd ? fmtDate(l.ioEnd) : '—'}</span></div>
              <div class="detail-row"><span class="detail-label">Origination</span><span class="detail-value">${l.origDate ? fmtDate(l.origDate) : '—'}</span></div>
              <div class="detail-row"><span class="detail-label">Maturity</span><span class="detail-value">${l.maturity ? fmtDate(l.maturity) : '—'}</span></div>
              <div class="detail-row"><span class="detail-label">Days to Maturity</span><span class="detail-value">${days !== null ? days + ' days' : '—'}</span></div>
              <div class="amort-bar-wrap">
                <div class="amort-bar-label"><span>Balance Remaining</span><span>${pct.toFixed(1)}%</span></div>
                <div class="amort-bar"><div class="amort-fill" style="width:${pct}%"></div></div>
              </div>
            </div>

            <!-- Structure & Protection -->
            <div class="loan-detail-section">
              <h4><i class="fas fa-shield-alt"></i> Structure</h4>
              <div class="detail-row"><span class="detail-label">Loan Type</span><span class="detail-value">${loanTypeLabels[l.loanType]||l.loanType}</span></div>
              <div class="detail-row"><span class="detail-label">Recourse</span><span class="detail-value">${capitalize(l.recourse)}</span></div>
              <div class="detail-row"><span class="detail-label">LTV at Close</span><span class="detail-value">${l.ltv ? l.ltv + '%' : '—'}</span></div>
              <div class="detail-row"><span class="detail-label">DSCR</span><span class="detail-value">${l.dscr ? l.dscr + 'x' : '—'}</span></div>
              <div class="detail-row"><span class="detail-label">Extension Options</span><span class="detail-value">${l.extensions === 'none' ? 'None' : l.extensions}</span></div>
              <div class="detail-row"><span class="detail-label">Prepayment</span><span class="detail-value">${prepayLabel(l.prepay)}</span></div>
              ${l.contactName ? `
              <h4 style="margin-top:16px;"><i class="fas fa-user-tie"></i> Lender Contact</h4>
              <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">${esc(l.contactName)}</span></div>
              ${l.contactEmail ? `<div class="detail-row"><span class="detail-label">Email</span><span class="detail-value"><a href="mailto:${esc(l.contactEmail)}" style="color:var(--accent)">${esc(l.contactEmail)}</a></span></div>` : ''}
              ${l.contactPhone ? `<div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${esc(l.contactPhone)}</span></div>` : ''}
              ` : ''}
            </div>

            <!-- Notes & Actions -->
            <div class="loan-detail-section">
              <h4><i class="fas fa-sticky-note"></i> Notes</h4>
              <textarea class="notes-area" id="notes_${l.id}" onchange="saveNotes('${l.id}',this.value)">${esc(l.notes||'')}</textarea>
              <div style="margin-top:14px;display:flex;flex-direction:column;gap:8px;">
                <button class="btn btn-secondary btn-sm" style="width:100%;justify-content:center;" onclick="editLoan('${l.id}')">
                  <i class="fas fa-edit"></i> Edit Loan Details
                </button>
                ${l.contactEmail ? `<a href="mailto:${esc(l.contactEmail)}?subject=Re: ${encodeURIComponent(l.name)}" class="btn btn-secondary btn-sm" style="width:100%;justify-content:center;">
                  <i class="fas fa-envelope"></i> Email Lender
                </a>` : ''}
                <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;color:var(--danger);" onclick="deleteLoan('${l.id}')">
                  <i class="fas fa-trash"></i> Delete
                </button>
              </div>
            </div>

          </div>
        </div>
      </div>`;
    }

    function toggleDetail(id) {
      const el = document.getElementById('detail_' + id);
      el.classList.toggle('open');
    }

    function saveNotes(id, val) {
      const loan = allLoans.find(l => l.id === id);
      if (loan) { loan.notes = val; saveLoans(); }
    }

    // ── Modal ────────────────────────────────────────────────────────────────
    function openModal(loan) {
      editingId = loan ? loan.id : null;
      document.getElementById('modalTitle').textContent = loan ? 'Edit Loan' : 'Add Loan';
      document.getElementById('editId').value = loan?.id || '';

      const fields = ['Name','Deal','Lender','Amount','LoanType','RateType','Rate','Spread','Index',
        'Amort','IOEnd','OrigDate','Maturity','Extensions','Prepay','Recourse','LTV','Balance','DSCR',
        'ContactName','ContactEmail','ContactPhone','Status','Notes'];

      fields.forEach(f => {
        const el = document.getElementById('f' + f);
        if (!el) return;
        const key = f.charAt(0).toLowerCase() + f.slice(1);
        el.value = loan?.[key] ?? '';
      });

      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      editingId = null;
    }

    function handleOverlayClick(e) {
      if (e.target.id === 'modalOverlay') closeModal();
    }

    function saveLoan() {
      const name = document.getElementById('fName').value.trim();
      if (!name) { alert('Loan name is required.'); return; }

      const loan = {
        id:           editingId || 'loan_' + Date.now(),
        name,
        deal:         document.getElementById('fDeal').value.trim(),
        lender:       document.getElementById('fLender').value.trim(),
        amount:       parseFloat(document.getElementById('fAmount').value) || 0,
        loanType:     document.getElementById('fLoanType').value,
        rateType:     document.getElementById('fRateType').value,
        rate:         parseFloat(document.getElementById('fRate').value) || 0,
        spread:       parseFloat(document.getElementById('fSpread').value) || 0,
        index:        document.getElementById('fIndex').value,
        amort:        document.getElementById('fAmort').value,
        ioEnd:        document.getElementById('fIOEnd').value,
        origDate:     document.getElementById('fOrigDate').value,
        maturity:     document.getElementById('fMaturity').value,
        extensions:   document.getElementById('fExtensions').value,
        prepay:       document.getElementById('fPrepay').value,
        recourse:     document.getElementById('fRecourse').value,
        ltv:          parseFloat(document.getElementById('fLTV').value) || 0,
        balance:      parseFloat(document.getElementById('fBalance').value) || 0,
        dscr:         parseFloat(document.getElementById('fDSCR').value) || 0,
        contactName:  document.getElementById('fContactName').value.trim(),
        contactEmail: document.getElementById('fContactEmail').value.trim(),
        contactPhone: document.getElementById('fContactPhone').value.trim(),
        status:       document.getElementById('fStatus').value,
        notes:        document.getElementById('fNotes').value.trim(),
      };

      if (editingId) {
        const idx = allLoans.findIndex(l => l.id === editingId);
        if (idx >= 0) allLoans[idx] = loan;
      } else {
        allLoans.push(loan);
      }

      saveLoans();
      closeModal();
      updateSummary();
      renderTimeline();
      renderLoans();
    }

    function editLoan(id) {
      const loan = allLoans.find(l => l.id === id);
      if (loan) openModal(loan);
    }

    function deleteLoan(id) {
      const loan = allLoans.find(l => l.id === id);
      if (!confirm(`Delete "${loan?.name}"? This cannot be undone.`)) return;
      allLoans = allLoans.filter(l => l.id !== id);
      saveLoans();
      updateSummary();
      renderTimeline();
      renderLoans();
    }

    // ── CSV export ───────────────────────────────────────────────────────────
    function exportCSV() {
      const cols = ['Name','Deal','Lender','Loan Type','Rate Type','Rate %','Spread bps','Index',
        'Amortization','IO End','Origination','Maturity','Days to Maturity','Amount','Balance',
        'LTV %','DSCR','Extensions','Prepay','Recourse','Status','Contact','Notes'];
      const rows = [cols.join(',')];
      allLoans.forEach(l => {
        rows.push([
          qq(l.name), qq(l.deal), qq(l.lender), qq(l.loanType), qq(l.rateType),
          l.rate, l.spread, qq(l.index), qq(l.amort), qq(l.ioEnd), qq(l.origDate),
          qq(l.maturity), l.maturity ? daysUntil(l.maturity) : '',
          l.amount, l.balance || l.amount, l.ltv, l.dscr,
          qq(l.extensions), qq(l.prepay), qq(l.recourse), qq(l.status),
          qq(l.contactName), qq(l.notes)
        ].join(','));
      });
      const blob = new Blob([rows.join('\n')], { type:'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'deeltrack-debt-tracker.csv';
      a.click();
    }

    // ── Helpers ──────────────────────────────────────────────────────────────
    function daysUntil(dateStr) {
      if (!dateStr) return null;
      const now = new Date(); now.setHours(0,0,0,0);
      const d   = new Date(dateStr); d.setHours(0,0,0,0);
      return Math.round((d - now) / 86400000);
    }
    function fmt(n) {
      if (n === undefined || n === null) return '0';
      if (n >= 1e6) return (n/1e6).toFixed(2).replace(/\.?0+$/,'') + 'M';
      if (n >= 1e3) return (n/1e3).toFixed(0) + 'K';
      return n.toLocaleString();
    }
    function fmtDate(d) {
      if (!d) return '—';
      const dt = new Date(d + 'T00:00:00');
      return dt.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    }
    function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function qq(s)  { return '"' + (s||'').toString().replace(/"/g,'""') + '"'; }
    function capitalize(s) { if (!s) return '—'; return s.charAt(0).toUpperCase() + s.slice(1).replace(/([A-Z])/g,' $1'); }
    function amortLabel(a) {
      const m = { io:'Interest Only', '30yr':'30-Year', '25yr':'25-Year', '20yr':'20-Year', '15yr':'15-Year', balloon:'Balloon' };
      return m[a] || a;
    }
    function prepayLabel(p) {
      const m = { none:'None', stepdown:'Step-Down', defeasance:'Defeasance', yieldmaint:'Yield Maintenance', lockout:'Lockout' };
      return m[p] || p;
    }
  </script>
