<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Deal Milestones </title>
  <script src="js/sp-core.js?v8"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-flag-checkered"></i> Deal Milestones</h1>
      <div class="header-actions">
        <select id="dealFilter" class="form-select" onchange="Milestones.load()" style="width:auto;min-width:180px;"><option value="">All Deals</option></select>
        <button class="btn btn-primary" onclick="Milestones.showModal()"><i class="fas fa-plus"></i> Add Milestone</button>
      </div>
    </div>
    <div class="content">
      <div class="milestone-timeline" id="timeline"></div>
    </div>
  </main>
  <div id="mileModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header"><h2>Add Milestone</h2><button class="close" onclick="Milestones.closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Deal</label><select id="mDeal" class="form-select"></select></div>
        <div class="form-group"><label>Milestone Name</label><input type="text" id="mName" class="form-input"></div>
        <div class="form-row">
          <div class="form-group"><label>Target Date</label><input type="date" id="mDate" class="form-input"></div>
          <div class="form-group"><label>Status</label><select id="mStatus" class="form-select"><option value="pending">Pending</option><option value="in-progress">In Progress</option><option value="completed">Completed</option><option value="delayed">Delayed</option></select></div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="Milestones.closeModal()">Cancel</button><button class="btn btn-primary" onclick="Milestones.save()">Save</button></div>
    </div>
  </div>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Milestones.init();}</script>
  <script src="js/sp-milestones.js"></script>
</body>
</html>
