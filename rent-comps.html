<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Rent Comps </title>
  <script src="js/sp-core.js?v3"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-building"></i> Rent Comps</h1>
      <div class="header-actions"><button class="btn btn-primary" onclick="RC.add()">Add Comp</button></div>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Avg 1BR</span><span class="stat-value" id="avg1">$0</span></div>
        <div class="stat-card"><span class="stat-label">Avg 2BR</span><span class="stat-value" id="avg2">$0</span></div>
        <div class="stat-card"><span class="stat-label">Avg 3BR</span><span class="stat-value" id="avg3">$0</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Comparable Properties</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Property</th><th>Distance</th><th>1BR</th><th>2BR</th><th>3BR</th></tr></thead><tbody id="rcTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}RC.init();}</script>
  <script src="js/sp-rc.js"></script>
</body>
</html>
