<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Lease Expiry </title>
  <script src="js/sp-core.js"></script>
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-calendar-expiry"></i> Lease Expiry</h1>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Total Leases</span><span class="stat-value">42</span></div>
        <div class="stat-card"><span class="stat-label">Expiring 30d</span><span class="stat-value text-warning">5</span></div>
        <div class="stat-card"><span class="stat-label">Expiring 90d</span><span class="stat-value text-info">12</span></div>
        <div class="stat-card"><span class="stat-label">At Risk</span><span class="stat-value text-danger">3</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Lease Rollforward</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Property</th><th>Unit</th><th>Tenant</th><th>Rent</th><th>Expiry</th><th>Days Left</th><th>Status</th></tr></thead><tbody id="expiryTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}LeaseExpiry.init();}</script>
  <script src="js/sp-lease-expiry.js"></script>
</body>
</html>
