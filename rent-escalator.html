<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Rent Escalator </title>
  <script src="js/sp-core.js?v3"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-arrow-trend-up"></i> Rent Escalator</h1>
    </div>
    <div class="content">
      <div class="grid-2">
        <div class="card">
          <div class="card-header"><h2>Calculator</h2></div>
          <div class="card-body">
            <div class="form-group"><label>Current Monthly Rent</label><input type="number" id="rCurrent" class="form-input" value="50000" oninput="Escalator.calc()"></div>
            <div class="form-row">
              <div class="form-group"><label>Escalation %</label><input type="number" id="rRate" class="form-input" value="3" step="0.5" oninput="Escalator.calc()"></div>
              <div class="form-group"><label>Years</label><input type="number" id="rYears" class="form-input" value="5" oninput="Escalator.calc()"></div>
            </div>
            <div class="form-group"><label>Frequency</label><select id="rFreq" class="form-select" onchange="Escalator.calc()"><option value="1">Annual</option><option value="0.5">Semi-Annual</option><option value="2">Every 2 Years</option></select></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h2>Results</h2></div>
          <div class="card-body" id="rResults">
            <div class="result-row"><span>Year 5 Rent</span><strong id="rFinal">$0</strong></div>
            <div class="result-row"><span>Total Revenue</span><strong id="rTotal">$0</strong></div>
            <div class="result-row"><span>Escalation Gain</span><strong id="rGain">$0</strong></div>
            <div class="result-row"><span>CAGR</span><strong id="rCagr">0%</strong></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Projection</h2></div>
        <div class="card-body"><canvas id="rChart" height="80"></canvas></div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Escalator.init();}</script>
  <script src="js/sp-escalator.js"></script>
</body>
</html>
