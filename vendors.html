<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Vendors </title>
  <script src="js/sp-core.js?v2"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-tools"></i> Vendor Management</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="Vendors.showModal()"><i class="fas fa-plus"></i> Add Vendor</button>
      </div>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Total Vendors</span><span class="stat-value" id="statVendors">0</span></div>
        <div class="stat-card"><span class="stat-label">Active Contracts</span><span class="stat-value" id="statActive">0</span></div>
        <div class="stat-card"><span class="stat-label">YTD Spend</span><span class="stat-value" id="statSpend">$0</span></div>
        <div class="stat-card"><span class="stat-label">Avg. Rating</span><span class="stat-value" id="statRating">0.0</span></div>
      </div>
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-list"></i> Vendor Directory</h2>
          <div class="filter-group">
            <select id="catFilter" class="form-select form-select-sm" onchange="Vendors.render()"><option value="">All Categories</option><option value="contractor">Contractor</option><option value="pm">Property Manager</option><option value="accounting">Accounting</option><option value="legal">Legal</option><option value="maintenance">Maintenance</option></select>
          </div>
        </div>
        <div class="card-body">
          <table class="data-table">
            <thead><tr><th>Vendor</th><th>Category</th><th>Contact</th><th>Properties</th><th>YTD Spend</th><th>Rating</th><th class="text-center">Actions</th></tr></thead>
            <tbody id="vendorTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
  <div id="vendorModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header"><h2>Add Vendor</h2><button class="close" onclick="Vendors.closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Company Name</label><input type="text" id="vCompany" class="form-input"></div>
        <div class="form-row">
          <div class="form-group"><label>Category</label><select id="vCategory" class="form-select"><option value="contractor">Contractor</option><option value="pm">Property Manager</option><option value="accounting">Accounting</option><option value="legal">Legal</option><option value="maintenance">Maintenance</option></select></div>
          <div class="form-group"><label>Contact Name</label><input type="text" id="vContact" class="form-input"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Phone</label><input type="tel" id="vPhone" class="form-input"></div>
          <div class="form-group"><label>Email</label><input type="email" id="vEmail" class="form-input"></div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="Vendors.closeModal()">Cancel</button><button class="btn btn-primary" onclick="Vendors.save()">Save</button></div>
    </div>
  </div>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Vendors.init();}</script>
  <script src="js/sp-vendors.js"></script>
</body>
</html>
