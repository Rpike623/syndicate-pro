<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investment Thesis | Deeltrack</title>
  <script src="js/sp-core.js"></script>
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-lightbulb"></i> Investment Thesis</h1>
      <div class="header-actions">
        <button class="btn btn-secondary" onclick="Thesis.export()"><i class="fas fa-download"></i> Export</button>
        <button class="btn btn-primary" onclick="Thesis.save()"><i class="fas fa-save"></i> Save</button>
      </div>
    </div>
    <div class="content">
      <div class="thesis-form">
        <div class="card">
          <div class="card-header"><h2>Property Overview</h2></div>
          <div class="card-body">
            <div class="form-row">
              <div class="form-group"><label>Property Name</label><input type="text" id="tName" class="form-input" value="Sunset Apartments"></div>
              <div class="form-group"><label>Asset Class</label><select id="tClass" class="form-select"><option>Multifamily</option><option>Office</option><option>Industrial</option><option>Retail</option></select></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Purchase Price</label><input type="number" id="tPrice" class="form-input" value="16500000"></div>
              <div class="form-group"><label>Square Feet</label><input type="number" id="tSf" class="form-input" value="85000"></div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h2>Investment Thesis</h2></div>
          <div class="card-body">
            <div class="form-group"><label>Value-Add Strategy</label><textarea id="tStrategy" class="form-input" rows="3">Targeted interior renovations to 60% of units at $8K/unit. New amenities package including fitness center upgrade, package lockers, and dog park. Pro forma assumes 200bps occupancy improvement and 8% rent growth.</textarea></div>
            <div class="form-group"><label>Market Opportunity</label><textarea id="tMarket" class="form-input" rows="3">Phoenix MSA continues to experience strong population growth (+2.8% annually).employment gains outpacing national average. Multifamily vacancy at 5.2%, below equilibrium. Strong renter demand from domestic migration.</textarea></div>
            <div class="form-group"><label>Exit Strategy</label><textarea id="tExit" class="form-input" rows="3">5-year hold. Refinance at year 3 to pull out initial equity. Dispose via 1031 exchange into larger portfolio or sale to institution. Conservative 5.5% cap rate exit assumption.</textarea></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h2>Risk Factors</h2></div>
          <div class="card-body">
            <div class="form-group"><label>Key Risks</label><textarea id="tRisks" class="form-input" rows="3">• Interest rate risk mitigated with rate lock
• Construction cost inflation addressed via guaranteed maximum price contract
• Regional economic downturn - diversified employer base provides buffer</textarea></div>
          </div>
        </div>
      </div>
      <div class="thesis-preview">
        <div class="card" id="preview">
          <div class="card-header"><h2>Preview</h2></div>
          <div class="card-body" id="previewContent"></div>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Thesis.init();}</script>
  <script src="js/sp-thesis.js"></script>
</body>
</html>
