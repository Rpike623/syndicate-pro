<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Capital Stack </title>
  <script src="js/sp-core.js"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-layer-group"></i> Capital Stack</h1>
      <div class="header-actions">
        <select id="dealFilter" class="form-select" onchange="CapitalStack.load()" style="width:auto;min-width:180px;">
          <option value="">Select Deal</option>
          <option value="sunset">Sunset Apartments</option>
          <option value="downtown">Downtown Office</option>
          <option value="industrial">Industrial Portfolio</option>
        </select>
      </div>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Total Capital</span><span class="stat-value" id="statTotal">$0</span></div>
        <div class="stat-card"><span class="stat-label">Senior Debt</span><span class="stat-value" id="statSenior">$0</span></div>
        <div class="stat-card"><span class="stat-label">Mezz Debt</span><span class="stat-value" id="statMezz">$0</span></div>
        <div class="stat-card"><span class="stat-label">Equity</span><span class="stat-value" id="statEquity">$0</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Capital Structure</h2></div>
        <div class="card-body">
          <div class="stack-visual" id="stackVisual"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Financing Details</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Tranche</th><th>Lender</th><th>Amount</th><th>Rate</th><th>Term</th><th>LTV</th></tr></thead><tbody id="stackTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}CapitalStack.init();}</script>
  <script src="js/sp-capital-stack.js"></script>
</body>
</html>
