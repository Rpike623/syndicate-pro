name: Deploy Firebase

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'
      - 'functions/**'

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check for rule changes
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(firestore\.rules|firestore\.indexes\.json|storage\.rules)$'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Deploy Firestore & Storage Rules
        if: steps.check.outputs.changed == 'true'
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore:rules,firestore:indexes,storage --project deeltrack
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check for function changes
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^functions/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Install function dependencies
        if: steps.check.outputs.changed == 'true'
        run: cd functions && npm ci
      - name: Deploy Cloud Functions
        if: steps.check.outputs.changed == 'true'
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions --project deeltrack
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
