name: Deploy Firebase

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'
      - 'functions/**'

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check for rule changes
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(firestore\.rules|firestore\.indexes\.json|storage\.rules)$'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Deploy Firestore & Storage Rules
        if: steps.check.outputs.changed == 'true'
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore:rules,firestore:indexes,storage --project deeltrack
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check for function changes
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^functions/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Install function dependencies
        if: steps.check.outputs.changed == 'true'
        run: cd functions && npm ci
      - name: Deploy Cloud Functions
        if: steps.check.outputs.changed == 'true'
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions --project deeltrack
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Set allUsers invoker on callable/HTTP functions
        if: steps.check.outputs.changed == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: Grant invoker permissions
        if: steps.check.outputs.changed == 'true'
        run: |
          # All onCall + onRequest functions need allUsers invoker for browser/webhook access.
          # Trigger-based functions (onDocument*, onSchedule) do NOT need this.
          CALLABLE_FUNCTIONS=(
            sendEmail
            createCheckoutSession
            getSubscriptionStatus
            createSigningRequest
            getOrgKey
            encryptData
            decryptData
            decryptLegacy
            rotateKey
            getKeyStatus
            healUserRole
            inviteTeamMember
            acceptTeamInvite
            removeTeamMember
            listTeamMembers
            stripeWebhook
            firmaWebhook
            createBillingPortalSession
            parseDocumentVariables
            aiDraftInvestorUpdate
            aiParseBrokerOM
            aiReviewDocument
            aiDraftNotice
            aiDueDiligenceChecklist
            aiCompareDeal
            aiCategorizeDocument
            aiUnderwritingCheck
            aiInvestorQA
          )
          for fn in "${CALLABLE_FUNCTIONS[@]}"; do
            echo "Setting allUsers invoker on $fn..."
            gcloud functions add-invoker-policy-binding "$fn" \
              --region=us-central1 \
              --member="allUsers" \
              --project=deeltrack \
              --quiet 2>/dev/null || echo "  ⚠ $fn: skipped (may not exist yet)"
          done
