<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | GP Carry & Vesting </title>
  <script src="js/sp-core.js?v6"></script>
  <script src="js/sp-crypto.js"></script>
  <script src="js/sp-data.js?v6"></script>
  <script src="js/sp-firebase.js?v6"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
      </button>
      <h1><i class="fas fa-award"></i> GP Carry & Vesting</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="Vesting.showAddModal()">
          <i class="fas fa-plus"></i> Add GP
        </button>
      </div>
    </div>

    <div class="content">
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-label">Total GPs</span>
          <span class="stat-value" id="statGPs">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Total Carry Earned</span>
          <span class="stat-value text-success" id="statCarryEarned">$0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Carry Vested</span>
          <span class="stat-value" id="statCarryVested">$0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Carry Pending</span>
          <span class="stat-value text-warning" id="statCarryPending">$0</span>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-users"></i> GP Partners</h2>
        </div>
        <div class="card-body">
          <table class="data-table">
            <thead>
              <tr>
                <th>GP</th>
                <th>Ownership %</th>
                <th>Carry %</th>
                <th>Vesting Schedule</th>
                <th>Deal Carry Earned</th>
                <th>Vested</th>
                <th>Pending</th>
                <th class="text-center">Actions</th>
              </tr>
            </thead>
            <tbody id="gpTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-chart-line"></i> Carry by Deal</h2>
        </div>
        <div class="card-body">
          <table class="data-table">
            <thead>
              <tr>
                <th>Deal</th>
                <th>Gross Profit</th>
                <th>LP Return</th>
                <th>Carry Pool</th>
                <th>GP Carry</th>
                <th>Distribution</th>
              </tr>
            </thead>
            <tbody id="dealCarryBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div id="gpModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2><i class="fas fa-user-plus"></i> Add GP Partner</h2>
        <button class="close" onclick="Vesting.closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>GP Name</label>
          <input type="text" id="gpName" class="form-input" placeholder="John Smith">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>GP Ownership %</label>
            <input type="number" id="gpOwnership" class="form-input" placeholder="50" step="0.1">
          </div>
          <div class="form-group">
            <label>Carry %</label>
            <input type="number" id="gpCarry" class="form-input" placeholder="20" step="0.1">
          </div>
        </div>
        <div class="form-group">
          <label>Vesting Schedule</label>
          <select id="gpVesting" class="form-select">
            <option value="4yr">4 Year (25% per year)</option>
            <option value="3yr">3 Year (33.3% per year)</option>
            <option value="2yr">2 Year (50% per year)</option>
            <option value="cliff">3 Year Cliff</option>
            <option value="immediate">Immediate (0% vesting)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Start Date</label>
          <input type="date" id="gpStart" class="form-input">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Vesting.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="Vesting.save()">Save</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.SP && SP.isLoggedIn) initPage();
      else document.addEventListener('sp-ready', initPage);
    });
    function initPage() {
      if (!SP.isLoggedIn()) { window.location.href = 'login.html'; return; }
      Vesting.init();
    }
  </script>
  <script src="js/sp-vesting.js"></script>
</body>
</html>
