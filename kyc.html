<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | KYC / AML Compliance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="js/sp-core.js?v10"></script>
  <script src="js/sp-data.js?v10"></script>
  <script src="js/sp-firebase.js?v10"></script>
  <script src="js/sp-email.js?v3"></script>
  <style>
    :root{--accent:#F37925;--success:#2D9A6B;--warning:#E8890A;--danger:#D94F3D;--info:#3B82F6;--bg:#F3F3F3;--surface:#FFF;--border:#E2DDD8;--text:#1B1A19;--muted:#6B6560;--radius:12px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;}
    .main{flex:1;margin-left:var(--dt-sidebar-width);padding:32px 40px;}
    @media(max-width:768px){.main{margin-left:0!important;width:100%!important;padding:16px;}}

    /* Stats bar */
    .stats-bar{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
    .stat-card{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;text-align:center;}
    .stat-num{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:1.8rem;}
    .stat-label{font-size:.7rem;text-transform:uppercase;color:var(--muted);font-weight:600;letter-spacing:.05em;margin-top:4px;}

    /* Filters */
    .toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
    .toolbar input,.toolbar select{padding:9px 14px;border:1px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:.85rem;background:var(--surface);color:var(--text);}
    .toolbar input{flex:1;min-width:180px;}

    /* Table */
    .kyc-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
    table{width:100%;border-collapse:collapse;}
    th{background:var(--bg);padding:12px 16px;text-align:left;font-size:.72rem;text-transform:uppercase;color:var(--muted);font-weight:700;letter-spacing:.04em;white-space:nowrap;}
    td{padding:14px 16px;border-top:1px solid var(--border);vertical-align:middle;font-size:.88rem;}
    tr:hover td{background:rgba(243,121,37,.03);}

    /* Badges */
    .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:700;white-space:nowrap;}
    .badge-clear{background:rgba(45,154,107,.12);color:#0F5C35;}
    .badge-review{background:rgba(59,130,246,.12);color:#1e40af;}
    .badge-flagged{background:rgba(232,137,10,.15);color:#92400E;}
    .badge-blocked{background:rgba(217,79,61,.12);color:#991b1b;}
    .badge-pending{background:rgba(107,101,96,.1);color:var(--muted);}

    /* Accred badges */
    .ab-verified{background:rgba(45,154,107,.12);color:#0F5C35;}
    .ab-pending{background:rgba(232,137,10,.12);color:#92400E;}
    .ab-expired{background:rgba(217,79,61,.12);color:#991b1b;}

    /* Doc checklist pills */
    .doc-pills{display:flex;gap:4px;flex-wrap:wrap;}
    .doc-pill{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:.67rem;font-weight:700;white-space:nowrap;}
    .doc-pill.have{background:rgba(45,154,107,.1);color:#0F5C35;}
    .doc-pill.missing{background:var(--bg);color:var(--muted);border:1px solid var(--border);}

    /* Risk meter */
    .risk-bar{display:flex;align-items:center;gap:8px;}
    .risk-track{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;min-width:60px;}
    .risk-fill{height:100%;border-radius:3px;transition:width .3s;}
    .risk-low{background:var(--success);}
    .risk-med{background:var(--warning);}
    .risk-high{background:var(--danger);}
    .risk-label{font-size:.72rem;font-weight:700;font-family:'JetBrains Mono',monospace;min-width:24px;text-align:right;}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .15s;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-primary:hover{background:#e06d1e;}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
    .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
    .btn-danger{background:var(--danger);color:#fff;}
    .btn-sm{padding:5px 10px;font-size:.75rem;}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--surface);border-radius:var(--radius);width:100%;max-width:640px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2);}
    .modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .modal-head h2{font-size:1rem;font-weight:700;}
    .modal-body{padding:24px;overflow-y:auto;flex:1;}
    .modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}

    /* Form */
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
    .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
    .form-group label{font-size:.8rem;font-weight:600;color:var(--muted);}
    .form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:.88rem;background:var(--surface);color:var(--text);}
    .form-group textarea{resize:vertical;min-height:80px;}

    /* Doc upload list */
    .doc-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
    .doc-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border-radius:8px;border:1px solid var(--border);}
    .doc-row .doc-icon{width:32px;height:32px;border-radius:8px;background:rgba(243,121,37,.1);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:.8rem;flex-shrink:0;}
    .doc-row .doc-info{flex:1;min-width:0;}
    .doc-row .doc-name{font-size:.83rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .doc-row .doc-meta{font-size:.72rem;color:var(--muted);}
    .doc-row .doc-status{display:flex;align-items:center;gap:6px;}

    /* Checklist in modal */
    .check-list{display:flex;flex-direction:column;gap:8px;}
    .check-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border-radius:8px;cursor:pointer;}
    .check-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;}
    .check-item label{font-size:.85rem;cursor:pointer;flex:1;}
    .check-item .upload-btn{padding:4px 10px;font-size:.72rem;}

    /* OFAC section */
    .ofac-result{padding:12px 16px;border-radius:8px;margin-top:10px;font-size:.83rem;}
    .ofac-clear{background:rgba(45,154,107,.1);border:1px solid rgba(45,154,107,.2);color:#0F5C35;}
    .ofac-hit{background:rgba(217,79,61,.1);border:1px solid rgba(217,79,61,.25);color:#991b1b;}
    .ofac-pending{background:var(--bg);border:1px solid var(--border);color:var(--muted);}

    /* Empty state */
    .empty{text-align:center;padding:60px 24px;color:var(--muted);}
    .empty i{font-size:2.5rem;margin-bottom:12px;display:block;opacity:.4;}

    /* Toast */
    #toast{position:fixed;bottom:24px;right:24px;background:#1B1A19;color:#fff;padding:12px 20px;border-radius:10px;font-size:.85rem;font-weight:600;z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;}
    #toast.show{opacity:1;transform:translateY(0);}

    .section-label{font-size:.75rem;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.06em;margin-bottom:8px;}
    .divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
  </style>
</head>
<body>
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-shield-alt" style="color:var(--accent);margin-right:8px;"></i> KYC / AML Compliance</h1>
      <div class="header-actions">
        <button class="btn btn-ghost" onclick="exportCSV()"><i class="fas fa-download"></i> Export</button>
        <button class="btn btn-primary" onclick="openBulkRequest()"><i class="fas fa-paper-plane"></i> Request Docs</button>
      </div>
    </div>

    <div class="content" style="padding:28px 32px;">

      <!-- Stats -->
      <div class="stats-bar" id="statsBar"></div>

      <!-- Filters -->
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search investors..." oninput="renderTable()">
        <select id="kycFilter" onchange="renderTable()">
          <option value="">All KYC Statuses</option>
          <option value="clear">Clear</option>
          <option value="review">Under Review</option>
          <option value="flagged">Flagged</option>
          <option value="blocked">Blocked</option>
          <option value="pending">Pending</option>
        </select>
        <select id="accredFilter" onchange="renderTable()">
          <option value="">All Accreditation</option>
          <option value="verified">Verified</option>
          <option value="pending">Pending</option>
          <option value="expired">Expired</option>
        </select>
        <select id="riskFilter" onchange="renderTable()">
          <option value="">All Risk Levels</option>
          <option value="low">Low Risk</option>
          <option value="medium">Medium Risk</option>
          <option value="high">High Risk</option>
        </select>
      </div>

      <!-- Table -->
      <div class="kyc-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Investor</th>
              <th>KYC Status</th>
              <th>Accreditation</th>
              <th>Documents</th>
              <th>AML Risk</th>
              <th>OFAC</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="kycTableBody">
            <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted);">Loading...</td></tr>
          </tbody>
        </table>
      </div>

    </div><!-- end .content -->
  </main>

  <!-- Investor KYC Detail Modal -->
  <div class="modal-overlay" id="kycModal">
    <div class="modal">
      <div class="modal-head">
        <h2 id="modalInvName">KYC Review</h2>
        <button class="btn btn-ghost btn-sm" onclick="closeModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="closeModal()">Close</button>
        <button class="btn btn-primary" id="modalSaveBtn" onclick="saveKYC()"><i class="fas fa-save"></i> Save</button>
      </div>
    </div>
  </div>

  <!-- Bulk Request Modal -->
  <div class="modal-overlay" id="bulkModal">
    <div class="modal" style="max-width:480px;">
      <div class="modal-head">
        <h2>Request KYC Documents</h2>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('bulkModal').classList.remove('open')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <p style="font-size:.85rem;color:var(--muted);margin-bottom:16px;">Send a verification request email to investors with incomplete KYC documents.</p>
        <div class="form-group">
          <label>Send to</label>
          <select id="bulkTarget">
            <option value="pending">Investors with Pending KYC (all incomplete)</option>
            <option value="no_accred">Missing accreditation letter only</option>
            <option value="no_id">Missing government ID only</option>
            <option value="no_w9">Missing W-9 only</option>
          </select>
        </div>
        <div class="form-group">
          <label>Custom message (optional)</label>
          <textarea id="bulkMessage" rows="3" placeholder="We're updating our KYC records. Please submit the requested documents at your earliest convenience."></textarea>
        </div>
        <div id="bulkPreview" style="font-size:.82rem;color:var(--muted);padding:10px 14px;background:var(--bg);border-radius:8px;"></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" onclick="document.getElementById('bulkModal').classList.remove('open')">Cancel</button>
        <button class="btn btn-primary" onclick="sendBulkRequest()"><i class="fas fa-paper-plane"></i> Send Requests</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    SP.requireGP();

    // ── KYC data store (Firestore-backed via SP.load/save on 'kyc_records') ──
    // Each record: { investorId, kycStatus, ofacStatus, ofacCheckedAt, ofacNotes,
    //   docs: { govId: {name,url,uploadedAt,reviewedAt,approved}, w9:{...}, accredLetter:{...}, subAgreement:{...} },
    //   notes, lastUpdated }

    let kycData = {};   // map investorId → record
    let investors = [];
    let currentInvId = null;

    // ── AML risk scoring ──────────────────────────────────────────────────────
    function computeAmlRisk(inv, kyc) {
      let score = 0;
      const flags = [];

      // No TIN
      if (!inv.tin) { score += 25; flags.push('No TIN on file'); }

      // Foreign / non-US address
      const addr = (inv.address || '').toLowerCase();
      if (!addr || (!addr.includes('tx') && !addr.includes('ca') && !addr.includes('ny') &&
          !addr.includes('fl') && !addr.includes('il') && !addr.includes('az') &&
          !addr.includes('co') && !addr.includes('ga') && !addr.match(/\b[A-Z]{2}\b/))) {
        // Could be foreign - only flag if no state code
        if (!addr.match(/,\s*[a-z]{2}[\s,]/i) && addr.length > 5) {
          score += 15; flags.push('No US state in address');
        }
      }

      // Large round investments (structuring indicator)
      const invested = inv.totalInvested || 0;
      if (invested > 0 && invested % 100000 === 0 && invested >= 500000) {
        score += 10; flags.push('Round-number investment amount');
      }

      // Missing accreditation
      if (!inv.accredStatus || inv.accredStatus === 'pending') {
        score += 20; flags.push('Accreditation not verified');
      }
      if (inv.accredStatus === 'expired') {
        score += 30; flags.push('Accreditation expired');
      }

      // Missing documents
      const docs = (kyc || {}).docs || {};
      if (!docs.govId?.url) { score += 15; flags.push('No government ID uploaded'); }
      if (!docs.w9?.url) { score += 10; flags.push('No W-9 on file'); }
      if (!docs.accredLetter?.url) { score += 10; flags.push('No accreditation letter'); }

      // OFAC flagged
      if ((kyc || {}).ofacStatus === 'hit') { score += 50; flags.push('OFAC watchlist match'); }

      const level = score >= 50 ? 'high' : score >= 20 ? 'medium' : 'low';
      return { score: Math.min(score, 100), level, flags };
    }

    // ── Required docs definition ──────────────────────────────────────────────
    const DOC_TYPES = [
      { key: 'govId',       label: 'Government ID',        icon: 'fa-id-card',       hint: 'Passport, driver's license, or national ID' },
      { key: 'w9',          label: 'W-9 / W-8BEN',         icon: 'fa-file-invoice',  hint: 'IRS tax form for US persons (W-9) or foreign persons (W-8BEN)' },
      { key: 'accredLetter',label: 'Accreditation Letter',  icon: 'fa-certificate',   hint: 'Letter from CPA, attorney, or broker verifying accredited status' },
      { key: 'subAgreement',label: 'Subscription Agreement',icon: 'fa-file-signature',hint: 'Signed subscription agreement for each active deal' },
    ];

    // ── KYC status logic ──────────────────────────────────────────────────────
    function deriveKycStatus(inv, kyc) {
      if ((kyc || {}).kycStatus === 'blocked') return 'blocked';
      if ((kyc || {}).kycStatus === 'flagged') return 'flagged';
      if ((kyc || {}).ofacStatus === 'hit') return 'flagged';
      const docs = (kyc || {}).docs || {};
      const allDocs = DOC_TYPES.every(d => !!docs[d.key]?.url);
      const accredOk = inv.accredStatus === 'verified';
      if (allDocs && accredOk) return (kyc || {}).kycStatus || 'clear';
      return 'review';
    }

    // ── Demo investor fallback ──────────────────────────────────────────────
    const DEMO_INVESTORS = [
      { id:'i1', firstName:'James', lastName:'Hartwell', email:'jhartwell@email.com', accredStatus:'verified', accredExpiry:null, totalInvested:250000 },
      { id:'i2', firstName:'Sarah', lastName:'Chen', email:'schen@email.com', accredStatus:'verified', accredExpiry:null, totalInvested:500000 },
      { id:'i3', firstName:'Marcus', lastName:'Williams', email:'mwilliams@email.com', accredStatus:'pending', totalInvested:250000 },
      { id:'i4', firstName:'Phil', lastName:'Chapman', email:'pchapman@email.com', accredStatus:'pending', totalInvested:300000 },
      { id:'i5', firstName:'Lisa', lastName:'Rodriguez', email:'lrodriguez@email.com', accredStatus:'expired', totalInvested:150000 },
    ];

    // ── Load data ─────────────────────────────────────────────────────────────
    let _loadAttempts = 0;
    function load() {
      _loadAttempts++;
      try {
        investors = SP.getInvestors ? SP.getInvestors() : [];
      } catch (e) {
        console.warn('KYC: SP.getInvestors() error:', e);
        investors = [];
      }
      // If no investors from Firestore, generate demo data so the page isn't stuck on Loading
      if (!investors || !investors.length) {
        // Retry up to 3 times with 1s delay in case data is still loading
        if (_loadAttempts <= 3) {
          setTimeout(load, 1000);
          return;
        }
        investors = DEMO_INVESTORS;
      }
      let stored;
      try {
        stored = SP.load('kyc_records', {});
      } catch (e) {
        console.warn('KYC: SP.load kyc_records error:', e);
        stored = {};
      }
      kycData = stored || {};
      renderStats();
      renderTable();
      updateBulkPreview();
    }

    // ── Stats bar ─────────────────────────────────────────────────────────────
    function renderStats() {
      const counts = { clear: 0, review: 0, flagged: 0, blocked: 0, pending: 0 };
      let highRisk = 0;
      investors.forEach(inv => {
        const kyc = kycData[inv.id];
        const status = deriveKycStatus(inv, kyc);
        counts[status] = (counts[status] || 0) + 1;
        if (computeAmlRisk(inv, kyc).level === 'high') highRisk++;
      });
      const total = investors.length;
      const complianceRate = total > 0 ? Math.round((counts.clear / total) * 100) : 0;

      document.getElementById('statsBar').innerHTML = `
        <div class="stat-card">
          <div class="stat-num" style="color:var(--success);">${complianceRate}%</div>
          <div class="stat-label">Compliance Rate</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--success);">${counts.clear}</div>
          <div class="stat-label">KYC Clear</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--info);">${counts.review}</div>
          <div class="stat-label">Under Review</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--warning);">${counts.flagged}</div>
          <div class="stat-label">Flagged</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--danger);">${highRisk}</div>
          <div class="stat-label">High AML Risk</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--text);">${total}</div>
          <div class="stat-label">Total Investors</div>
        </div>
      `;
    }

    // ── Table ─────────────────────────────────────────────────────────────────
    function renderTable() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const kycF = document.getElementById('kycFilter').value;
      const accredF = document.getElementById('accredFilter').value;
      const riskF = document.getElementById('riskFilter').value;

      let rows = investors.map(inv => {
        const kyc = kycData[inv.id] || {};
        const status = deriveKycStatus(inv, kyc);
        const risk = computeAmlRisk(inv, kyc);
        const accredStatus = inv.accredStatus || 'pending';
        return { inv, kyc, status, risk, accredStatus };
      });

      // Filters
      if (search) rows = rows.filter(r =>
        `${r.inv.firstName} ${r.inv.lastName} ${r.inv.email}`.toLowerCase().includes(search));
      if (kycF) rows = rows.filter(r => r.status === kycF);
      if (accredF) rows = rows.filter(r => r.accredStatus === accredF);
      if (riskF) rows = rows.filter(r => r.risk.level === riskF);

      // Sort: high risk first, then flagged, then review
      const statusOrder = { blocked: 0, flagged: 1, review: 2, pending: 3, clear: 4 };
      rows.sort((a, b) => (b.risk.score - a.risk.score) || (statusOrder[a.status] || 9) - (statusOrder[b.status] || 9));

      const tbody = document.getElementById('kycTableBody');
      if (rows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty"><i class="fas fa-shield-check"></i><p>No investors match these filters</p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(({ inv, kyc, status, risk, accredStatus }) => {
        const docs = kyc.docs || {};
        const name = `${inv.firstName} ${inv.lastName}`;
        const initials = ((inv.firstName||'?')[0] + (inv.lastName||'?')[0]).toUpperCase();

        const kycBadge = {
          clear:   `<span class="badge badge-clear"><i class="fas fa-check"></i> Clear</span>`,
          review:  `<span class="badge badge-review"><i class="fas fa-clock"></i> Review</span>`,
          flagged: `<span class="badge badge-flagged"><i class="fas fa-flag"></i> Flagged</span>`,
          blocked: `<span class="badge badge-blocked"><i class="fas fa-ban"></i> Blocked</span>`,
          pending: `<span class="badge badge-pending"><i class="fas fa-circle"></i> Pending</span>`,
        }[status] || '';

        const accredBadge = {
          verified: `<span class="badge ab-verified"><i class="fas fa-check-circle"></i> Verified</span>`,
          pending:  `<span class="badge ab-pending"><i class="fas fa-clock"></i> Pending</span>`,
          expired:  `<span class="badge ab-expired"><i class="fas fa-times-circle"></i> Expired</span>`,
        }[accredStatus] || `<span class="badge badge-pending">—</span>`;

        const docPills = DOC_TYPES.map(d =>
          `<span class="doc-pill ${docs[d.key]?.url ? 'have' : 'missing'}">
            <i class="fas ${docs[d.key]?.url ? 'fa-check' : 'fa-minus'}"></i> ${d.label.split(' ')[0]}
          </span>`
        ).join('');

        const riskColor = risk.level === 'high' ? 'var(--danger)' : risk.level === 'medium' ? 'var(--warning)' : 'var(--success)';
        const riskFillClass = risk.level === 'high' ? 'risk-high' : risk.level === 'medium' ? 'risk-med' : 'risk-low';

        const ofacStatus = kyc.ofacStatus || 'unchecked';
        const ofacBadge = ofacStatus === 'clear'
          ? `<span class="badge badge-clear"><i class="fas fa-check"></i> Clear</span>`
          : ofacStatus === 'hit'
          ? `<span class="badge badge-blocked"><i class="fas fa-ban"></i> Match</span>`
          : `<span class="badge badge-pending"><i class="fas fa-circle"></i> Unchecked</span>`;

        return `<tr>
          <td>
            <div style="display:flex;align-items:center;gap:10px;">
              <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#60a5fa);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;color:#fff;flex-shrink:0;">${initials}</div>
              <div>
                <div style="font-weight:600;">${SP.esc(name)}</div>
                <div style="font-size:.75rem;color:var(--muted);">${SP.esc(inv.email||'—')}</div>
              </div>
            </div>
          </td>
          <td>${kycBadge}</td>
          <td>${accredBadge}${inv.accredExpiry ? `<div style="font-size:.7rem;color:var(--muted);margin-top:3px;">Exp ${new Date(inv.accredExpiry).toLocaleDateString()}</div>` : ''}</td>
          <td><div class="doc-pills">${docPills}</div></td>
          <td>
            <div class="risk-bar">
              <div class="risk-track"><div class="risk-fill ${riskFillClass}" style="width:${risk.score}%;"></div></div>
              <span class="risk-label" style="color:${riskColor};">${risk.score}</span>
            </div>
            <div style="font-size:.7rem;color:var(--muted);margin-top:3px;text-transform:capitalize;">${risk.level}</div>
          </td>
          <td>${ofacBadge}</td>
          <td>
            <button class="btn btn-ghost btn-sm" onclick="openKYC('${inv.id}')">
              <i class="fas fa-clipboard-check"></i> Review
            </button>
          </td>
        </tr>`;
      }).join('');
    }

    // ── KYC Detail Modal ──────────────────────────────────────────────────────
    function openKYC(invId) {
      currentInvId = invId;
      const inv = investors.find(i => i.id === invId);
      if (!inv) return;
      const kyc = kycData[invId] || {};
      const risk = computeAmlRisk(inv, kyc);
      const docs = kyc.docs || {};
      const name = `${inv.firstName} ${inv.lastName}`;

      document.getElementById('modalInvName').textContent = name + ' — KYC Review';

      const riskColor = risk.level === 'high' ? 'var(--danger)' : risk.level === 'medium' ? 'var(--warning)' : 'var(--success)';

      document.getElementById('modalBody').innerHTML = `
        <!-- AML Risk Summary -->
        <div class="section-label">AML Risk Assessment</div>
        <div style="padding:14px 16px;background:var(--bg);border-radius:10px;margin-bottom:16px;">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:${risk.flags.length ? '12px' : '0'};">
            <div style="font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:800;color:${riskColor};">${risk.score}</div>
            <div>
              <div style="font-weight:700;color:${riskColor};text-transform:capitalize;">${risk.level} Risk</div>
              <div style="font-size:.75rem;color:var(--muted);">AML score (0 = clean, 100 = highest risk)</div>
            </div>
          </div>
          ${risk.flags.length ? `<ul style="list-style:none;display:flex;flex-direction:column;gap:4px;">${risk.flags.map(f => `<li style="font-size:.78rem;color:var(--warning);display:flex;gap:8px;align-items:center;"><i class="fas fa-exclamation-triangle" style="font-size:.65rem;flex-shrink:0;"></i>${f}</li>`).join('')}</ul>` : ''}
        </div>

        <!-- KYC Status -->
        <div class="section-label">KYC Decision</div>
        <div class="form-row" style="margin-bottom:16px;">
          <div class="form-group" style="margin-bottom:0;">
            <label>KYC Status</label>
            <select id="mKycStatus">
              <option value="pending" ${(kyc.kycStatus||'pending')==='pending'?'selected':''}>Pending</option>
              <option value="review" ${kyc.kycStatus==='review'?'selected':''}>Under Review</option>
              <option value="clear" ${kyc.kycStatus==='clear'?'selected':''}>Clear ✓</option>
              <option value="flagged" ${kyc.kycStatus==='flagged'?'selected':''}>Flagged ⚑</option>
              <option value="blocked" ${kyc.kycStatus==='blocked'?'selected':''}>Blocked ✗</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label>OFAC / Watchlist</label>
            <select id="mOfacStatus">
              <option value="unchecked" ${(kyc.ofacStatus||'unchecked')==='unchecked'?'selected':''}>Not Checked</option>
              <option value="clear" ${kyc.ofacStatus==='clear'?'selected':''}>Checked — Clear ✓</option>
              <option value="hit" ${kyc.ofacStatus==='hit'?'selected':''}>Possible Match !</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>OFAC Check Notes</label>
          <textarea id="mOfacNotes" rows="2" placeholder="Date checked, source, notes...">${kyc.ofacNotes||''}</textarea>
        </div>

        <hr class="divider">

        <!-- Document Collection -->
        <div class="section-label">Required Documents</div>
        <div class="doc-list" id="docList">
          ${DOC_TYPES.map(dt => {
            const doc = docs[dt.key] || {};
            const hasDoc = !!doc.url;
            return `<div class="doc-row" id="docRow_${dt.key}">
              <div class="doc-icon"><i class="fas ${dt.icon}"></i></div>
              <div class="doc-info">
                <div class="doc-name">${dt.label}</div>
                <div class="doc-meta">${hasDoc ? `Uploaded ${doc.uploadedAt ? new Date(doc.uploadedAt).toLocaleDateString() : ''}${doc.approved ? ' · <span style="color:var(--success)">GP Approved</span>' : ' · Pending review'}` : `<span style="color:var(--muted)">${dt.hint}</span>`}</div>
              </div>
              <div class="doc-status">
                ${hasDoc ? `
                  <a href="${doc.url}" target="_blank" class="btn btn-ghost btn-sm"><i class="fas fa-eye"></i></a>
                  <button class="btn btn-ghost btn-sm" style="${doc.approved ? 'color:var(--success)' : ''}" onclick="toggleDocApproved('${dt.key}')">
                    <i class="fas ${doc.approved ? 'fa-check-circle' : 'fa-circle'}"></i> ${doc.approved ? 'Approved' : 'Approve'}
                  </button>
                  <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="removeDoc('${dt.key}')"><i class="fas fa-trash"></i></button>
                ` : `
                  <label class="btn btn-ghost btn-sm" style="cursor:pointer;">
                    <i class="fas fa-upload"></i> Upload
                    <input type="file" style="display:none" accept=".pdf,.jpg,.jpeg,.png" onchange="uploadDoc('${dt.key}', this)">
                  </label>
                `}
              </div>
            </div>`;
          }).join('')}
        </div>

        <hr class="divider">

        <!-- Notes -->
        <div class="form-group">
          <label>Internal KYC Notes</label>
          <textarea id="mNotes" rows="3" placeholder="Compliance notes, reviewer comments, follow-up items...">${kyc.notes||''}</textarea>
        </div>
        ${kyc.lastUpdated ? `<div style="font-size:.72rem;color:var(--muted);text-align:right;">Last updated ${new Date(kyc.lastUpdated).toLocaleString()}</div>` : ''}
      `;

      document.getElementById('kycModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('kycModal').classList.remove('open');
      currentInvId = null;
    }

    async function uploadDoc(docKey, input) {
      if (!input.files || !input.files[0]) return;
      const file = input.files[0];
      if (file.size > 10 * 1024 * 1024) { toast('File too large (max 10MB)'); return; }

      const inv = investors.find(i => i.id === currentInvId);
      if (!inv) return;

      toast('Uploading...');

      try {
        // Use Firebase Storage via SPFB
        const fb = window.SPFB;
        let url = null;

        if (fb && fb._storage) {
          const orgId = window.SP?.getSession?.()?.orgId || 'default';
          const path = `orgs/${orgId}/kyc/${currentInvId}/${docKey}_${Date.now()}_${file.name}`;
          const ref = fb._storage.ref(path);
          await ref.put(file);
          url = await ref.getDownloadURL();
        } else {
          // Fallback: store as data URL (works without storage)
          url = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = e => resolve(e.target.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });
        }

        if (!kycData[currentInvId]) kycData[currentInvId] = {};
        if (!kycData[currentInvId].docs) kycData[currentInvId].docs = {};
        kycData[currentInvId].docs[docKey] = {
          name: file.name,
          url,
          uploadedAt: new Date().toISOString(),
          approved: false,
        };

        saveKycRecord(currentInvId);
        openKYC(currentInvId); // re-render modal
        toast(`${file.name} uploaded`);
      } catch (e) {
        console.error('Upload failed:', e);
        toast('Upload failed: ' + e.message, true);
      }
    }

    function toggleDocApproved(docKey) {
      if (!kycData[currentInvId]?.docs?.[docKey]) return;
      kycData[currentInvId].docs[docKey].approved = !kycData[currentInvId].docs[docKey].approved;
      kycData[currentInvId].docs[docKey].reviewedAt = new Date().toISOString();
      saveKycRecord(currentInvId);
      openKYC(currentInvId);
    }

    function removeDoc(docKey) {
      if (!confirm('Remove this document?')) return;
      if (kycData[currentInvId]?.docs?.[docKey]) {
        delete kycData[currentInvId].docs[docKey];
        saveKycRecord(currentInvId);
        openKYC(currentInvId);
      }
    }

    function saveKYC() {
      if (!currentInvId) return;
      if (!kycData[currentInvId]) kycData[currentInvId] = {};
      kycData[currentInvId].kycStatus = document.getElementById('mKycStatus').value;
      kycData[currentInvId].ofacStatus = document.getElementById('mOfacStatus').value;
      kycData[currentInvId].ofacNotes = document.getElementById('mOfacNotes').value.trim();
      kycData[currentInvId].notes = document.getElementById('mNotes').value.trim();
      saveKycRecord(currentInvId);
      closeModal();
      toast('KYC record saved');
    }

    function saveKycRecord(invId) {
      if (!kycData[invId]) return;
      kycData[invId].lastUpdated = new Date().toISOString();
      SP.save('kyc_records', kycData);
      renderStats();
      renderTable();
    }

    // ── Bulk request ──────────────────────────────────────────────────────────
    function openBulkRequest() {
      updateBulkPreview();
      document.getElementById('bulkModal').classList.add('open');
    }

    function updateBulkPreview() {
      const target = document.getElementById('bulkTarget')?.value || 'pending';
      let targets = investors.filter(inv => {
        const kyc = kycData[inv.id] || {};
        const docs = kyc.docs || {};
        if (target === 'pending') return deriveKycStatus(inv, kyc) !== 'clear';
        if (target === 'no_accred') return !docs.accredLetter?.url;
        if (target === 'no_id') return !docs.govId?.url;
        if (target === 'no_w9') return !docs.w9?.url;
        return false;
      }).filter(i => i.email);

      const el = document.getElementById('bulkPreview');
      if (el) el.textContent = `${targets.length} investor${targets.length === 1 ? '' : 's'} will receive this request.`;
    }

    async function sendBulkRequest() {
      const target = document.getElementById('bulkTarget').value;
      const customMsg = document.getElementById('bulkMessage').value.trim();

      let targets = investors.filter(inv => {
        const kyc = kycData[inv.id] || {};
        const docs = kyc.docs || {};
        if (target === 'pending') return deriveKycStatus(inv, kyc) !== 'clear';
        if (target === 'no_accred') return !docs.accredLetter?.url;
        if (target === 'no_id') return !docs.govId?.url;
        if (target === 'no_w9') return !docs.w9?.url;
        return false;
      }).filter(i => i.email);

      if (targets.length === 0) { toast('No matching investors with email addresses'); return; }

      const settings = SP.load('settings', {});
      let sent = 0;
      for (const inv of targets) {
        try {
          if (window.SPEmail) {
            await SPEmail.send('custom', inv.email, {
              subject: 'Action Required: KYC Document Submission — ' + (settings.firmName || 'deeltrack'),
              body: `Dear ${inv.firstName},\n\n${customMsg || 'We are updating our KYC records and require your assistance in submitting the following documents to remain compliant with our investment requirements.'}\n\nPlease log in to your investor portal to upload the requested documents.\n\nThank you,\n${settings.gpFullName || settings.firmName || 'The Team'}`,
            });
          }
          sent++;
        } catch (e) {
          console.warn('Email failed for', inv.email, e);
        }
      }

      document.getElementById('bulkModal').classList.remove('open');
      toast(`Sent to ${sent} investor${sent === 1 ? '' : 's'}`);
    }

    // ── Export ────────────────────────────────────────────────────────────────
    function exportCSV() {
      const rows = [['Name', 'Email', 'KYC Status', 'Accreditation', 'AML Risk Score', 'AML Risk Level', 'OFAC', 'Gov ID', 'W-9', 'Accred Letter', 'Sub Agreement', 'Notes']];
      investors.forEach(inv => {
        const kyc = kycData[inv.id] || {};
        const docs = kyc.docs || {};
        const status = deriveKycStatus(inv, kyc);
        const risk = computeAmlRisk(inv, kyc);
        rows.push([
          `${inv.firstName} ${inv.lastName}`,
          inv.email || '',
          status,
          inv.accredStatus || 'pending',
          risk.score,
          risk.level,
          kyc.ofacStatus || 'unchecked',
          docs.govId?.url ? 'Yes' : 'No',
          docs.w9?.url ? 'Yes' : 'No',
          docs.accredLetter?.url ? 'Yes' : 'No',
          docs.subAgreement?.url ? 'Yes' : 'No',
          (kyc.notes || '').replace(/,/g, ';'),
        ]);
      });
      const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
      const a = document.createElement('a');
      a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
      a.download = `kyc_export_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    }

    // ── Toast ─────────────────────────────────────────────────────────────────
    function toast(msg, isError = false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.style.background = isError ? 'var(--danger)' : '#1B1A19';
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    SP.onDataReady(load);
    // Fallback: if onDataReady never fires (race condition), force-load after 5s
    setTimeout(() => {
      if (!investors || !investors.length) {
        console.warn('KYC: onDataReady may not have fired, forcing load()');
        load();
      }
    }, 5000);
    document.getElementById('bulkTarget')?.addEventListener('change', updateBulkPreview);
  </script>
</body>
</html>
