<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Tenant Screening </title>
  <script src="js/sp-core.js?v9"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-search"></i> Tenant Screening</h1>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header"><h2>Screening Report</h2></div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group"><label>Credit Score</label><div class="stat-value text-success">720</div></div>
            <div class="form-group"><label>Background Check</label><div class="stat-value text-success">Clear</div></div>
            <div class="form-group"><label>Eviction History</label><div class="stat-value text-success">None</div></div>
          </div>
        </div>
      </div>
    </div>
  </main>

</html>
