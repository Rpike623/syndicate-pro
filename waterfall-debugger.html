<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Waterfall Debugger </title>
  <script src="js/sp-core.js"></script>
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-bug"></i> Waterfall Debugger</h1>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header"><h2>Debug Panel</h2></div>
        <div class="card-body">
          <textarea class="form-input" rows="10" placeholder="Paste waterfall JSON to debug..."></textarea>
          <button class="btn btn-primary" style="margin-top:10px">Validate</button>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
