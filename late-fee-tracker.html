<body>
  <div id="sidebar"></div>

      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

          <table class="data-table"><thead><tr><th>Unit</th><th>Tenant</th><th>Days Late</th><th>Fee</th><th>Date</th></tr></thead><tbody><tr><td>102</td><td>Mike Brown</td><td>5</td><td>$75</td><td>2026-03-05</td></tr></tbody></table>
        </div>
      </div>
    </div>
