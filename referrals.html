<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Referrals </title>
  <script src="js/sp-core.js?v=9246da8"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-share-nodes"></i> Referral Program</h1>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Total Referrals</span><span class="stat-value" id="statTotal">0</span></div>
        <div class="stat-card"><span class="stat-label">Converted</span><span class="stat-value text-success" id="statConverted">0</span></div>
        <div class="stat-card"><span class="stat-label">Referral Fees Paid</span><span class="stat-value" id="statFees">$0</span></div>
        <div class="stat-card"><span class="stat-label">Pending Fees</span><span class="stat-value text-warning" id="statPending">$0</span></div>
      </div>
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-users"></i> Referral Pipeline</h2>
          <button class="btn btn-primary" onclick="Referrals.showModal()"><i class="fas fa-plus"></i> Add Referral</button>
        </div>
        <div class="card-body">
          <table class="data-table">
            <thead><tr><th>Referred By</th><th>Referred To</th><th>Deal</th><th>Investment</th><th>Referral Fee</th><th>Status</th><th>Date</th></tr></thead>
            <tbody id="referralTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
  <div id="refModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header"><h2>Add Referral</h2><button class="close" onclick="Referrals.closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group"><label>Referrer (Existing Investor)</label><input type="text" id="rReferrer" class="form-input" placeholder="John Smith"></div>
          <div class="form-group"><label>Referred Contact</label><input type="text" id="rReferred" class="form-input" placeholder="Jane Doe"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Email</label><input type="email" id="rEmail" class="form-input"></div>
          <div class="form-group"><label>Referral Fee ($)</label><input type="number" id="rFee" class="form-input" placeholder="2500"></div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="Referrals.closeModal()">Cancel</button><button class="btn btn-primary" onclick="Referrals.save()">Add Referral</button></div>
    </div>
  </div>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Referrals.init();}</script>
  <script src="js/sp-referrals.js"></script>
</body>
</html>
