<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Comps Analyzer </title>
  <script src="js/sp-core.js?v9"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-chart-area"></i> Comps Analyzer</h1>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header"><h2>Sales Comps</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Address</th><th>Date</th><th>Price</th><th>Sqft</th><th>$/Sqft</th></tr></thead><tbody id="compsTable"></tbody></table>
          <div style="margin-top:16px;">
            <div class="form-row">
              <div class="form-group"><label>Avg Price/Sqft</label><input type="text" id="avgPpsf" class="form-input" readonly></div>
              <div class="form-group"><label>Price Range</label><input type="text" id="priceRange" class="form-input" readonly></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}CompsA.init();}</script>
  <script src="js/sp-comps.js"></script>
</body>
</html>
