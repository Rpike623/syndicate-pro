<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fund-Level NAV Dashboard - deeltrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/sp-core.js"></script>
    <script src="js/sp-data.js"></script>
    <script src="js/sp-reit.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #0ea5e9; --success: #10b981; --bg: #0B1120; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0B1120; color: var(--primary); display: flex; }
        /* sidebar CSS moved to dt-global.css */
        .main { flex: 1; margin-left: 260px; padding: 40px; }
    @media (max-width: 768px) { .main { margin-left: 0 !important; width: 100% !important; } #sidebar, .sidebar { transform: translateX(-100%) !important; position: fixed !important; z-index: 100 !important; top: 0; bottom: 0; } #sidebar.open, .sidebar.open { transform: translateX(0) !important; } .mobile-menu-btn { display: flex !important; } }
        .card { background: #111827; border: 1px solid #1E293B; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
        .nav-val { font-size: 2.5rem; font-weight: 800; color: var(--accent); }
        .nav-label { font-size: 0.8rem; text-transform: uppercase; color: #64748b; font-weight: 700; letter-spacing: 0.1em; }
        .matrix-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .matrix-table th { text-align: left; padding: 12px; font-size: 0.75rem; color: #64748b; background: #0B1120; }
        .matrix-table td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
    </style>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
        <h1>Master Fund / REIT Rollup</h1>
        <p style="color: #64748b; margin-bottom: 32px;">Aggregated Net Asset Value across all organizational holdings</p>
        
        <div class="card">
            <div class="nav-label">Consolidated Net Asset Value (NAV)</div>
            <div class="nav-val" id="totalNAV">$0.00</div>
        </div>

        <div class="card">
            <h3>Portfolio Performance Matrix</h3>
            <table class="matrix-table">
                <thead><tr><th>Asset</th><th>Current Yield</th><th>Occupancy</th><th>Risk Profile</th></tr></thead>
                <tbody id="matrixBody"></tbody>
            </table>
        </div>
    </main>
    <script>
        function _render() {
            const deals = SP.getDeals();
            const nav = SPREIT.calculateNAV(deals);
            document.getElementById('totalNAV').textContent = '$' + (nav/1e6).toFixed(2) + 'M';
            
            const matrix = SPREIT.getPerformanceMatrix(deals);
            document.getElementById('matrixBody').innerHTML = matrix.map(m => `
                <tr>
                    <td style="font-weight:600;">${m.name}</td>
                    <td style="color:var(--success); font-weight:700;">${m.yield}%</td>
                    <td>${m.occupancy}%</td>
                    <td>${m.risk}</td>
                </tr>
            `).join('');
        }
        window.addEventListener('spdata-ready', _render);
        if(typeof SPData !== 'undefined' && SPData.isReady()) _render();
    </script>
<script>SP.requireGP();</script>
</body>
</html>
