<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | 1031 Exchange </title>
  <script src="js/sp-core.js?v=9246da8"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-exchange-alt"></i> 1031 Exchange</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="Exchange.calc()">Calculate</button>
      </div>
    </div>
    <div class="content">
      <div class="grid-2">
        <div class="card">
          <div class="card-header"><h2>Relinquished Property (Sold)</h2></div>
          <div class="card-body">
            <div class="form-group"><label>Original Purchase Price</label><input type="number" id="x1Orig" class="form-input" value="8000000"></div>
            <div class="form-group"><label>Sale Price</label><input type="number" id="x1Sale" class="form-input" value="15000000"></div>
            <div class="form-group"><label>Mortgage Assumed</label><input type="number" id="x1Loan" class="form-input" value="5000000"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h2>Replacement Property (Buying)</h2></div>
          <div class="card-body">
            <div class="form-group"><label>Purchase Price</label><input type="number" id="x2Price" class="form-input" value="20000000"></div>
            <div class="form-group"><label>New Loan Amount</label><input type="number" id="x2Loan" class="form-input" value="12000000"></div>
            <div class="form-group"><label>Days to Identify (45 max)</label><input type="number" id="x2Days" class="form-input" value="45" max="45></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Analysis</h2></div>
        <div class="card-body" id="xResults">
          <div class="result-row"><span>Realized Gain</span><strong id="xGain">$0</strong></div>
          <div class="result-row"><span>Depreciation Recapture</span><strong id="xDepr">$0</strong></div>
          <div class="result-row"><span>Total Taxable Gain</span><strong id="xTaxGain">$0</strong></div>
          <div class="result-row"><span>Cash Boot</span><strong id="xBoot">$0</strong></div>
          <div class="result-row"><span>Mortgage Boot</span><strong id="xMboot">$0</strong></div>
          <div class="result-row"><span>Exchange Value</span><strong id="xValue">$0</strong></div>
          <div class="result-row"><span>Tax Deferred</span><strong id="xDeferred" class="text-success">$0</strong></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Timeline</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Milestone</th><th>Deadline</th><th>Status</th></tr></thead><tbody id="xTimeline"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Exchange.init();}</script>
  <script src="js/sp-exchange.js"></script>
</body>
</html>
