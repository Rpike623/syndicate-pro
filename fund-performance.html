<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Fund Performance </title>
  <script src="js/sp-core.js?v3"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-chart-pie"></i> Fund Performance</h1>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">IRR</span><span class="stat-value text-success">18.5%</span></div>
        <div class="stat-card"><span class="stat-label">Equity Multiple</span><span class="stat-value">1.85x</span></div>
        <div class="stat-card"><span class="stat-label">Cash-on-Cash</span><span class="stat-value">8.2%</span></div>
        <div class="stat-card"><span class="stat-label">TVPI</span><span class="stat-value">2.1x</span></div>
      </div>
    </div>
  </main>
</body>
</html>
