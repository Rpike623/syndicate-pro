<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
  <defs>
    <linearGradient id="gF" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C45A12"/>
      <stop offset="100%" stop-color="#F37925"/>
    </linearGradient>
  </defs>
  <!-- Option F: Horizontal rail track with a "d" formed by the negative space -->
  <rect x="2" y="2" width="32" height="32" rx="8" fill="url(#gF)"/>
  <!-- Two parallel rails running diagonal (bottom-left to upper-right) — momentum/progress -->
  <line x1="6" y1="26" x2="30" y2="10" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="6" y1="30" x2="30" y2="14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Crossties perpendicular to rails -->
  <line x1="8.5" y1="25" x2="10" y2="29" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="12.5" y1="22.5" x2="14" y2="26.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  <line x1="16.5" y1="20" x2="18" y2="24" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="20.5" y1="17.5" x2="22" y2="21.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="24.5" y1="15" x2="26" y2="19" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="28.5" y1="12.5" x2="30" y2="16.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.95"/>
  <!-- Bold "d" letterform overlaid top-left -->
  <path d="M 9 6 L 9 18" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M 9 10 Q 9 7.5, 13 7.5 Q 17 7.5, 17 12 Q 17 16.5, 13 16.5 Q 9 16.5, 9 14" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
</svg>
