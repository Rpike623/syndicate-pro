<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
  <defs>
    <linearGradient id="gG" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C45A12"/>
      <stop offset="100%" stop-color="#F37925"/>
    </linearGradient>
  </defs>
  <!-- Option G: Circular logo with rail track running through center -->
  <circle cx="18" cy="18" r="16" fill="url(#gG)"/>
  <!-- Horizontal double rail -->
  <line x1="5" y1="16" x2="31" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="5" y1="20" x2="31" y2="20" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Crossties -->
  <line x1="9" y1="14.5" x2="9" y2="21.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="14" y1="14.5" x2="14" y2="21.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="19" y1="14.5" x2="19" y2="21.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="24" y1="14.5" x2="24" y2="21.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="29" y1="14.5" x2="29" y2="21.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Subtle "dt" text above -->
  <text x="18" y="12" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="900" font-size="8" fill="white" opacity="0.85" letter-spacing="-0.3">dt</text>
  <!-- Small upward arrow below track -->
  <path d="M 18 24 L 18 28" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 15.5 26.5 L 18 24 L 20.5 26.5" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
</svg>
