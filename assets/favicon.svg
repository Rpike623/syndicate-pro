<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
  <defs>
    <linearGradient id="gE" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C45A12"/>
      <stop offset="100%" stop-color="#F37925"/>
    </linearGradient>
  </defs>
  <!-- Option E: Railroad track perspective — converging rails with crossties -->
  <rect x="2" y="2" width="32" height="32" rx="8" fill="url(#gE)"/>
  <!-- Two rails converging to vanishing point -->
  <line x1="8" y1="28" x2="18" y2="8" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="28" x2="18" y2="8" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Crossties (railroad sleepers) -->
  <line x1="10" y1="25" x2="26" y2="25" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <line x1="12" y1="21" x2="24" y2="21" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <line x1="13.5" y1="17.5" x2="22.5" y2="17.5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="15" y1="14" x2="21" y2="14" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="16.5" y1="11" x2="19.5" y2="11" stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
</svg>
