<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | LTC Calculator </title>
  <script src="js/sp-core.js?v8"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-calculator"></i> LTC Calculator</h1>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header"><h2>Project Costs</h2></div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group"><label>Purchase Price</label><input type="number" id="ltcPrice" class="form-input" value="1000000"></div>
            <div class="form-group"><label>Rehab Costs</label><input type="number" id="ltcRehab" class="form-input" value="250000"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Soft Costs</label><input type="number" id="ltcSoft" class="form-input" value="50000"></div>
            <div class="form-group"><label>Loan Amount</label><input type="number" id="ltcLoan" class="form-input" value="850000"></div>
          </div>
          <button class="btn btn-primary" onclick="LTC.calc()">Calculate LTC</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Loan-to-Cost Results</h2></div>
        <div class="card-body">
          <div class="stats-row">
            <div class="stat-card"><span class="stat-label">Total Cost</span><span class="stat-value" id="ltcTotal">$0</span></div>
            <div class="stat-card"><span class="stat-label">LTC Ratio</span><span class="stat-value text-primary" id="ltcRatio">0%</span></div>
            <div class="stat-card"><span class="stat-label">Total Equity</span><span class="stat-value" id="ltcEquity">$0</span></div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}LTC.init();}</script>
  <script src="js/sp-ltc.js"></script>
</body>
</html>
