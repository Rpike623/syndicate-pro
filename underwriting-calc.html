<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Quick Underwrite</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="js/sp-core.js?v9"></script>
  <style>
    :root { --bg: #F3F3F3; --bg-panel: #13131a; --bg-card: #FFFFFF; --bg-hover: #252533; --accent: #F37925; --accent-2: #06b6d4; --success: #2D9A6B; --warning: #E8890A; --text: #1B1A19; --text-muted: #9C9590; --border: rgba(255,255,255,0.06); --radius: 16px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #F3F3F3; color: #1B1A19; min-height: 100vh; }
    h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
    .app { display: flex; min-height: 100vh; }
    /* sidebar CSS moved to dt-global.css */
    /* .sidebar-header CSS moved to dt-global.css */
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-mark { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-radius: 10px; }
    .nav { padding: 16px 12px; }
    /* .nav-item CSS moved to dt-global.css */
    /* .nav-item.active CSS moved to dt-global.css */
    .main { flex: 1; margin-left: var(--dt-sidebar-width); }
    @media (max-width: 768px) { .main { margin-left: 0 !important; width: 100% !important; } #sidebar, .sidebar { transform: translateX(-100%) !important; position: fixed !important; z-index: 100 !important; top: 0; bottom: 0; } #sidebar.open, .sidebar.open { transform: translateX(0) !important; } .mobile-menu-btn { display: flex !important; } }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 32px; border-bottom: 1px solid #E2DDD8; background: var(--bg-panel); }
    .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; }
    .content { padding: 32px; max-width: 1200px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .panel { background: #FFFFFF; border: 1px solid #E2DDD8; border-radius: var(--radius); padding: 24px; }
    .panel-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; text-transform: uppercase; color: var(--text-muted); }
    .form-group input { padding: 12px; border-radius: 10px; border: 1px solid #E2DDD8; background: #F3F3F3; color: #1B1A19; font-size: 15px; }
    .results { background: #F3F3F3; border-radius: 12px; padding: 20px; }
    .result-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #E2DDD8; }
    .result-row:last-child { border-bottom: none; }
    .result-label { font-size: 13px; color: var(--text-muted); }
    .result-value { font-family: 'Space Grotesk'; font-weight: 600; font-size: 1.1rem; }
    .result-value.accent { color: var(--accent); }
    .result-value.success { color: var(--success); }
    @media (max-width: 1024px) { /* sidebar CSS moved to dt-global.css */ .main { margin-left: 0; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app"><aside id="sidebar" class="sidebar"></aside>
    
    <main class="main">
      <header class="header">
        <div>
          <h1 style="font-size:1.4rem">Quick Underwrite</h1>
          <p style="font-size:14px;color:var(--text-muted)">5-minute deal evaluation</p>
        </div>
        <button class="btn"><i class="fas fa-save"></i> Save Analysis</button>
      </header>
      
      <div class="content">
        <div class="grid">
          <div class="panel">
            <h2 class="panel-title">Property Details</h2>
            <div class="form-row">
              <div class="form-group"><label>Property Name</label><input type="text" placeholder="e.g. Lakeside Apartments"></div>
              <div class="form-group"><label>City, State</label><input type="text" placeholder="Dallas, TX"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Units / SQFT</label><input type="number" placeholder="64"></div>
              <div class="form-group"><label>Property Type</label><input type="text" placeholder="Multifamily"></div>
            </div>
            <h2 class="panel-title" style="margin-top:24px">Financials</h2>
            <div class="form-row">
              <div class="form-group"><label>Asking Price ($)</label><input type="number" id="price" value="3200000" oninput="calc()"></div>
              <div class="form-group"><label>Current NOI ($)</label><input type="number" id="noi" value="230400" oninput="calc()"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Market Rent per Unit ($)</label><input type="number" id="rent" value="1450" oninput="calc()"></div>
              <div class="form-group"><label>Current Occupancy (%)</label><input type="number" id="occ" value="85" oninput="calc()"></div>
            </div>
          </div>
          
          <div class="panel">
            <h2 class="panel-title">Analysis Results</h2>
            <div class="results">
              <div class="result-row">
                <span class="result-label">Current Cap Rate</span>
                <span class="result-value" id="capRate">7.2%</span>
              </div>
              <div class="result-row">
                <span class="result-label">Price per Unit</span>
                <span class="result-value" id="pricePerUnit">$50,000</span>
              </div>
              <div class="result-row">
                <span class="result-label">Gross Potential Income</span>
                <span class="result-value" id="gpi">$1,113,600</span>
              </div>
              <div class="result-row">
                <span class="result-label">Effective Gross Income</span>
                <span class="result-value" id="egi">$946,560</span>
              </div>
              <div class="result-row">
                <span class="result-label">Pro Forma NOI (95% occ)</span>
                <span class="result-value accent" id="pfNOI">$294,912</span>
              </div>
              <div class="result-row">
                <span class="result-label">Pro Forma Cap Rate</span>
                <span class="result-value success" id="pfCap">9.2%</span>
              </div>
              <div class="result-row" style="margin-top:12px;padding-top:12px;border-top:2px solid #E2DDD8">
                <span class="result-label">Quick Verdict</span>
                <span class="result-value success" id="verdict">PURSUE</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <script>
    SP.requireGP();
    function calc() {
