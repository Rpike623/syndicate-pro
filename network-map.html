<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Network Map — deeltrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="js/sp-core.js"></script>
    <script src="js/sp-data.js"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --bg: #f8fafc; --radius: 12px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); display: flex; min-height: 100vh; }
        /* sidebar CSS moved to dt-global.css */
        .main { flex: 1; margin-left: 260px; padding: 40px; }
        
        .map-container { background: white; border: 1px solid #e2e8f0; border-radius: 16px; height: 600px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); position: relative; overflow: hidden; }
        #networkGraph { height: 100%; width: 100%; }
        
        .overlay-card { position: absolute; top: 20px; right: 20px; width: 280px; background: rgba(255,255,255,0.9); backdrop-filter: blur(8px); border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; z-index: 10; }
        .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.8rem; font-weight: 600; color: #64748b; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
        <div style="margin-bottom: 32px;">
            <h1 style="font-size: 1.6rem; font-weight: 800;">Investor Network Map</h1>
            <p style="color: #64748b;">Visualizing relationships between Limited Partners and Deal Entities</p>
        </div>

        <div class="map-container">
            <div class="overlay-card">
                <h3 style="font-size: 0.9rem; margin-bottom: 12px;">Map Legend</h3>
                <div class="legend-item"><div class="dot" style="background:#0f172a;"></div><span>You (GP)</span></div>
                <div class="legend-item"><div class="dot" style="background:#3b82f6;"></div><span>Real Estate Assets</span></div>
                <div class="legend-item"><div class="dot" style="background:#10b981;"></div><span>Individual LPs</span></div>
                <div class="legend-item" style="margin-top: 12px; font-size: 0.7rem; font-style: italic;">Thickness represents commitment size</div>
            </div>
            <div id="networkGraph"></div>
        </div>
    </main>

    <script>
        SP.requireGP();

        function init() {
            const deals = SP.getDeals();
            const investors = SP.getInvestors();
            
            const nodes = [{ id: 'gp', label: 'Robert Pike\n(GP)', color: '#0f172a', font: { color: '#fff' }, size: 30 }];
            const edges = [];

            // Add Deal Nodes
            deals.forEach(d => {
                nodes.push({ id: d.id, label: d.name, color: '#3b82f6' });
                edges.push({ from: 'gp', to: d.id, width: 2, color: '#cbd5e1' });
            });

            // Add Investor Nodes and Links
            investors.forEach(inv => {
                nodes.push({ id: inv.id, label: `${inv.firstName} ${inv.lastName}`, color: '#10b981' });
                
                // Link investor to deals they are in
                const linkedDeals = deals.filter(d => (d.investors || []).some(entry => entry.investorId === inv.id));
                linkedDeals.forEach(d => {
                    const entry = d.investors.find(e => e.investorId === inv.id);
                    const weight = (entry.committed / 100000) + 1; // Visual weight
                    edges.push({ from: inv.id, to: d.id, width: weight, color: 'rgba(16, 185, 129, 0.3)' });
                });
            });

            const container = document.getElementById('networkGraph');
            const data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
            const options = {
                nodes: { shape: 'dot', size: 16, font: { size: 12, face: 'Inter' } },
                edges: { arrows: { to: { enabled: false } } },
                physics: { stabilization: true, barnesHut: { gravitationalConstant: -2000, centralGravity: 0.3, springLength: 95 } }
            };
            new vis.Network(container, data, options);
        }

        window.addEventListener('spdata-ready', init);
        if(typeof SPData !== 'undefined' && SPData.isReady()) init();
    </script>
</body>
</html>
