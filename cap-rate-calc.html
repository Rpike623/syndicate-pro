<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Cap Rate Calculator </title>
  <script src="js/sp-core.js?v=9246da8"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-percentage"></i> Cap Rate Calculator</h1>
    </div>
    <div class="content">
      <div class="form-row">
        <div class="card" style="flex:1">
          <div class="card-header"><h2>Property Details</h2></div>
          <div class="card-body">
            <div class="form-group"><label>Purchase Price</label><input type="number" id="crPrice" class="form-input" value="2000000"></div>
            <div class="form-group"><label>Annual NOI</label><input type="number" id="crNOI" class="form-input" value="140000"></div>
            <button class="btn btn-primary" onclick="CapR.calc()">Calculate</button>
          </div>
        </div>
        <div class="card" style="flex:1">
          <div class="card-header"><h2>Results</h2></div>
          <div class="card-body">
            <div class="stat-card"><span class="stat-label">Cap Rate</span><span class="stat-value text-primary" id="crRate">7.0%</span></div>
            <div class="stat-card"><span class="stat-label">Value at 6.5%</span><span class="stat-value" id="crValue65">$2,153,846</span></div>
            <div class="stat-card"><span class="stat-label">Value at 5.5%</span><span class="stat-value" id="crValue55">$2,545,455</span></div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}CapR.init();}</script>
  <script src="js/sp-capr.js"></script>
</body>
</html>
