<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Refinance Calc </title>
  <script src="js/sp-core.js?v=9246da8"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-house-medical"></i> Refinance Calc</h1>
    </div>
    <div class="content">
      <div class="grid-2">
        <div class="card">
          <div class="card-header"><h2>Current Loan</h2></div>
          <div class="card-body">
            <div class="form-group"><label>Current Balance</label><input type="number" id="cBalance" class="form-input" value="12000000" oninput="Refi.calc()"></div>
            <div class="form-row">
              <div class="form-group"><label>Rate</label><input type="number" id="cRate" class="form-input" value="6.5" step="0.1" oninput="Refi.calc()"></div>
              <div class="form-group"><label>Payment</label><input type="number" id="cPayment" class="form-input" value="76000" oninput="Refi.calc()"></div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h2>New Loan</h2></div>
          <div class="card-body">
            <div class="form-group"><label>New Loan Amount</label><input type="number" id="nAmount" class="form-input" value="15000000" oninput="Refi.calc()"></div>
            <div class="form-row">
              <div class="form-group"><label>Rate</label><input type="number" id="nRate" class="form-input" value="5.9" step="0.1" oninput="Refi.calc()"></div>
              <div class="form-group"><label>Term</label><select id="nTerm" class="form-select" onchange="Refi.calc()"><option value="30">30yr</option><option value="15">15yr</option><option value="10">10yr</option></select></div>
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Analysis</h2></div>
        <div class="card-body" id="rResults">
          <div class="result-row"><span>Cash Out</span><strong id="rCashOut">$0</strong></div>
          <div class="result-row"><span>Monthly Change</span><strong id="rMonthly">$0</strong></div>
          <div class="result-row"><span>Interest Savings</span><strong id="rSavings">$0</strong></div>
          <div class="result-row"><span>Break-even</span><strong id="rBreak">0 mo</strong></div>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Refi.init();}</script>
  <script src="js/sp-refi.js"></script>
</body>
</html>
