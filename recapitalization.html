<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Recapitalization Events </title>
  <script src="js/sp-core.js?v=9246da8"></script>
  <script src="js/sp-firebase.js?v=9246da8"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
      </button>
      <h1><i class="fas fa-money-bill-wave"></i> Recapitalization Events</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="Recap.showAddModal()">
          <i class="fas fa-plus"></i> Add Event
        </button>
      </div>
    </div>

    <div class="content">
      <!-- Summary Cards -->
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-label">Total Refinances</span>
          <span class="stat-value" id="statRefi">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Total New Debt</span>
          <span class="stat-value" id="statNewDebt">$0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Total Equity Taken Out</span>
          <span class="stat-value text-success" id="statEquityOut">$0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Avg. Rate Reduction</span>
          <span class="stat-value text-success" id="statRateReduction">0%</span>
        </div>
      </div>

      <!-- Timeline -->
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-timeline"></i> Event Timeline</h2>
        </div>
        <div class="card-body">
          <div class="recap-timeline" id="recapTimeline"></div>
        </div>
      </div>

      <!-- Events Table -->
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-list"></i> All Events</h2>
          <div class="filter-group">
            <select id="dealFilter" class="form-select form-select-sm" onchange="Recap.renderTable()">
              <option value="">All Deals</option>
            </select>
            <select id="typeFilter" class="form-select form-select-sm" onchange="Recap.renderTable()">
              <option value="">All Types</option>
              <option value="refinance">Refinance</option>
              <option value="recapitalization">Recapitalization</option>
              <option value="sale">Sale</option>
              <option value="cash-out">Cash Out</option>
            </select>
          </div>
        </div>
        <div class="card-body">
          <table class="data-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Deal</th>
                <th>Type</th>
                <th>Deal Value</th>
                <th>New Debt</th>
                <th>Equity Out</th>
                <th>Rate</th>
                <th>Term</th>
                <th class="text-center">Actions</th>
              </tr>
            </thead>
            <tbody id="recapTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Add Event Modal -->
  <div id="recapModal" class="modal" style="display:none;">
    <div class="modal-content modal-lg">
      <div class="modal-header">
        <h2><i class="fas fa-plus-circle"></i> Add Recapitalization Event</h2>
        <button class="close" onclick="Recap.closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="recapForm">
          <input type="hidden" id="eventId">
          
          <div class="form-row">
            <div class="form-group">
              <label>Deal</label>
              <select id="eventDeal" class="form-select" required></select>
            </div>
            <div class="form-group">
              <label>Event Type</label>
              <select id="eventType" class="form-select">
                <option value="refinance">Refinance</option>
                <option value="recapitalization">Recapitalization</option>
                <option value="sale">Sale</option>
                <option value="cash-out">Cash Out</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Event Date</label>
              <input type="date" id="eventDate" class="form-input" required>
            </div>
            <div class="form-group">
              <label>Deal Value (After)</label>
              <input type="number" id="eventDealValue" class="form-input" placeholder="15000000">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>New Debt</label>
              <input type="number" id="eventNewDebt" class="form-input" placeholder="8000000">
            </div>
            <div class="form-group">
              <label>Equity Taken Out</label>
              <input type="number" id="eventEquityOut" class="form-input" placeholder="2500000">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Interest Rate (%)</label>
              <input type="number" id="eventRate" class="form-input" placeholder="6.5" step="0.125">
            </div>
            <div class="form-group">
              <label>Term (years)</label>
              <input type="number" id="eventTerm" class="form-input" placeholder="10">
            </div>
          </div>

          <div class="form-group">
            <label>Notes</label>
            <textarea id="eventNotes" class="form-input" rows="2" placeholder="Details about the event..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Recap.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="Recap.saveEvent()">
          <i class="fas fa-save"></i> Save Event
        </button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.SP && SP.isLoggedIn) {
        initPage();
      } else {
        document.addEventListener('sp-ready', initPage);
      }
    });

    function initPage() {
      if (!SP.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }
      Recap.init();
    }
  </script>
  <script src="js/sp-recapitalization.js"></script>
</body>
</html>
