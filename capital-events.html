<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="js/sp-core.js?v=9246da8"></script>

<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-chart-bar"></i> Capital Events</h1>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header"><h2>Capital Activity Timeline</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Date</th><th>Event</th><th>Deal</th><th>Amount</th><th>Source</th></tr></thead><tbody id="capTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}CapEvents.init();}</script>
  <script src="js/sp-cap-events.js"></script>
