<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deeltrack | Insurance </title>
  <script src="js/sp-core.js?v16"></script>
  <script src="js/sp-data.js?v15"></script>
  <script src="js/sp-firebase.js?v15"></script>
  <script src="js/sp-billing.js?v16"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
        <i class="fas fa-bars"></i>
      </button>
      <h1><i class="fas fa-shield-cat"></i> Insurance</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="Insurance.showAddModal()">
          <i class="fas fa-plus"></i> Add Policy
        </button>
      </div>
    </div>

    <div class="content">
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-label">Active Policies</span>
          <span class="stat-value" id="statActive">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Total Premium</span>
          <span class="stat-value" id="statPremium">$0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Expiring Soon</span>
          <span class="stat-value text-warning" id="statExpiring">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Total Coverage</span>
          <span class="stat-value text-success" id="statCoverage">$0</span>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-list"></i> Insurance Policies</h2>
          <div class="filter-group">
            <select id="dealFilter" class="form-select form-select-sm" onchange="Insurance.render()">
              <option value="">All Properties</option>
            </select>
            <select id="typeFilter" class="form-select form-select-sm" onchange="Insurance.render()">
              <option value="">All Types</option>
              <option value="property">Property</option>
              <option value="liability">Liability</option>
              <option value="umbrella">Umbrella</option>
              <option value="workers-comp">Workers Comp</option>
            </select>
          </div>
        </div>
        <div class="card-body">
          <table class="data-table">
            <thead>
              <tr>
                <th>Property</th>
                <th>Policy Type</th>
                <th>Carrier</th>
                <th>Premium</th>
                <th>Coverage</th>
                <th>Expiry</th>
                <th>Status</th>
                <th class="text-center">Actions</th>
              </tr>
            </thead>
            <tbody id="policyTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div id="policyModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2><i class="fas fa-plus-circle"></i> Add Policy</h2>
        <button class="close" onclick="Insurance.closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Property</label>
          <select id="policyDeal" class="form-select"></select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Policy Type</label>
            <select id="policyType" class="form-select">
              <option value="property">Property</option>
              <option value="liability">Liability</option>
              <option value="umbrella">Umbrella</option>
              <option value="workers-comp">Workers Comp</option>
            </select>
          </div>
          <div class="form-group">
            <label>Carrier</label>
            <input type="text" id="policyCarrier" class="form-input" placeholder="e.g., State Farm">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Premium ($/yr)</label>
            <input type="number" id="policyPremium" class="form-input" placeholder="15000">
          </div>
          <div class="form-group">
            <label>Coverage ($)</label>
            <input type="number" id="policyCoverage" class="form-input" placeholder="5000000">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" id="policyStart" class="form-input">
          </div>
          <div class="form-group">
            <label>Expiry Date</label>
            <input type="date" id="policyExpiry" class="form-input">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Insurance.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="Insurance.save()">Save</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.SP && SP.isLoggedIn) initPage();
      else document.addEventListener('sp-ready', initPage);
    });
    function initPage() {
      if (!SP.isLoggedIn()) { window.location.href = 'login.html'; return; }
      Insurance.init();
    }
  </script>
  <script src="js/sp-insurance.js"></script>
</body>
</html>
