<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Due Diligence </title>
  <script src="js/sp-core.js?v=9246da8"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-search"></i> Due Diligence</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="DD.showModal()"><i class="fas fa-plus"></i> Add Item</button>
      </div>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Total Items</span><span class="stat-value" id="statTotal">0</span></div>
        <div class="stat-card"><span class="stat-label">Complete</span><span class="stat-value text-success" id="statDone">0</span></div>
        <div class="stat-card"><span class="stat-label">In Progress</span><span class="stat-value text-warning" id="statProgress">0</span></div>
        <div class="stat-card"><span class="stat-label">Pending</span><span class="stat-value text-muted" id="statPending">0</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Due Diligence Checklist</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Category</th><th>Item</th><th>Assignee</th><th>Due</th><th>Status</th><th>Notes</th></tr></thead><tbody id="ddTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <div id="ddModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header"><h2>Add Item</h2><button class="close" onclick="DD.closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Category</label><select id="ddCat" class="form-select"><option>Financial</option><option>Legal</option><option>Physical</option><option>Environmental</option><option>Insurance</option><option>Title</option></select></div>
        <div class="form-group"><label>Item</label><input type="text" id="ddItem" class="form-input"></div>
        <div class="form-row">
          <div class="form-group"><label>Assignee</label><input type="text" id="ddAssignee" class="form-input"></div>
          <div class="form-group"><label>Due Date</label><input type="date" id="ddDue" class="form-input"></div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="DD.closeModal()">Cancel</button><button class="btn btn-primary" onclick="DD.save()">Save</button></div>
    </div>
  </div>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}DD.init();}</script>
  <script src="js/sp-dd.js"></script>
</body>
</html>
