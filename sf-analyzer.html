<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | SF Analyzer </title>
  <script src="js/sp-core.js"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-ruler-combined"></i> SF Analyzer</h1>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Total SF</span><span class="stat-value" id="statTotal">0</span></div>
        <div class="stat-card"><span class="stat-label">$/SF</span><span class="stat-value" id="statSf">$0</span></div>
        <div class="stat-card"><span class="stat-label">Value/SF</span><span class="stat-value" id="statValue">$0</span></div>
        <div class="stat-card"><span class="stat-label">NOI/SF</span><span class="stat-value" id="statNoi">$0</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Properties</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Property</th><th>Total SF</th><th>Price</th><th>$/SF</th><th>NOI</th><th>NOI/SF</th><th>Cap/SF</th></tr></thead><tbody id="sfTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}SFAnalyzer.init();}</script>
  <script src="js/sp-sf-analyzer.js"></script>
</body>
</html>
