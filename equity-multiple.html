<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Equity Multiple </title>
  <script src="js/sp-core.js?v9"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-coins"></i> Equity Multiple</h1>
    </div>
    <div class="content">
      <div class="grid-2">
        <div class="card">
          <div class="card-header"><h2>Investment</h2></div>
          <div class="card-body">
            <div class="form-group"><label>Equity Invested</label><input type="number" id="eInv" class="form-input" value="5000000" oninput="EM.calc()"></div>
            <div class="form-group"><label>Years Held</label><input type="number" id="eYears" class="form-input" value="5" oninput="EM.calc()"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h2>Returns</h2></div>
          <div class="card-body">
            <div class="form-group"><label>Distributions</label><input type="number" id="eDist" class="form-input" value="1500000" oninput="EM.calc()"></div>
            <div class="form-group"><label>Exit Proceeds</label><input type="number" id="eExit" class="form-input" value="7000000" oninput="EM.calc()"></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Results</h2></div>
        <div class="card-body">
          <div class="result-row"><span>Total Return</span><strong id="eTotal">$0</strong></div>
          <div class="result-row"><span>Equity Multiple</span><strong id="eMultiple">0x</strong></div>
          <div class="result-row"><span>CAGR</span><strong id="eCagr">0%</strong></div>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}EM.init();}</script>
  <script src="js/sp-em.js"></script>
</body>
</html>
