<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Amortization Calculator </title>
  <script src="js/sp-core.js?v2"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-calculator"></i> Amortization Calculator</h1>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header"><h2>Loan Details</h2></div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group"><label>Loan Amount</label><input type="number" id="amLoan" class="form-input" value="500000"></div>
            <div class="form-group"><label>Interest Rate (%)</label><input type="number" id="amRate" class="form-input" value="6.5"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Term (Years)</label><input type="number" id="amTerm" class="form-input" value="30"></div>
            <div class="form-group"><label>Extra Monthly Payment</label><input type="number" id="amExtra" class="form-input" value="0"></div>
          </div>
          <button class="btn btn-primary" onclick="Amort.calc()">Calculate Schedule</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Results</h2></div>
        <div class="card-body">
          <div class="stats-row">
            <div class="stat-card"><span class="stat-label">Monthly Payment</span><span class="stat-value" id="amPayment">$0</span></div>
            <div class="stat-card"><span class="stat-label">Total Interest</span><span class="stat-value" id="amTotalInt">$0</span></div>
            <div class="stat-card"><span class="stat-label">Payoff Date</span><span class="stat-value" id="amPayoff">-</span></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Amortization Schedule</h2></div>
        <div class="card-body" style="height:400px;overflow:auto;">
          <table class="data-table"><thead><tr><th>Payment</th><th>Principal</th><th>Interest</th><th>Balance</th></tr></thead><tbody id="amTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Amort.init();}</script>
  <script src="js/sp-amort.js"></script>
</body>
</html>
