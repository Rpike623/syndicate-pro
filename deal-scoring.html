<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Deal Scoring </title>
  <script src="js/sp-core.js?v3"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-star"></i> Deal Scoring</h1>
    </div>
    <div class="content">
      <div class="card" style="margin-bottom:24px;">
        <div class="card-header"><h2>Score a Potential Deal</h2></div>
        <div class="card-body">
          <div class="scoring-grid">
            <div class="scoring-section">
              <h3>Property Details</h3>
              <div class="form-group"><label>Property Type</label><select id="scoreType" class="form-select"><option value="multifamily">Multifamily</option><option value="office">Office</option><option value="industrial">Industrial</option><option value="retail">Retail</option><option value="mixed">Mixed-Use</option></select></div>
              <div class="form-group"><label>Location (Market)</label><select id="scoreMarket" class="form-select"><option value="sun-belt">Sun Belt</option><option value="sf">San Francisco</option><option value="nyc">NYC</option><option value="chicago">Chicago</option><option value="texas">Texas</option><option value="other">Other</option></select></div>
              <div class="form-row">
                <div class="form-group"><label>Purchase Price ($)</label><input type="number" id="scorePrice" class="form-input" value="10000000"></div>
                <div class="form-group"><label>Size (Units/SF)</label><input type="number" id="scoreSize" class="form-input" value="100"></div>
              </div>
            </div>
            <div class="scoring-section">
              <h3>Financial Metrics</h3>
              <div class="form-row">
                <div class="form-group"><label>Cap Rate (%)</label><input type="number" id="scoreCap" class="form-input" value="5.5" step="0.1"></div>
                <div class="form-group"><label>Cash-on-Cash (%)</label><input type="number" id="scoreCoC" class="form-input" value="8.5" step="0.1"></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>NOI ($)</label><input type="number" id="scoreNOI" class="form-input" value="550000"></div>
                <div class="form-group"><label>DSCR</label><input type="number" id="scoreDSCR" class="form-input" value="1.35" step="0.05"></div>
              </div>
            </div>
            <div class="scoring-section">
              <h3>Risk Factors</h3>
              <div class="form-group"><label>Vacancy Rate (%)</label><input type="number" id="scoreVacancy" class="form-input" value="5"></div>
              <div class="form-group"><label>Age of Property (years)</label><input type="number" id="scoreAge" class="form-input" value="10"></div>
              <div class="form-group"><label>Value-Add Required</label><select id="scoreValueAdd" class="form-select"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div>
            </div>
          </div>
          <div style="margin-top:20px;text-align:center;">
            <button class="btn btn-primary btn-lg" onclick="Scoring.calculate()"><i class="fas fa-calculator"></i> Calculate Score</button>
          </div>
        </div>
      </div>
      <div class="score-results" id="scoreResults" style="display:none;">
        <div class="score-overview">
          <div class="score-circle"><span id="totalScore">0</span><small>/100</small></div>
          <div class="score-label" id="scoreLabel">Analyzing...</div>
        </div>
        <div class="score-breakdown" id="scoreBreakdown"></div>
        <div class="score-recommendation" id="scoreRec"></div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}}</script>
  <script src="js/sp-scoring.js"></script>
</body>
</html>
