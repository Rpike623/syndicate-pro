<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Cap Tables </title>
  <script src="js/sp-core.js?v6"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-pie-chart"></i> Cap Tables</h1>
      <div class="header-actions">
        <select id="dealSelect" class="form-select" onchange="CapTable.loadDeal()" style="width:auto;min-width:200px;">
          <option value="">Select Deal...</option>
          <option value="deal_1">Sunset Apartments</option>
          <option value="deal_2">Downtown Office</option>
          <option value="deal_3">Industrial Portfolio</option>
        </select>
      </div>
    </div>
    <div class="content" id="capContent" style="display:none;">
      <div class="cap-overview">
        <div class="cap-chart"><canvas id="capChart"></canvas></div>
        <div class="cap-summary">
          <div class="summary-stat"><span>Total Equity</span><strong id="totalEquity">$0</strong></div>
          <div class="summary-stat"><span>Total Investors</span><strong id="totalInvestors">0</strong></div>
          <div class="summary-stat"><span>LPs</span><strong id="lpPct">0%</strong></div>
          <div class="summary-stat"><span>GP</span><strong id="gpPct">0%</strong></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Ownership Detail</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Investor</th><th>Type</th><th>Investment</th><th>Ownership %</th><th>Class</th><th>Status</th></tr></thead><tbody id="capTableBody"></tbody></table>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Dilution Scenario</h2></div>
        <div class="card-body">
          <div class="scenario-controls">
            <div class="form-group"><label>New Investment ($)</label><input type="number" id="newInvest" value="1000000" onchange="CapTable.scenario()"></div>
            <div class="form-group"><label>New Investor Name</label><input type="text" id="newInvestor" placeholder="New Investor" onchange="CapTable.scenario()"></div>
            <div class="form-group"><label>GP Contribution ($)</label><input type="number" id="gpContrib" value="0" onchange="CapTable.scenario()"></div>
          </div>
          <div class="scenario-results" id="scenarioResults"></div>
        </div>
      </div>
    </div>
    <div class="content" id="emptyState">
      <div class="empty-state"><i class="fas fa-pie-chart"></i><h3>Select a Deal</h3><p>Choose a deal to view its cap table</p></div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}CapTable.init();}</script>
  <script src="js/sp-cap-table.js"></script>
</body>
</html>
