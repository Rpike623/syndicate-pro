<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Rental Application </title>
  <script src="js/sp-core.js"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-file-signature"></i> Rental Application</h1>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header"><h2>New Application</h2></div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group"><label>Applicant Name</label><input type="text" class="form-input" placeholder="Full name"></div>
            <div class="form-group"><label>Unit</label><select class="form-select"><option>101</option><option>102</option><option>201</option></select></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Income</label><input type="number" class="form-input" placeholder="Annual income"></div>
            <div class="form-group"><label>Employer</label><input type="text" class="form-input" placeholder="Current employer"></div>
          </div>
          <button class="btn btn-primary">Submit Application</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Applications</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Name</th><th>Unit</th><th>Income</th><th>Status</th></tr></thead><tbody><tr><td>Jane Smith</td><td>102</td><td>$65,000</td><td><span class="badge badge-warning">Pending</span></td></tr><tr><td>Mike Johnson</td><td>205</td><td>$72,000</td><td><span class="badge badge-info">Screening</span></td></tr></tbody></table>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
