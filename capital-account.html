<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Capital Accounts</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="js/sp-core.js?v3"></script>
  <script src="js/sp-data.js?v2"></script>
  <script src="js/sp-firebase.js?v2"></script>
  <script src="js/sp-math.js"></script>
  <style>
    :root { --accent:#F37925;--accent-hover:#D96515;--success:#2D9A6B;--warning:#E8890A;--danger:#D94F3D;--bg:#F3F3F3;--surface:#FFFFFF;--border:#E2DDD8;--text:#1B1A19;--text-muted:#6B6560;--radius:12px; }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;}
    .main{flex:1;margin-left:var(--dt-sidebar-width);padding:32px 40px;}
    @media(max-width:768px){.main{margin-left:0!important;width:100%!important;padding:16px;}}

    .page-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:28px;}
    .page-top h1{font-size:1.5rem;font-weight:800;}
    .page-top p{color:var(--text-muted);font-size:.88rem;margin-top:2px;}
    .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    select{padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-weight:600;font-family:inherit;font-size:.88rem;cursor:pointer;}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:8px;font-weight:600;font-size:.85rem;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;transition:all .15s;}
    .btn:hover{background:#F8F6F4;}
    .btn-primary{background:var(--accent);color:white;border-color:var(--accent);}
    .btn-primary:hover{background:var(--accent-hover);}

    /* Deal header card */
    .deal-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px 28px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;}
    .deal-header h2{font-size:1.15rem;font-weight:700;}
    .deal-meta{display:flex;gap:24px;flex-wrap:wrap;}
    .deal-meta .m{text-align:center;}
    .deal-meta .m .v{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1.1rem;}
    .deal-meta .m .l{font-size:.68rem;text-transform:uppercase;color:var(--text-muted);font-weight:600;letter-spacing:.05em;margin-top:2px;}

    /* Partner table */
    .partner-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
    .partner-card .card-title{padding:18px 24px;font-size:.9rem;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
    table{width:100%;border-collapse:collapse;}
    th{text-align:left;padding:12px 20px;font-size:.72rem;color:var(--text-muted);background:#F8F6F4;border-bottom:2px solid var(--border);text-transform:uppercase;letter-spacing:.05em;font-weight:700;}
    th.right,td.right{text-align:right;}
    td{padding:14px 20px;border-bottom:1px solid var(--border);font-size:.875rem;}
    tr:hover td{background:#FAFAF8;}
    .mono{font-family:'JetBrains Mono',monospace;font-weight:600;}
    .pill{padding:3px 8px;border-radius:4px;font-size:.68rem;font-weight:700;text-transform:uppercase;}
    .pill-gp{background:rgba(243,121,37,.12);color:var(--accent);}
    .pill-lp{background:rgba(45,154,107,.12);color:var(--success);}
    .positive{color:var(--success);}
    .negative{color:var(--danger);}
    .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;color:white;flex-shrink:0;}
    .partner-name{display:flex;align-items:center;gap:10px;}
    .partner-name .nm{font-weight:600;}
    .partner-name .em{font-size:.75rem;color:var(--text-muted);}

    .totals-row td{font-weight:700;background:#F8F6F4;border-top:2px solid var(--border);}
    .empty{text-align:center;padding:48px 24px;color:var(--text-muted);}
    .empty i{font-size:2rem;margin-bottom:12px;display:block;opacity:.3;}

    /* Expandable ledger per partner */
    .ledger-toggle{cursor:pointer;color:var(--accent);font-size:.78rem;font-weight:600;}
    .ledger-toggle:hover{text-decoration:underline;}
    .ledger-detail{display:none;background:#FAFAF8;}
    .ledger-detail.open{display:table-row;}
    .ledger-inner{padding:12px 20px 16px 62px;}
    .ledger-inner table{font-size:.8rem;}
    .ledger-inner th{padding:8px 12px;font-size:.65rem;}
    .ledger-inner td{padding:8px 12px;font-size:.8rem;}

    @media print{
      .sidebar,.controls,.btn,.page-top p{display:none!important;}
      .main{margin:0!important;padding:20px!important;}
    }
  </style>
</head>
<body>
  <aside id="sidebar" class="sidebar"></aside>
  <main class="main">
    <div class="page-top">
      <div>
        <h1><i class="fas fa-landmark" style="color:var(--accent);"></i> Capital Accounts</h1>
        <p>Select a deal to view each partner's capital balance in that entity</p>
      </div>
      <div class="controls">
        <select id="dealSelect" onchange="loadDeal()">
          <option value="">— Select a Deal —</option>
        </select>
        <button class="btn" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
      </div>
    </div>

    <div id="dealHeader" class="deal-header" style="display:none;"></div>
    <div id="partnerTable" class="partner-card" style="display:none;"></div>
    <div id="emptyState" class="partner-card">
      <div class="empty"><i class="fas fa-landmark"></i><div>Select a deal above to view partner capital accounts</div></div>
    </div>
  </main>

  <script>
    SP.requireGP();

    const COLORS = ['#F37925','#2D9A6B','#3B82F6','#8B5CF6','#EC4899','#06B6D4','#EAB308','#6366F1'];
    function fmt$(n){ return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0); }
    function fmtDate(d){ if(!d) return '—'; const dt=new Date(d.includes?.('T')?d:d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
    function pct(n,d){ return d ? (n/d*100).toFixed(1)+'%' : '0%'; }

    function initDeals(){
      const deals = SP.getDeals();
      const sel = document.getElementById('dealSelect');
      deals.forEach(d => {
        const opt = new Option(d.name + ' — ' + (d.companyName || d.type || ''), d.id);
        sel.add(opt);
      });
      // Auto-select if dealId in URL
      const params = new URLSearchParams(window.location.search);
      if (params.get('dealId')) {
        sel.value = params.get('dealId');
        loadDeal();
      }
    }

    function loadDeal(){
      const dealId = document.getElementById('dealSelect').value;
      if (!dealId) {
        document.getElementById('dealHeader').style.display = 'none';
        document.getElementById('partnerTable').style.display = 'none';
        document.getElementById('emptyState').style.display = '';
        return;
      }

      const deal = SP.getDeals().find(d => d.id === dealId);
      if (!deal) return;

      const investors = SP.getInvestors();
      const allDists = SP.getDistributions().filter(d => d.dealId === dealId && d.status === 'posted');
      const dealInvestors = deal.investors || [];
      const totalEquity = deal.totalEquity || deal.raise || 0;
      const settings = SP.load('settings', {});

      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('dealHeader').style.display = '';
      document.getElementById('partnerTable').style.display = '';

      // Total distributions for this deal
      let totalDistAll = 0;
      allDists.forEach(d => { (d.recipients||[]).forEach(r => { totalDistAll += (r.amount||r.totalThisDist||0); }); });

      // Total contributed
      const totalContributed = dealInvestors.reduce((s,i) => s + (i.committed||0), 0);

      // Deal header
      document.getElementById('dealHeader').innerHTML = `
        <div>
          <h2>${deal.name}</h2>
          <div style="color:var(--text-muted);font-size:.85rem;margin-top:4px;">${deal.companyName || settings.firmName || ''} · ${deal.location || ''}</div>
        </div>
        <div class="deal-meta">
          <div class="m"><div class="v">${fmt$(totalEquity)}</div><div class="l">Total Equity</div></div>
          <div class="m"><div class="v">${fmt$(totalContributed)}</div><div class="l">Contributed</div></div>
          <div class="m"><div class="v">${fmt$(totalDistAll)}</div><div class="l">Distributed</div></div>
          <div class="m"><div class="v">${dealInvestors.length + 1}</div><div class="l">Partners</div></div>
        </div>
      `;

      // Build partner rows
      const partners = [];

      // GP equity
      const gpEquityPct = (deal.gpEquity || 10) / 100;
      const gpContrib = Math.round(totalEquity * gpEquityPct);
      let gpDistTotal = 0;
      // GP distributions: look for GP-flagged recipients or calculate as remainder
      allDists.forEach(d => {
        const gpRec = (d.recipients||[]).find(r => r.isGP || r.investorId === 'gp');
        if (gpRec) gpDistTotal += (gpRec.amount || gpRec.totalThisDist || 0);
      });

      partners.push({
        name: settings.gpFullName || 'General Partner',
        email: settings.gpEmail || '',
        role: 'GP',
        committed: gpContrib,
        distributed: gpDistTotal,
        balance: gpContrib - gpDistTotal,
        ownershipPct: gpEquityPct * 100,
        color: COLORS[0],
        initials: 'GP',
        transactions: buildGPTransactions(deal, gpContrib, allDists)
      });

      // LP investors
      dealInvestors.forEach((entry, idx) => {
        const inv = investors.find(i => i.id === entry.investorId);
        const name = inv ? `${inv.firstName} ${inv.lastName}` : (entry.name || 'Unknown Investor');
        const email = inv ? inv.email : '';
        const committed = entry.committed || 0;
        const ownershipPct = totalEquity > 0 ? (committed / totalEquity * 100) : 0;

        // Distributions to this investor for this deal
        let distTotal = 0;
        const txns = [];
        // Contribution
        txns.push({ date: entry.linkedAt || deal.added || deal.closeDate, type:'contribution', desc:'Initial Capital Contribution', amount: committed });

        allDists.forEach(d => {
          const rec = (d.recipients||[]).find(r => r.investorId === entry.investorId);
          if (rec) {
            const amt = rec.amount || rec.totalThisDist || 0;
            distTotal += amt;
            const period = d.period || (d.quarter && d.year ? d.quarter+' '+d.year : '') || '';
            const prefNote = rec.prefPaidThisDist ? ` (incl. ${fmt$(rec.prefPaidThisDist)} pref)` : '';
            txns.push({ date: d.date, type:'distribution', desc:`Distribution — ${period}${prefNote}`, amount: amt });
          }
        });

        partners.push({
          name, email, role: 'LP',
          committed, distributed: distTotal,
          balance: committed - distTotal,
          ownershipPct: ownershipPct,
          color: COLORS[(idx + 1) % COLORS.length],
          initials: name.split(' ').map(w=>w[0]).join('').toUpperCase().substring(0,2),
          transactions: txns
        });
      });

      // Render table
      let rows = '';
      let totCommit = 0, totDist = 0, totBal = 0;

      partners.forEach((p, i) => {
        totCommit += p.committed;
        totDist += p.distributed;
        totBal += p.balance;

        rows += `<tr>
          <td>
            <div class="partner-name">
              <div class="avatar" style="background:${p.color};">${p.initials}</div>
              <div><div class="nm">${p.name}</div><div class="em">${p.email}</div></div>
            </div>
          </td>
          <td><span class="pill ${p.role==='GP'?'pill-gp':'pill-lp'}">${p.role}</span></td>
          <td class="right mono">${pct(p.ownershipPct,100)}</td>
          <td class="right mono">${fmt$(p.committed)}</td>
          <td class="right mono" style="color:var(--accent);">${fmt$(p.distributed)}</td>
          <td class="right mono ${p.balance>=0?'positive':'negative'}">${fmt$(p.balance)}</td>
          <td class="right"><span class="ledger-toggle" onclick="toggleLedger(${i})"><i class="fas fa-chevron-down"></i> Ledger</span></td>
        </tr>
        <tr class="ledger-detail" id="ledger-${i}"><td colspan="7">
          <div class="ledger-inner">
            <table>
              <thead><tr><th>Date</th><th>Type</th><th>Description</th><th class="right">Amount</th><th class="right">Balance</th></tr></thead>
              <tbody>${buildLedgerRows(p.transactions)}</tbody>
            </table>
          </div>
        </td></tr>`;
      });

      // Totals row
      rows += `<tr class="totals-row">
        <td colspan="2" style="font-weight:700;">Totals</td>
        <td class="right mono">100%</td>
        <td class="right mono">${fmt$(totCommit)}</td>
        <td class="right mono" style="color:var(--accent);">${fmt$(totDist)}</td>
        <td class="right mono ${totBal>=0?'positive':'negative'}">${fmt$(totBal)}</td>
        <td></td>
      </tr>`;

      document.getElementById('partnerTable').innerHTML = `
        <div class="card-title"><i class="fas fa-users" style="color:var(--accent);"></i> Partner Capital Accounts — ${deal.name}</div>
        <table>
          <thead><tr>
            <th>Partner</th>
            <th>Role</th>
            <th class="right">Ownership</th>
            <th class="right">Contributed</th>
            <th class="right">Distributed</th>
            <th class="right">Capital Balance</th>
            <th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function buildGPTransactions(deal, gpContrib, dists) {
      const txns = [{ date: deal.added || deal.closeDate, type:'contribution', desc:'GP Capital Contribution', amount: gpContrib }];
      dists.forEach(d => {
        const gpRec = (d.recipients||[]).find(r => r.isGP || r.investorId === 'gp');
        if (gpRec) {
          const amt = gpRec.amount || gpRec.totalThisDist || 0;
          const period = d.period || (d.quarter && d.year ? d.quarter+' '+d.year : '') || '';
          txns.push({ date: d.date, type:'distribution', desc:`GP Distribution — ${period}`, amount: amt });
        }
      });
      return txns;
    }

    function buildLedgerRows(txns) {
      if (!txns || txns.length === 0) return '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:16px;">No transactions</td></tr>';
      txns.sort((a,b) => new Date(a.date||'2020-01-01') - new Date(b.date||'2020-01-01'));
      let bal = 0;
      return txns.map(t => {
        bal += t.type === 'contribution' ? t.amount : -t.amount;
        return `<tr>
          <td style="color:var(--text-muted);white-space:nowrap;">${fmtDate(t.date)}</td>
          <td><span class="pill ${t.type==='contribution'?'pill-lp':'pill-gp'}">${t.type==='contribution'?'Contribution':'Distribution'}</span></td>
          <td>${t.desc}</td>
          <td class="right mono" style="color:${t.type==='contribution'?'var(--success)':'var(--accent)'};">${t.type==='contribution'?'+':'−'}${fmt$(t.amount)}</td>
          <td class="right mono">${fmt$(bal)}</td>
        </tr>`;
      }).join('');
    }

    function toggleLedger(i) {
      const row = document.getElementById('ledger-'+i);
      row.classList.toggle('open');
      const icon = row.previousElementSibling.querySelector('.ledger-toggle i');
      icon.className = row.classList.contains('open') ? 'fas fa-chevron-up' : 'fas fa-chevron-down';
    }

    SP.onDataReady(initDeals);
  </script>
</body>
</html>
