<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lease Management | Deeltrack</title>
  <script src="js/sp-core.js"></script>
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-file-contract"></i> Lease Management</h1>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Active Leases</span><span class="stat-value">42</span></div>
        <div class="stat-card"><span class="stat-label">Expiring Soon</span><span class="stat-value text-warning">5</span></div>
        <div class="stat-card"><span class="stat-label">Month-to-Month</span><span class="stat-value">3</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Lease Schedule</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Unit</th><th>Tenant</th><th>Start</th><th>End</th><th>Rent</th><th>Status</th></tr></thead><tbody id="leaseTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <script>const leases=[['101','Sarah Williams','2025-06-01','2026-05-31',1450,'Active'],['102','Mike Brown','2025-09-01','2026-08-31',1525,'Active'],['201','Tom Wilson','2025-03-15','2026-03-14',1800,'Expiring'],['205','Lisa Davis','2025-12-01','2026-11-30',1650,'Active']];document.getElementById('leaseTable').innerHTML=leases.map(l=>`<tr><td>${l[0]}</td><td>${l[1]}</td><td>${l[2]}</td><td>${l[3]}</td><td>$${l[4]}</td><td><span class="badge ${l[5]==='Expiring'?'badge-warning':'badge-success'}">${l[5]}</span></td></tr>`).join('');</script>
</body>
</html>
