<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Late Fees </title>
  <script src="js/sp-core.js"></script>
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-exclamation-circle"></i> Late Fees</h1>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Collected YTD</span><span class="stat-value text-success">$4,850</span></div>
        <div class="stat-card"><span class="stat-label">Pending</span><span class="stat-value text-warning">$1,200</span></div>
        <div class="stat-card"><span class="stat-label">Waived</span><span class="stat-value">$450</span></div>
        <div class="stat-card"><span class="stat-label">Delinquency Rate</span><span class="stat-value">4%</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Late Fee Log</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Unit</th><th>Tenant</th><th>Amount</th><th>Assessed</th><th>Status</th></tr></thead><tbody>
            <tr><td>105</td><td>Jane Doe</td><td>$250</td><td>2026-03-05</td><td><span class="badge badge-warning">Pending</span></td></tr>
            <tr><td>201</td><td>Tech Corp</td><td>$450</td><td>2026-02-10</td><td><span class="badge badge-success">Paid</span></td></tr>
            <tr><td>108</td><td>Bob Wilson</td><td>$200</td><td>2026-03-01</td><td><span class="badge badge-warning">Pending</span></td></tr>
          </tbody></table>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}}</script>
</body>
</html>
