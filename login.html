<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Kill any service worker immediately before anything else loads -->
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(r=>r.forEach(x=>x.unregister()));if(window.caches)caches.keys().then(k=>k.forEach(c=>caches.delete(c)));}</script>
  <title>deeltrack | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="js/sp-theme.js"></script>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="firebase-config.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="js/sp-core.js"></script>
  <script src="js/sp-firebase.js"></script>
  <style>
    :root { --accent: #0ea5e9; --accent-hover: #0284c7; --success: #10b981; --danger: #ef4444; --border: #1E293B; --text: #F8FAFC; --radius: 8px; --radius-md: 12px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Sora', sans-serif; background: #0B1120 !important; min-height: 100vh; display: flex !important; align-items: center; justify-content: center; padding: 20px; position: relative; overflow: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
    body::after { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at center, rgba(59,130,246,0.08) 0%, transparent 60%); pointer-events: none; }
    .login-wrap { width: 100%; max-width: 420px; position: relative; z-index: 10; }
    .brand { text-align: center; margin-bottom: 32px; }
    .brand-logo { display: inline-flex; align-items: center; gap: 12px; text-decoration: none; }
    .brand-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent), #60a5fa); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 0 30px rgba(59,130,246,0.4); }
    .brand-name { font-size: 1.6rem; font-weight: 700; color: white; }
    .brand-name span { color: #60a5fa; }
    .brand-tagline { color: rgba(255,255,255,0.95); font-size: 0.9rem; margin-top: 8px; font-weight: 400; }
    .card { background: #111827; border: 1px solid var(--border); border-radius: 18px; padding: 36px; box-shadow: 0 32px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(99,102,241,0.08); }
    .card-title { font-size: 1.4rem; font-weight: 700; color: white; margin-bottom: 4px; }
    .card-sub { color: rgba(255,255,255,0.95); font-size: 0.9rem; margin-bottom: 28px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.9); margin-bottom: 8px; letter-spacing: 0.02em; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.85); font-size: 0.9rem; pointer-events: none; }
    input[type=email], input[type=password] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px 12px 40px; font-size: 0.95rem; color: white; font-family: 'Inter', sans-serif; transition: all 0.2s; outline: none; }
    input::placeholder { color: rgba(255,255,255,0.7); }
    input:focus { border-color: var(--accent); background: rgba(59,130,246,0.08); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
    .toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.85); cursor: pointer; font-size: 0.9rem; border: none; background: none; }
    .toggle-pw:hover { color: rgba(255,255,255,0.75); }
    .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; color: rgba(255,255,255,0.95); font-size: 0.9rem; }
    .checkbox-label input { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
    .forgot-link { font-size: 0.85rem; color: var(--accent); text-decoration: none; font-weight: 500; }
    .forgot-link:hover { text-decoration: underline; }
    .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, #0ea5e9, #0369a1); color: white; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(59,130,246,0.35); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .alert { padding: 12px 16px; border-radius: var(--radius); font-size: 0.875rem; margin-bottom: 20px; display: none; align-items: center; gap: 10px; }
    .alert.show { display: flex; }
    .alert-error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert-success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--bg); }
    .divider span { color: rgba(255,255,255,0.85); font-size: 0.75rem; }
    .demo-box { background: rgba(59,130,246,0.08); border: 1px solid rgba(59,130,246,0.2); border-radius: var(--radius); padding: 14px 16px; }
    .demo-box p { font-size: 0.8rem; color: rgba(255,255,255,0.95); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .demo-cred { font-size: 0.85rem; color: rgba(255,255,255,0.9); display: flex; justify-content: space-between; margin-bottom: 4px; }
    .demo-cred span { font-family: monospace; color: #60a5fa; }
    .fill-demo { margin-top: 10px; width: 100%; padding: 8px; background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; border-radius: var(--radius); font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
    .fill-demo:hover { background: rgba(59,130,246,0.25); }
    .card-footer { text-align: center; margin-top: 24px; color: rgba(255,255,255,0.75); font-size: 0.875rem; }
    .card-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand">
      <a href="javascript:void(0)" onclick="SP.goHome()" class="brand-logo">
        <img src="assets/logo-icon.svg" alt="deeltrack" width="48" height="48" style="margin-right: -4px;">
        <div class="brand-name">deel<span style="color:#0ea5e9;">track</span></div>
      </a>
      <p class="brand-tagline">Real Estate Syndication Platform</p>
    </div>
    <div class="card">
      <h1 class="card-title">Welcome back</h1>
      <p class="card-sub">Sign in to your account to continue</p>
      <div class="alert alert-error" id="errorAlert"><i class="fas fa-exclamation-circle"></i><span id="errorMsg">Invalid email or password.</span></div>
      <div class="alert alert-success" id="successAlert"><i class="fas fa-check-circle"></i><span>Login successful! Redirecting…</span></div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" placeholder="you@company.com" required autocomplete="email">
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="toggle-pw" onclick="togglePw()"><i class="fas fa-eye" id="pwIcon"></i></button>
          </div>
        </div>
        <div class="form-options">
          <label class="checkbox-label"><input type="checkbox" id="remember"> Remember me</label>
          <a href="#" class="forgot-link" onclick="handleForgotPassword(event)">Forgot password?</a>
        </div>
        <button type="submit" class="btn-login" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
      </form>
      <div class="divider"><span>or</span></div>
      <button type="button" id="googleBtn" onclick="googleSignIn()" style="width:100%;padding:13px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius);color:white;font-size:0.95rem;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Continue with Google
      </button>

      <div class="divider"><span>Demo Credentials</span></div>
      <div class="demo-box">
        <p>Try it instantly</p>
        <div class="demo-cred">Email: <span>gp@deeltrack.com</span></div>
        <div class="demo-cred">Password: <span>Demo1234!</span></div>
        <button class="fill-demo" onclick="fillDemo()"><i class="fas fa-magic"></i> Fill Demo Credentials</button>
      </div>
      <div class="card-footer">Don't have an account? <a href="signup.html">Sign up free</a></div>
    </div>
  </div>
<script>
  // Show switch account if already logged in
  if (SP.isLoggedIn()) {
      const session = SP.getSession();
      document.body.classList.add('authenticating');
      document.getElementById('loginCard').innerHTML = `
        <div style="text-align:center;padding:40px 20px;">
          <div style="width:64px;height:64px;background:linear-gradient(135deg,#0ea5e9,#0369a1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
            <i class="fas fa-user-circle" style="font-size:32px;color:white;"></i>
          </div>
          <h2 style="color:#fff;margin-bottom:8px;">Signed in as</h2>
          <p style="color:#94a3b8;font-size:1.1rem;margin-bottom:24px;">${session?.name || session?.email || 'User'}</p>
          <p style="color:#64748b;font-size:0.875rem;margin-bottom:24px;">Role: ${session?.role || 'General Partner'}</p>
          <a href="dashboard.html" class="btn btn-primary" style="display:inline-block;padding:12px 24px;background:#0ea5e9;color:#fff;border-radius:8px;text-decoration:none;font-weight:600;margin-bottom:12px;">Go to Dashboard</a>
          <br>
          <button onclick="SP.logout();window.location.reload();" style="display:inline-block;padding:10px 20px;background:transparent;border:1px solid #475569;color:#94a3b8;border-radius:8px;cursor:pointer;font-weight:500;font-size:0.9rem;">Sign Out & Switch</button>
        </div>
      `;
  }

  function togglePw() {
    const inp = document.getElementById('password');
    const icon = document.getElementById('pwIcon');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    icon.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
  }

  function fillDemo() {
    document.getElementById('email').value = 'gp@deeltrack.com';
    document.getElementById('password').value = 'Demo1234!';
  }

  async function googleSignIn() {
    if (typeof firebase === 'undefined' || !firebase.auth) {
      document.getElementById('errorAlert').classList.add('show');
      document.getElementById('errorMsg').textContent = 'Google sign-in is not available in offline mode.';
      return;
    }
    const btn = document.getElementById('googleBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting…';

    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.addScope('email');
      const result = await firebase.auth().signInWithPopup(provider);
      const fbUser = result.user;

      // Check if user record exists; if new, create as GP
      if (typeof SPFB !== 'undefined' && !SPFB.isOffline()) {
        await new Promise((resolve, reject) => {
          const timeout = setTimeout(() => reject(new Error('timeout')), 8000);
          SPFB.onReady(() => { clearTimeout(timeout); resolve(); });
          if (SPFB.isReady()) { clearTimeout(timeout); resolve(); }
        });
        const spUser = SPFB.getUser();
        if (spUser) {
          SP.setSession({ ...spUser, loggedIn: true, loginTime: Date.now() });
        } else {
          // New Google user — create GP record
          const orgId = SP.simpleHash(fbUser.email.toLowerCase());
          await SPFB.ensureUserRecord(fbUser.uid, fbUser.email, fbUser.displayName || fbUser.email, 'General Partner', orgId);
          SP.setSession({ email: fbUser.email, name: fbUser.displayName || fbUser.email, role: 'General Partner', orgId, loggedIn: true, loginTime: Date.now() });
        }
      } else {
        SP.setSession({ email: fbUser.email, name: fbUser.displayName || fbUser.email, role: 'General Partner', orgId: SP.simpleHash(fbUser.email.toLowerCase()), loggedIn: true, loginTime: Date.now() });
      }

      document.getElementById('successAlert').classList.add('show');
      const session = SP.getSession();
      setTimeout(() => {
        window.location.href = session?.role === 'Investor' ? 'investor-portal.html' : 'dashboard.html';
      }, 600);

    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg> Continue with Google';
      if (err.code === 'auth/popup-closed-by-user' || err.code === 'auth/cancelled-popup-request') return;
      if (err.code === 'auth/popup-blocked') {
        document.getElementById('errorAlert').classList.add('show');
        document.getElementById('errorMsg').textContent = 'Pop-up was blocked. Please allow pop-ups for this site and try again.';
        return;
      }
      document.getElementById('errorAlert').classList.add('show');
      document.getElementById('errorMsg').textContent = 'Google sign-in failed: ' + (err.message || err.code);
    }
  }

    async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    document.getElementById('errorAlert').classList.remove('show');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';

    try {
      let signedIn = false;

      // Try Firebase Auth first
      if (typeof SPFB !== 'undefined' && !SPFB.isOffline()) {
        try {
          const fbUser = await SPFB.signIn(email, password);
          if (fbUser && fbUser.email) {
            // Firebase sign-in succeeded — wait for SPFB to be ready
            await new Promise((resolve, reject) => {
              const timeout = setTimeout(() => reject(new Error('timeout')), 8000);
              SPFB.onReady(() => { clearTimeout(timeout); resolve(); });
              // If already ready
              if (SPFB.isReady()) { clearTimeout(timeout); resolve(); }
            });
            const spUser = SPFB.getUser();
            if (spUser) {
              SP.setSession({ ...spUser, loggedIn: true, loginTime: Date.now() });
              signedIn = true;
            }
          }
        } catch (fbErr) {
          console.warn('Firebase auth failed, trying local:', fbErr.message);
        }
      }

      // Fallback to localStorage auth (demo account, offline)
      if (!signedIn) {
        const session = SP.authenticate(email, password);
        if (session) signedIn = true;
      }

      if (signedIn) {
        if (document.getElementById('remember').checked) localStorage.setItem('sp_remember', email);
        document.getElementById('successAlert').classList.add('show');
        btn.innerHTML = '<i class="fas fa-check"></i> Success!';
        const session = SP.getSession();
        setTimeout(() => {
          window.location.href = session?.role === 'Investor' ? 'investor-portal.html' : 'dashboard.html';
        }, 700);
      } else {
        document.getElementById('errorAlert').classList.add('show');
        document.getElementById('errorMsg').textContent = 'Invalid email or password. Please try again.';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
        document.getElementById('password').value = '';
      }
    } catch (err) {
      document.getElementById('errorAlert').classList.add('show');
      document.getElementById('errorMsg').textContent = 'Sign in error: ' + err.message;
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
    }
  }

  const remembered = localStorage.getItem('sp_remember');
  if (remembered) { document.getElementById('email').value = remembered; document.getElementById('remember').checked = true; }

  async function handleForgotPassword(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) {
      document.getElementById('errorAlert').classList.add('show');
      document.getElementById('errorMsg').textContent = 'Enter your email address above first.';
      return;
    }
    if (typeof firebase === 'undefined' || !firebase.auth) {
      window.location.href = `mailto:admin@deeltrack.com?subject=Password Reset Request&body=Please reset the password for: ${email}`;
      return;
    }
    try {
      // Point Firebase reset links at our branded reset-password page
      const actionCodeSettings = {
        url: window.location.origin + window.location.pathname.replace('login.html', '') + 'reset-password.html',
        handleCodeInApp: false,
      };
      await firebase.auth().sendPasswordResetEmail(email, actionCodeSettings);
      const sa = document.getElementById('successAlert');
      sa.innerHTML = `<i class="fas fa-check-circle"></i> Password reset email sent to <strong>${email}</strong>. Check your inbox.`;
      sa.classList.add('show');
    } catch (err) {
      document.getElementById('errorAlert').classList.add('show');
      document.getElementById('errorMsg').textContent = err.code === 'auth/user-not-found'
        ? 'No account found with that email.'
        : 'Could not send reset email: ' + err.message;
    }
  }

  // Pre-fill email from reset_hint param (set by reset-password.html on expired link redirect)
  const resetHint = new URLSearchParams(window.location.search).get('reset_hint');
  if (resetHint) {
    document.getElementById('email').value = resetHint;
    document.getElementById('errorAlert').classList.add('show');
    document.getElementById('errorMsg').textContent = 'Your reset link expired. Enter your email and click "Forgot password?" to get a new one.';
  }
</script>
</body>
</html>
