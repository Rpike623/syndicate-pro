<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Maintenance Log </title>
  <script src="js/sp-core.js?v8"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-wrench"></i> Maintenance Log</h1>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header"><h2>Work Orders</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Unit</th><th>Type</th><th>Reported</th><th>Status</th><th>Estimate</th></tr></thead><tbody id="maintTable"></tbody></table>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Open Work Orders</span><span class="stat-value text-warning" id="statOpenWO">0</span></div>
        <div class="stat-card"><span class="stat-label">Avg Repair Days</span><span class="stat-value" id="statAvgDays">0</span></div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Maint.init();}</script>
  <script src="js/sp-maint.js"></script>
</body>
</html>
