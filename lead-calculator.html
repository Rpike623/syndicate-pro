<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Lead Calculator </title>
  <script src="js/sp-core.js?v6"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-calculator"></i> Lead Calculator</h1>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header"><h2>Investor Lead Value Calculator</h2></div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group"><label>Number of Leads</label><input type="number" id="lLeads" class="form-input" value="100" oninput="LeadCalc.calc()"></div>
            <div class="form-group"><label>Conversion Rate %</label><input type="number" id="lConv" class="form-input" value="25" oninput="LeadCalc.calc()"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Avg Investment</label><input type="number" id="lAvg" class="form-input" value="250000" oninput="LeadCalc.calc()"></div>
            <div class="form-group"><label>Investment Hold %</label><input type="number" id="lHold" class="form-input" value="60" oninput="LeadCalc.calc()"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Avg Hold Years</label><input type="number" id="lYears" class="form-input" value="5" oninput="LeadCalc.calc()"></div>
            <div class="form-group"><label>Management Fee %</label><input type="number" id="lFee" class="form-input" value="1.5" oninput="LeadCalc.calc()"></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Results</h2></div>
        <div class="card-body">
          <div class="result-row"><span>Investors Converted</span><strong id="lInv">0</strong></div>
          <div class="result-row"><span>Capital Raised</span><strong id="lCap">$0</strong></div>
          <div class="result-row"><span>Mgmt Fee Revenue</span><strong id="lRev">$0</strong></div>
          <div class="result-row"><span>Carry (20%)</span><strong id="lCarry">$0</strong></div>
          <div class="result-row"><span>Total GP Revenue</span><strong id="lTotal" class="text-success">$0</strong></div>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}LeadCalc.init();}</script>
  <script src="js/sp-lead-calc.js"></script>
</body>
</html>
