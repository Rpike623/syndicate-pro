<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capital Account Statement — deeltrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="js/sp-core.js"></script>
    <script src="js/sp-data.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --bg: #f8fafc; --radius: 12px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #0f172a; color: white; position: fixed; height: 100vh; z-index: 100; }
        .main { flex: 1; margin-left: 260px; padding: 40px; }
        
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; }
        .statement-card { background: white; border: 1px solid #e2e8f0; border-radius: var(--radius); padding: 40px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin: 32px 0; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; padding: 24px 0; }
        .sum-item { display: flex; flex-direction: column; }
        .sum-label { font-size: 0.7rem; text-transform: uppercase; color: #64748b; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 8px; }
        .sum-val { font-size: 1.25rem; font-weight: 800; font-family: 'JetBrains Mono'; }

        .txn-table { width: 100%; border-collapse: collapse; margin-top: 24px; }
        .txn-table th { text-align: left; font-size: 0.75rem; color: #64748b; padding: 12px 16px; border-bottom: 2px solid #e2e8f0; text-transform: uppercase; }
        .txn-table td { padding: 16px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }
        .txn-amt { font-family: 'JetBrains Mono'; font-weight: 600; text-align: right; }
        
        .type-pill { padding: 4px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
        .pill-cont { background: #dcfce7; color: #16a34a; }
        .pill-dist { background: #dbeafe; color: #2563eb; }

        @media print {
            .sidebar, .btn-xs, .no-print { display: none !important; }
            .main { margin-left: 0; padding: 0; }
            .statement-card { border: none; box-shadow: none; padding: 0; }
        }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
        <div class="no-print" style="margin-bottom: 20px; display: flex; gap: 12px;">
            <select id="investorSelect" onchange="loadStatement()" style="padding: 8px 12px; border-radius: 6px; border: 1px solid #e2e8f0; font-weight: 600;">
                <option value="">— Select Investor —</option>
            </select>
            <button onclick="window.print()" class="btn-xs"><i class="fas fa-print"></i> Print Statement</button>
        </div>

        <div class="statement-card">
            <div class="header">
                <div>
                    <div style="font-size: 0.8rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 2px;">Member Account Statement</div>
                    <h1 id="investorName" style="font-size: 1.8rem; margin-top: 4px;">Select Investor</h1>
                    <div id="investorEmail" style="color: #64748b; font-size: 0.9rem;">—</div>
                </div>
                <div style="text-align: right;">
                    <div style="font-weight: 800; font-size: 1.2rem;">DEELTRACK LP</div>
                    <div style="color: #64748b; font-size: 0.8rem;">Period Ending: March 31, 2026</div>
                </div>
            </div>

            <div class="summary-grid">
                <div class="sum-item">
                    <span class="sum-label">Beginning Balance</span>
                    <span class="sum-val" id="beginBal">$0.00</span>
                </div>
                <div class="sum-item">
                    <span class="sum-label">Contributions</span>
                    <span class="sum-val" id="totalCont" style="color: var(--success);">$0.00</span>
                </div>
                <div class="sum-item">
                    <span class="sum-label">Distributions</span>
                    <span class="sum-val" id="totalDist" style="color: var(--accent);">$0.00</span>
                </div>
                <div class="sum-item">
                    <span class="sum-label">Current Account Value</span>
                    <span class="sum-val" id="currentBal">$0.00</span>
                </div>
            </div>

            <h3 style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: #64748b;">Transaction History</h3>
            <table class="txn-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Asset / Description</th>
                        <th>Type</th>
                        <th style="text-align: right;">Amount</th>
                    </tr>
                </thead>
                <tbody id="txnBody">
                    <tr><td colspan="4" style="text-align:center; color:#94a3b8; padding:40px;">Select an investor to view activity...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        function init() {
            const investors = SP.getInvestors();
            const sel = document.getElementById('investorSelect');
            investors.forEach(inv => {
                sel.add(new Option(`${inv.firstName} ${inv.lastName}`, inv.id));
            });
        }

        function loadStatement() {
            const id = document.getElementById('investorSelect').value;
            const investor = SP.getInvestorById(id);
            if(!investor) return;

            document.getElementById('investorName').textContent = `${investor.firstName} ${investor.lastName}`;
            document.getElementById('investorEmail').textContent = investor.email;

            // Generate Mock Institutional Transaction History
            const txns = [
                { date: '2025-01-15', asset: 'Pecan Hollow Apartments', type: 'cont', amt: 100000 },
                { date: '2025-04-10', asset: 'Q1 Preferred Return', type: 'dist', amt: 2500 },
                { date: '2025-07-12', asset: 'Q2 Preferred Return', type: 'dist', amt: 2500 },
                { date: '2025-10-05', asset: 'Q3 Preferred Return', type: 'dist', amt: 2500 },
                { date: '2026-01-08', asset: 'Q4 preferred Return', type: 'dist', amt: 2500 },
                { date: '2026-02-28', asset: 'Riverside Flats (Follow-on)', type: 'cont', amt: 50000 }
            ];

            let html = '';
            let totalC = 0, totalD = 0;
            txns.forEach(t => {
                const isCont = t.type === 'cont';
                if(isCont) totalC += t.amt; else totalD += t.amt;
                html += `<tr>
                    <td>${t.date}</td>
                    <td><div style="font-weight:700">${t.asset}</div></td>
                    <td><span class="type-pill ${isCont?'pill-cont':'pill-dist'}">${isCont?'Contribution':'Distribution'}</span></td>
                    <td class="txn-amt" style="color:${isCont?'var(--success)':'var(--accent)'}">${isCont?'':'-'}$${t.amt.toLocaleString()}</td>
                </tr>`;
            });

            document.getElementById('txnBody').innerHTML = html;
            document.getElementById('beginBal').textContent = '$0.00';
            document.getElementById('totalCont').textContent = '$' + totalC.toLocaleString();
            document.getElementById('totalDist').textContent = '-$' + totalD.toLocaleString();
            document.getElementById('currentBal').textContent = '$' + (totalC - totalD).toLocaleString();
        }

        window.addEventListener('spdata-ready', init);
        if(typeof SPData !== 'undefined' && SPData.isReady()) init();
    </script>
</body>
</html>
