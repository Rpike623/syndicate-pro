<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Tenant Directory </title>
  <script src="js/sp-core.js?v=9246da8"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-users"></i> Tenant Directory</h1>
      <div class="header-actions">
        <input type="search" class="form-input" placeholder="Search tenants..." id="search" onkeyup="Tenant.search()" style="width:200px;">
        <button class="btn btn-primary" onclick="Tenant.showModal()"><i class="fas fa-plus"></i> Add</button>
      </div>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Total Tenants</span><span class="stat-value" id="statTotal">0</span></div>
        <div class="stat-card"><span class="stat-label">Residential</span><span class="stat-value" id="statRes">0</span></div>
        <div class="stat-card"><span class="stat-label">Commercial</span><span class="stat-value" id="statCom">0</span></div>
        <div class="stat-card"><span class="stat-label">Avg Rent</span><span class="stat-value" id="statAvg">$0</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Tenants</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Name</th><th>Property</th><th>Unit</th><th>Type</th><th>Rent</th><th>Lease End</th><th>Status</th></tr></thead><tbody id="tenantTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <div id="tenantModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header"><h2>Add Tenant</h2><button class="close" onclick="Tenant.closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Name</label><input type="text" id="tName" class="form-input"></div>
        <div class="form-row">
          <div class="form-group"><label>Property</label><select id="tProperty" class="form-select"><option>Sunset Apartments</option><option>Downtown Office</option><option>Industrial Portfolio</option><option>Coastal Retail</option></select></div>
          <div class="form-group"><label>Unit</label><input type="text" id="tUnit" class="form-input"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Type</label><select id="tType" class="form-select"><option>Residential</option><option>Commercial</option></select></div>
          <div class="form-group"><label>Rent</label><input type="number" id="tRent" class="form-input"></div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="Tenant.closeModal()">Cancel</button><button class="btn btn-primary" onclick="Tenant.save()">Save</button></div>
    </div>
  </div>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Tenant.init();}</script>
  <script src="js/sp-tenants.js"></script>
</body>
</html>
