<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Vendor Invoice </title>
  <script src="js/sp-core.js?v6"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-file-invoice-dollar"></i> Vendor Invoice</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="Inv.showModal()">New Invoice</button>
      </div>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Pending</span><span class="stat-value text-warning" id="statPending">$0</span></div>
        <div class="stat-card"><span class="stat-label">Approved</span><span class="stat-value text-success" id="statApproved">$0</span></div>
        <div class="stat-card"><span class="stat-label">Paid</span><span class="stat-value" id="statPaid">$0</span></div>
        <div class="stat-card"><span class="stat-label">Overdue</span><span class="stat-value text-danger" id="statOverdue">$0</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Invoices</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Vendor</th><th>Invoice #</th><th>Date</th><th>Amount</th><th>Due</th><th>Status</th></tr></thead><tbody id="invTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <div id="invModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header"><h2>New Invoice</h2><button class="close" onclick="Inv.closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Vendor</label><input type="text" id="invVendor" class="form-input"></div>
        <div class="form-row">
          <div class="form-group"><label>Invoice #</label><input type="text" id="invNum" class="form-input"></div>
          <div class="form-group"><label>Amount</label><input type="number" id="invAmount" class="form-input"></div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="Inv.closeModal()">Cancel</button><button class="btn btn-primary" onclick="Inv.save()">Submit</button></div>
    </div>
  </div>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Inv.init();}</script>
  <script src="js/sp-vendor-inv.js"></script>
</body>
</html>
