<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack | Tenant Application </title>
  <script src="js/sp-core.js"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-user-plus"></i> Tenant Application</h1>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header"><h2>Rental Application</h2></div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group"><label>Full Name</label><input type="text" class="form-input"></div>
            <div class="form-group"><label>Email</label><input type="email" class="form-input"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Phone</label><input type="tel" class="form-input"></div>
            <div class="form-group"><label>Desired Move-in</label><input type="date" class="form-input"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Current Address</label><input type="text" class="form-input"></div>
            <div class="form-group"><label>Employer</label><input type="text" class="form-input"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Annual Income</label><input type="number" class="form-input"></div>
            <div class="form-group"><label>Unit Applied For</label><select class="form-select"><option>101</option><option>102</option><option>103</option></select></div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}}</script>
</body>
</html>
