<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investor Statement | Deeltrack</title>
  <script src="js/sp-core.js"></script>
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-envelope-open-text"></i> Investor Statement</h1>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header"><h2>Generate Statement</h2></div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group"><label>Investor</label><select id="sInv" class="form-select"><option>John Smith</option><option>Sarah Williams</option></select></div>
            <div class="form-group"><label>Period</label><select id="sPeriod" class="form-select"><option>Q1 2026</option><option>Q4 2025</option><option>YTD 2026</option></select></div>
          </div>
          <button class="btn btn-primary" onclick="Stmt.generate()">Generate PDF</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Preview</h2></div>
        <div class="card-body" id="stmtPreview"></div>
      </div>
    </div>
  </main>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Stmt.init();}</script>
  <script src="js/sp-stmt.js"></script>
</body>
</html>
