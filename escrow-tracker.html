<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>deeltrack |  Escrow Tracker </title>
  <script src="js/sp-core.js?v9"></script>
  <link rel="stylesheet" href="contrast-fix.css">
</head>
<body>
  <div id="sidebar"></div>
  <main class="main" id="main">
    <div class="dt-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <h1><i class="fas fa-vault"></i> Escrow Tracker</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="Escrow.showModal()"><i class="fas fa-plus"></i> New Escrow</button>
      </div>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-card"><span class="stat-label">Active Escrows</span><span class="stat-value" id="statActive">0</span></div>
        <div class="stat-card"><span class="stat-label">Total Value</span><span class="stat-value" id="statValue">$0</span></div>
        <div class="stat-card"><span class="stat-label">In Escrow</span><span class="stat-value" id="statInEscrow">$0</span></div>
        <div class="stat-card"><span class="stat-label">Closed This Month</span><span class="stat-value text-success" id="statClosed">0</span></div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Escrow Accounts</h2></div>
        <div class="card-body">
          <table class="data-table"><thead><tr><th>Property</th><th>Escrow Type</th><th>Amount</th><th>Opened</th><th>Milestone</th><th>Status</th></tr></thead><tbody id="escrowTable"></tbody></table>
        </div>
      </div>
    </div>
  </main>
  <div id="escrowModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header"><h2>New Escrow</h2><button class="close" onclick="Escrow.closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Property</label><select id="eProperty" class="form-select"><option>Sunset Apartments</option><option>Downtown Office</option><option>Industrial Portfolio</option></select></div>
        <div class="form-group"><label>Escrow Type</label><select id="eType" class="form-select"><option>Purchase Price</option><option>Security Deposit</option><option>Repairs</option><option>Tax & Insurance</option></select></div>
        <div class="form-row">
          <div class="form-group"><label>Amount</label><input type="number" id="eAmount" class="form-input"></div>
          <div class="form-group"><label>Milestone</label><input type="text" id="eMilestone" class="form-input"></div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-secondary" onclick="Escrow.closeModal()">Cancel</button><button class="btn btn-primary" onclick="Escrow.save()">Create</button></div>
    </div>
  </div>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.SP&&SP.isLoggedIn)initPage();else document.addEventListener('sp-ready',initPage);});function initPage(){if(!SP.isLoggedIn()){window.location.href='login.html';return;}Escrow.init();}</script>
  <script src="js/sp-escrow.js"></script>
</body>
</html>
